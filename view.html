<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수업 현황 — 성민T</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
:root{--bl:#74B3D8;--bld:#5a9ec7}
#load{min-height:100vh;display:flex;align-items:center;justify-content:center}
.sp{width:38px;height:38px;border:3px solid #e2e8f0;border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{color:#64748b;font-size:14px;text-align:center}
.err{text-align:center;padding:40px 20px}
.err .ei{font-size:52px;margin-bottom:16px}
.err h2{font-size:19px;font-weight:700;margin-bottom:8px}
.err p{font-size:13px;color:#64748b;line-height:1.7}

#wrap{display:none;max-width:680px;margin:0 auto;padding:0 14px 60px}
.hdr{background:linear-gradient(135deg,#0f172a,#1e3a5f,#2d5286);padding:40px 24px 72px;margin:0 -14px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;width:260px;height:260px;background:radial-gradient(circle,rgba(116,179,216,.2),transparent 70%);top:-60px;right:-40px;pointer-events:none}
.hdr-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:5px 14px;font-size:11px;color:rgba(255,255,255,.75);font-weight:500;letter-spacing:.04em;margin-bottom:16px}
.hdr-name{font-size:28px;font-weight:700;color:#fff;margin-bottom:8px}
.hdr-tags{display:flex;gap:8px;flex-wrap:wrap}
.htag{background:rgba(255,255,255,.14);color:rgba(255,255,255,.88);border-radius:6px;padding:4px 11px;font-size:12px;font-weight:500}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:-32px;margin-bottom:20px;position:relative;z-index:1}
.sc{background:#fff;border-radius:12px;padding:14px 10px;box-shadow:0 4px 16px rgba(0,0,0,.08);text-align:center}
.sn{font-size:22px;font-weight:700;color:var(--bl);line-height:1}
.sl{font-size:11px;color:#64748b;margin-top:4px;font-weight:500}

.stitle{font-size:15px;font-weight:700;margin-bottom:12px;color:#0f172a;display:flex;align-items:center;gap:7px}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:12px;overflow:hidden}
.rec-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;cursor:pointer;user-select:none}
.rnum{background:var(--bl);color:#fff;border-radius:7px;padding:2px 9px;font-size:12px;font-weight:700;flex-shrink:0}
.rdate{font-size:14px;font-weight:600;color:#1e293b}
.rlatest{font-size:10px;background:#fef3c7;color:#b45309;border-radius:4px;padding:1px 6px;font-weight:600;margin-left:6px}
.rbadges{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;border-radius:99px;padding:2px 9px;font-size:11px;font-weight:600;white-space:nowrap}
.b상{background:#dcfce7;color:#15803d}.b중{background:#fef9c3;color:#b45309}.b하{background:#fee2e2;color:#b91c1c}
.b완료{background:#dcfce7;color:#15803d}.b부분완료{background:#fef3c7;color:#b45309}.b미완료{background:#fee2e2;color:#b91c1c}.b없음{background:#f1f5f9;color:#94a3b8}
.chev{color:#94a3b8;font-size:16px;transition:transform .22s;flex-shrink:0}
.chev.op{transform:rotate(180deg)}
.rec-bd{display:none;padding:0 18px 16px;border-top:1px solid #f1f5f9}
.rec-bd.op{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.ig{display:grid;grid-template-columns:88px 1fr;gap:5px 10px;font-size:13px;margin-top:12px}
.ik{color:#94a3b8;font-weight:500;padding-top:1px}
.iv{color:#334155;line-height:1.6}
.iv.em{color:#cbd5e1;font-style:italic}
.nbox{background:#fffbea;border:1px solid #fde68a;border-radius:8px;padding:10px 13px;margin-top:10px;font-size:13px;color:#854d0e;line-height:1.6}

.csec{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:22px 20px;margin-top:24px}
.csec h2{font-size:15px;font-weight:700;margin-bottom:6px}
.csec p{font-size:13px;color:#64748b;margin-bottom:16px;line-height:1.6}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;outline:none;transition:.2s}
.inp:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(116,179,216,.14)}
textarea.inp{resize:vertical;min-height:90px}
.sbtn{background:var(--bl);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-top:10px;transition:.2s}
.sbtn:hover{background:var(--bld)}
.sbtn:disabled{background:#cbd5e1;cursor:not-allowed}
.succ{background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:11px 14px;font-size:13px;color:#15803d;margin-top:10px;display:none;text-align:center}
.cerr{color:#ef4444;font-size:12px;margin-top:5px;min-height:16px}
.sent-hd{font-size:12px;color:#94a3b8;margin:16px 0 6px}
.sent-i{background:#f8fafc;border-radius:8px;padding:10px 13px;margin-bottom:8px;font-size:13px;color:#475569;border-left:3px solid var(--bl);line-height:1.6}
.sent-t{font-size:11px;color:#94a3b8;margin-bottom:3px}
footer{text-align:center;padding:28px 0 12px;color:#cbd5e1;font-size:12px}
</style>
</head>
<body>
<div id="load"><div><div class="sp"></div><p class="ld-txt">불러오는 중...</p></div></div>
<div id="wrap">
  <div class="hdr">
    <div class="hdr-badge">📚 수업 현황</div>
    <div class="hdr-name" id="hName"></div>
    <div class="hdr-tags"><span class="htag" id="hGrade"></span><span class="htag" id="hSubj"></span></div>
  </div>
  <div>
    <div class="stats">
      <div class="sc"><div class="sn" id="sTot">0</div><div class="sl">총 수업 횟수</div></div>
      <div class="sc"><div class="sn" id="sHw">-</div><div class="sl">숙제 완료율</div></div>
      <div class="sc"><div class="sn" id="sLast">-</div><div class="sl">최근 성취도</div></div>
    </div>
    <div class="stitle">📋 수업 기록</div>
    <div id="recList"><p style="text-align:center;color:#94a3b8;padding:28px;font-size:13px">수업 기록이 없습니다</p></div>
    <div class="csec">
      <h2>💬 상담 요청</h2>
      <p>선생님께 궁금한 점이나 전달하실 내용을 남겨주세요.<br>확인 후 연락드리겠습니다.</p>
      <input class="inp" id="cName" type="text" placeholder="보내는 분 (예: 홍길동 어머니)" style="margin-bottom:10px">
      <textarea class="inp" id="cContent" placeholder="내용을 입력해주세요"></textarea>
      <div class="cerr" id="cerr"></div>
      <button class="sbtn" id="cBtn" onclick="submitC()">상담 요청 보내기</button>
      <div class="succ" id="cSucc">✅ 요청이 전송되었습니다. 곧 연락드리겠습니다.</div>
      <div id="sentList"></div>
    </div>
    <footer>이 페이지는 학부모 확인용입니다</footer>
  </div>
</div>

<script>
let db,sid_=null,sent=[];

window.addEventListener('DOMContentLoaded',()=>{
  if(typeof SM_CONFIG==='undefined'||!SM_CONFIG.apiKey||SM_CONFIG.apiKey.includes('여기에')){
    document.getElementById('load').innerHTML='<div class="err"><div class="ei">⚙️</div><h2>설정 오류</h2><p>config.js 파일에 Firebase 설정이 필요합니다</p></div>';
    return;
  }
  try{
    if(!firebase.apps.length)firebase.initializeApp(SM_CONFIG);
    db=firebase.database();
  }catch(e){showErr('Firebase 오류',''+e.message);return;}
  loadPage();
});

async function loadPage(){
  const token=new URLSearchParams(location.search).get('token');
  if(!token){showErr('잘못된 링크','올바른 학부모 링크로 접속해주세요.');return;}
  try{
    const snap=await db.ref('smStudents').orderByChild('token').equalTo(token).get();
    if(!snap.exists()){showErr('학생을 찾을 수 없습니다','링크가 만료되었거나 잘못된 링크입니다.');return;}
    const data=snap.val();
    sid_=Object.keys(data)[0];
    const stu=data[sid_];
    document.title=`${stu.name} — 수업 현황`;
    document.getElementById('hName').textContent=stu.name||'';
    document.getElementById('hGrade').textContent=stu.grade||'';
    document.getElementById('hSubj').textContent=stu.subj||'';
    document.getElementById('load').style.display='none';
    document.getElementById('wrap').style.display='';
    db.ref(`smSessions/${sid_}`).on('value',s=>renderRecs(s.val()||{}));
    const stored=localStorage.getItem(`smSent_${sid_}`);
    if(stored)try{sent=JSON.parse(stored);}catch(e){}
    renderSent();
  }catch(e){showErr('오류 발생',''+e.message);}
}

function showErr(title,msg){
  document.getElementById('load').innerHTML=`<div class="err"><div class="ei">😔</div><h2>${title}</h2><p>${msg}</p></div>`;
}

function fmt(d){if(!d)return'-';const[y,m,dd]=d.split('-');return`${y}년 ${+m}월 ${+dd}일`;}

function renderRecs(data){
  const el=document.getElementById('recList');
  const arr=Object.entries(data).sort(([,a],[,b])=>a.date===b.date?(b.num||0)-(a.num||0):(b.date||'').localeCompare(b.date||''));
  // stats
  document.getElementById('sTot').textContent=arr.length;
  if(arr.length){
    const hw=arr.filter(([,r])=>r.hwS&&r.hwS!=='없음');
    const done=hw.filter(([,r])=>r.hwS==='완료').length;
    document.getElementById('sHw').textContent=hw.length?`${Math.round(done/hw.length*100)}%`:'-';
    document.getElementById('sLast').textContent=arr[0][1].ach||'-';
  }
  if(!arr.length){el.innerHTML='<p style="text-align:center;color:#94a3b8;padding:28px;font-size:13px">수업 기록이 없습니다</p>';return;}
  el.innerHTML=arr.map(([rid,r],i)=>`
    <div class="card">
      <div class="rec-hd" onclick="tog('${rid}')">
        <div style="display:flex;align-items:center;gap:9px;flex:1;min-width:0">
          <span class="rnum">${r.num||'-'}회차</span>
          <span class="rdate">${fmt(r.date)}${i===0?'<span class="rlatest">최근</span>':''}</span>
        </div>
        <div class="rbadges">
          <span class="badge b${r.hwS||'없음'}">${r.hwS||'-'}</span>
          <span class="badge b${r.ach||'-'}">성취 ${r.ach||'-'}</span>
          <span class="chev ${i===0?'op':''}" id="chev_${rid}">▾</span>
        </div>
      </div>
      <div class="rec-bd ${i===0?'op':''}" id="bd_${rid}">
        <div class="ig">
          <span class="ik">진도</span><span class="iv ${r.prog?'':'em'}">${r.prog||'기록 없음'}</span>
          <span class="ik">숙제 내용</span><span class="iv ${r.hwC?'':'em'}">${r.hwC||'기록 없음'}</span>
          <span class="ik">클리닉</span><span class="iv ${r.cli?'':'em'}">${r.cli?r.cli.replace(/\n/g,'<br>'):'기록 없음'}</span>
        </div>
        ${r.note?`<div class="nbox">📌 ${r.note.replace(/\n/g,'<br>')}</div>`:''}
      </div>
    </div>`).join('');
}

function tog(rid){
  const bd=document.getElementById('bd_'+rid);
  const cv=document.getElementById('chev_'+rid);
  bd.classList.toggle('op');cv.classList.toggle('op');
}

async function submitC(){
  const name=document.getElementById('cName').value.trim();
  const content=document.getElementById('cContent').value.trim();
  const err=document.getElementById('cerr');
  if(!name){err.textContent='보내는 분을 입력해주세요';return;}
  if(!content){err.textContent='내용을 입력해주세요';return;}
  err.textContent='';
  const btn=document.getElementById('cBtn');
  btn.disabled=true;btn.textContent='전송 중...';
  try{
    await db.ref(`smConsultations/${sid_}`).push({name,content,ts:Date.now(),isRead:false});
    sent.unshift({name,content,ts:Date.now()});
    localStorage.setItem(`smSent_${sid_}`,JSON.stringify(sent.slice(0,10)));
    renderSent();
    document.getElementById('cName').value='';
    document.getElementById('cContent').value='';
    const s=document.getElementById('cSucc');s.style.display='block';setTimeout(()=>s.style.display='none',4000);
  }catch(e){err.textContent='전송 실패: '+e.message;}
  btn.disabled=false;btn.textContent='상담 요청 보내기';
}

function renderSent(){
  const el=document.getElementById('sentList');
  if(!sent.length){el.innerHTML='';return;}
  el.innerHTML='<p class="sent-hd">내가 보낸 요청</p>'+sent.slice(0,5).map(c=>`
    <div class="sent-i"><div class="sent-t">${new Date(c.ts).toLocaleString('ko-KR')} · ${c.name}</div>${c.content}</div>`).join('');
}
</script>
</body>
</html>
