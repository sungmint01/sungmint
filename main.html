<!DOCTYPE html>
<html lang="ko">
<head>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sungmint</title>
        <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gothic+A1:wght@300;400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>:root{
  --p1:#9D91EE;--p2:#BCB4F8;--p3:#D4CFF8;
  --warm:#E8795A;--cool:#56A08A;
  --shadow:rgba(120,100,200,.10);
}

    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR','MaruBuri',sans-serif;background:#F0EEFF;color:#42407A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;background-image:radial-gradient(circle at 15% 15%,rgba(140,130,230,.10) 0%,transparent 50%),radial-gradient(circle at 85% 85%,rgba(140,130,230,.10) 0%,transparent 50%)}
    .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;gap:32px}
    .logo-badge{display:inline-flex;align-items:center;gap:7px;background:#E8E2FF;border-radius:99px;padding:6px 16px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:3px;color:#9D91EE;box-shadow:3px 3px 8px rgba(150,140,240,.35),-2px -2px 6px rgba(255,255,255,.9);margin-bottom:14px;text-transform:uppercase}
    .logo-badge-dot{width:5px;height:5px;border-radius:50%;background:#9D91EE;display:inline-block}
    .logo-text{font-family:'Nanum Myeongjo',serif;font-size:52px;font-weight:800;color:#42407A;line-height:1.05}
    .logo-text-em{color:#9D91EE;font-style:italic}
    .logo-divider{width:36px;height:2px;background:linear-gradient(90deg,#9D91EE,transparent);margin:12px auto}
    .logo-sub{font-family:'Noto Sans KR','MaruBuri',sans-serif;font-size:13px;font-weight:300;color:#7A78A8}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
    .card{display:block;text-decoration:none;background:#F0EEFF;border-radius:20px;padding:22px 18px 42px;position:relative;overflow:hidden;box-shadow:5px 5px 14px rgba(150,140,240,.35),-4px -4px 12px rgba(255,255,255,.9);transition:box-shadow .2s,transform .2s}
    .card:hover{transform:translateY(-3px);box-shadow:8px 8px 20px rgba(150,140,240,.40),-5px -5px 14px rgba(255,255,255,.9)}
    .card-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:14px;box-shadow:3px 3px 8px rgba(150,140,240,.30),-2px -2px 6px rgba(255,255,255,.85)}
    .card-title{font-family:'Gothic A1',sans-serif;font-weight:700;font-size:15px;color:#42407A;margin-bottom:4px}
    .card-desc{font-size:11px;color:#BCB4F8;line-height:1.7;font-weight:300}
    .card-arrow{position:absolute;bottom:16px;right:16px;background:linear-gradient(135deg,#BCB4F8,#9D91EE);border-radius:99px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;box-shadow:2px 2px 6px rgba(140,130,230,.30)}
    .wide-wrap{display:flex;flex-direction:column;gap:10px;width:100%}
    .card-wide{display:flex;align-items:center;gap:14px;text-decoration:none;background:#F0EEFF;border-radius:18px;padding:15px 18px;width:100%;box-shadow:5px 5px 14px rgba(150,140,240,.35),-4px -4px 12px rgba(255,255,255,.9);transition:box-shadow .2s,transform .2s}
    .card-wide:hover{transform:translateY(-2px);box-shadow:7px 7px 18px rgba(150,140,240,.40),-5px -5px 12px rgba(255,255,255,.9)}
    .wide-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:3px 3px 8px rgba(150,140,240,.30),-2px -2px 6px rgba(255,255,255,.85)}
    .wide-title{font-family:'Gothic A1',sans-serif;font-weight:700;font-size:14px;color:#42407A;margin-bottom:2px}
    .wide-desc{font-family:'Noto Sans KR','MaruBuri',sans-serif;font-size:11px;font-weight:300;color:#BCB4F8}
    .wide-pill{margin-left:auto;background:linear-gradient(135deg,#BCB4F8,#9D91EE);border-radius:99px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;box-shadow:2px 2px 6px rgba(140,130,230,.30);flex-shrink:0}
    .footer{font-family:'Space Mono',monospace;font-size:9px;color:#B0B0D0;letter-spacing:3px}
    .admin-link{position:fixed;top:14px;right:16px;background:#E8E2FF;border:none;border-radius:8px;padding:5px 12px;font-family:'Space Mono',monospace;font-size:10px;color:#9D91EE;text-decoration:none;box-shadow:2px 2px 6px rgba(145,165,210,.5),-1px -1px 4px rgba(255,255,255,.8);letter-spacing:1px;transition:.15s}
    .admin-link:hover{box-shadow:3px 3px 8px rgba(150,140,240,.35),-2px -2px 5px rgba(255,255,255,.9)}
    @media(max-width:400px){.cards{grid-template-columns:1fr}.logo-text{font-size:42px}}
  .clinic-link{position:fixed;top:14px;right:100px;background:#E8E2FF;border:none;border-radius:8px;padding:5px 12px;font-family:'Space Mono',monospace;font-size:10px;color:#9D91EE;text-decoration:none;box-shadow:2px 2px 6px rgba(145,165,210,.5),-1px -1px 4px rgba(255,255,255,.8);letter-spacing:1px;transition:.15s}
  .clinic-link:hover{box-shadow:3px 3px 8px rgba(150,140,240,.35),-2px -2px 5px rgba(255,255,255,.9)}
  </style>
  <style>
    @font-face {
      font-family: 'MaruBuri';
      src: url('./MaruBuri-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
  </style>
</head>
<body>

    <div class="cards">

        <div class="card-arrow">›</div>
      </a>
      <a class="card" href="./od4p.html">
        <div class="card-icon">📚</div>
        <div class="card-title">OD4P_하루4문제</div>

      </a>
    </div>
    <div class="wide-wrap">
      <a class="card-wide" href="./student.html">
        <div class="wide-icon">✏️</div>
        <div><div class="wide-title">학생 페이지</div><div class="wide-desc">숙제 확인 · 플래너 제출</div></div>
        <div class="wide-pill">›</div>
      </a>
      <a class="card-wide" href="./view.html">
        <div class="wide-icon">📋</div>
        <div><div class="wide-title">학부모 페이지</div><div class="wide-desc">수업 현황 · 숙제 · 플래너 확인</div></div>
        <div class="wide-pill">›</div>
      </a>
    </div>
    <div class="footer">SUNGMINT · MATH TOOLS</div>
  </div>
