<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수업 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f7fa;color:#1e293b;min-height:100vh}
:root{--blue:#74B3D8;--blue-dark:#5a9ec7;--rose:#ED9499;--yellow:#F5C842}

/* Loading / Error */
#loadScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f7fa}
.spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{color:#64748b;font-size:14px;text-align:center}
.error-box{text-align:center;padding:32px}
.error-box .icon{font-size:56px;margin-bottom:16px}
.error-box h2{font-size:20px;font-weight:700;color:#1e293b;margin-bottom:8px}
.error-box p{font-size:14px;color:#64748b;line-height:1.6}

/* Header */
#mainWrap{display:none;max-width:720px;margin:0 auto;padding:0 16px 60px}
.page-header{background:linear-gradient(135deg,#1e3a5f 0%,#2d5a8e 100%);margin:0 -16px;padding:36px 32px 50px;position:relative;overflow:hidden}
.page-header::before{content:'';position:absolute;top:-30px;right:-30px;width:180px;height:180px;background:rgba(116,179,216,.15);border-radius:50%}
.page-header::after{content:'';position:absolute;bottom:-40px;left:40%;width:120px;height:120px;background:rgba(116,179,216,.08);border-radius:50%}
.academy-label{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:16px;letter-spacing:.05em}
.student-name{font-size:30px;font-weight:700;color:#fff;margin-bottom:6px}
.student-meta{display:flex;gap:10px;flex-wrap:wrap}
.meta-tag{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);border-radius:6px;padding:4px 12px;font-size:12px;font-weight:500}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:-28px;margin-bottom:24px;position:relative;z-index:1}
.stat-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 4px 16px rgba(0,0,0,.08);text-align:center}
.stat-num{font-size:24px;font-weight:700;color:var(--blue);line-height:1}
.stat-label{font-size:11px;color:#64748b;margin-top:4px;font-weight:500}

/* Sessions */
.section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#0f172a}
.session-card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden;transition:box-shadow .2s}
.session-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.session-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;cursor:pointer;user-select:none}
.session-date-wrap{display:flex;align-items:center;gap:10px}
.session-num{background:var(--blue);color:#fff;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700}
.session-date{font-size:14px;font-weight:600;color:#1e293b}
.session-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-상{background:#dcfce7;color:#15803d}
.badge-중{background:#fef9c3;color:#b45309}
.badge-하{background:#fee2e2;color:#b91c1c}
.badge-완료{background:#dcfce7;color:#15803d}
.badge-부분완료{background:#fef3c7;color:#b45309}
.badge-미완료{background:#fee2e2;color:#b91c1c}
.badge-없음{background:#f1f5f9;color:#94a3b8}
.chevron{color:#94a3b8;transition:transform .25s;font-size:16px;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.session-body{padding:0 20px 18px;border-top:1px solid #f1f5f9;display:none;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.session-body.open{display:block}
.info-grid{display:grid;grid-template-columns:100px 1fr;gap:6px 12px;margin-top:14px;font-size:13px}
.info-key{color:#94a3b8;font-weight:500;padding-top:1px}
.info-val{color:#334155;line-height:1.6;word-break:break-all}
.info-val.empty{color:#cbd5e1;font-style:italic}
.note-box{background:#fffbea;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:13px;color:#854d0e;line-height:1.6}
.note-box::before{content:'📌 ';font-style:normal}

/* Consultation form */
.consult-section{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:24px;margin-top:28px}
.consult-section h2{font-size:16px;font-weight:700;margin-bottom:6px}
.consult-section p{font-size:13px;color:#64748b;margin-bottom:18px;line-height:1.6}
.form-input{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;transition:.2s;background:#fff}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(116,179,216,.15)}
textarea.form-input{resize:vertical;min-height:100px}
.submit-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-top:12px;transition:.2s}
.submit-btn:hover{background:var(--blue-dark)}
.submit-btn:disabled{background:#cbd5e1;cursor:not-allowed}
.success-msg{background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:12px 16px;font-size:13px;color:#15803d;margin-top:12px;display:none;text-align:center}
.err-msg{color:#ef4444;font-size:13px;margin-top:6px;min-height:18px}

/* Recent consults list */
.sent-item{background:#f8fafc;border-radius:8px;padding:12px 14px;margin-top:10px;font-size:13px;color:#475569;border-left:3px solid var(--blue);line-height:1.6}
.sent-time{font-size:11px;color:#94a3b8;margin-bottom:4px}

/* Footer */
.page-footer{text-align:center;padding:32px 0 16px;color:#cbd5e1;font-size:12px}

/* Responsive */
@media(max-width:480px){
  .stats-bar{grid-template-columns:repeat(3,1fr);gap:8px}
  .stat-num{font-size:20px}
  .info-grid{grid-template-columns:90px 1fr}
  .session-badges{gap:4px}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loadScreen">
  <div>
    <div class="spinner"></div>
    <p class="load-text" id="loadMsg">불러오는 중...</p>
  </div>
</div>

<!-- Main -->
<div id="mainWrap">
  <!-- Header -->
  <div class="page-header">
    <div class="academy-label">📚 수업 현황</div>
    <div class="student-name" id="hName"></div>
    <div class="student-meta">
      <span class="meta-tag" id="hGrade"></span>
      <span class="meta-tag" id="hSubject"></span>
    </div>
  </div>

  <div style="padding:0">
    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">총 수업 횟수</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statHw">-</div>
        <div class="stat-label">숙제 완료율</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statLast">-</div>
        <div class="stat-label">최근 성취도</div>
      </div>
    </div>

    <!-- Sessions -->
    <div class="section-title">📋 수업 기록</div>
    <div id="sessionsList">
      <p style="text-align:center;color:#94a3b8;padding:32px;font-size:13px">아직 수업 기록이 없습니다</p>
    </div>

    <!-- Consultation -->
    <div class="consult-section">
      <h2>💬 상담 요청</h2>
      <p>선생님께 궁금한 점이나 전달하고 싶은 내용을 남겨주세요.<br>확인 후 연락드리겠습니다.</p>
      <input class="form-input" id="cName" type="text" placeholder="보내는 분 (예: 홍길동 어머니)" style="margin-bottom:10px">
      <textarea class="form-input" id="cContent" placeholder="내용을 입력해주세요"></textarea>
      <div class="err-msg" id="cErr"></div>
      <button class="submit-btn" id="cSubmit" onclick="submitConsult()">상담 요청 보내기</button>
      <div class="success-msg" id="cSuccess">✅ 요청이 전송되었습니다. 곧 연락드리겠습니다.</div>
      <div id="sentList"></div>
    </div>

    <div class="page-footer">이 페이지는 학부모 확인용 페이지입니다</div>
  </div>
</div>

<script>
// ============================================================
// ⚠️ Firebase 설정 — student-admin/index.html과 동일한 설정
// ============================================================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============================================================
// Load student by token
// ============================================================
const token = new URLSearchParams(location.search).get('token');
let studentId = null;
let sentConsults = [];

async function load() {
  if (!token) { showError('잘못된 링크입니다.', '올바른 학부모 링크를 통해 접속해주세요.'); return; }
  try {
    const snap = await db.ref('studentMgmt/students').orderByChild('token').equalTo(token).get();
    if (!snap.exists()) { showError('학생을 찾을 수 없습니다.', '링크가 만료되었거나 잘못된 링크입니다.'); return; }
    const data = snap.val();
    studentId = Object.keys(data)[0];
    const student = data[studentId];
    document.title = `${student.name} — 수업 현황`;
    document.getElementById('hName').textContent = student.name||'';
    document.getElementById('hGrade').textContent = student.grade||'';
    document.getElementById('hSubject').textContent = student.subject||'';
    document.getElementById('loadScreen').style.display = 'none';
    document.getElementById('mainWrap').style.display = '';
    // Load sessions (realtime)
    db.ref(`studentMgmt/sessions/${studentId}`).on('value', snap => {
      renderSessions(snap.val()||{});
    });
    // Load sent consultations from localStorage (UI feedback only)
    const stored = localStorage.getItem(`consults_${studentId}`);
    if (stored) sentConsults = JSON.parse(stored);
    renderSentList();
  } catch(e) {
    showError('오류가 발생했습니다.', e.message);
  }
}

function showError(title, msg) {
  document.getElementById('loadScreen').innerHTML = `
    <div class="error-box">
      <div class="icon">😔</div>
      <h2>${title}</h2>
      <p>${msg}</p>
    </div>`;
}

// ============================================================
// Render sessions
// ============================================================
function fmtDate(d) {
  if (!d) return '-';
  const [y,m,dd] = d.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(dd)}일`;
}

function renderSessions(data) {
  const list = document.getElementById('sessionsList');
  const entries = Object.entries(data).sort(([,a],[,b])=>{
    if (a.date!==b.date) return (b.date||'').localeCompare(a.date||'');
    return (b.num||0)-(a.num||0);
  });

  // Stats
  document.getElementById('statTotal').textContent = entries.length;
  if (entries.length) {
    const hwEntries = entries.filter(([,s])=>s.hwStatus && s.hwStatus!=='없음');
    const hwDone = hwEntries.filter(([,s])=>s.hwStatus==='완료').length;
    document.getElementById('statHw').textContent = hwEntries.length ? `${Math.round(hwDone/hwEntries.length*100)}%` : '-';
    document.getElementById('statLast').textContent = entries[0][1].achieve || '-';
  }

  if (!entries.length) {
    list.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:32px;font-size:13px">아직 수업 기록이 없습니다</p>';
    return;
  }

  list.innerHTML = entries.map(([sid,s],i)=>{
    const isLatest = i===0;
    return `<div class="session-card">
      <div class="session-header" onclick="toggleSession('${sid}')">
        <div class="session-date-wrap">
          <span class="session-num">${s.num||'-'}회차</span>
          <div>
            <div class="session-date">${fmtDate(s.date)} ${isLatest?'<span style="font-size:11px;background:#fef3c7;color:#b45309;border-radius:4px;padding:1px 6px;font-weight:600">최근</span>':''}</div>
          </div>
        </div>
        <div class="session-badges">
          <span class="badge badge-${s.hwStatus||'없음'}" title="숙제">${s.hwStatus||'-'}</span>
          <span class="badge badge-${s.achieve||'-'}" title="성취도">성취 ${s.achieve||'-'}</span>
          <span class="chevron ${isLatest?'open':''}" id="chev-${sid}">▾</span>
        </div>
      </div>
      <div class="session-body ${isLatest?'open':''}" id="body-${sid}">
        <div class="info-grid">
          <span class="info-key">진도</span>
          <span class="info-val ${s.progress?'':'empty'}">${s.progress||'기록 없음'}</span>
          <span class="info-key">숙제 내용</span>
          <span class="info-val ${s.hwContent?'':'empty'}">${s.hwContent||'기록 없음'}</span>
          <span class="info-key">클리닉</span>
          <span class="info-val ${s.clinic?'':'empty'}">${s.clinic ? s.clinic.replace(/\n/g,'<br>') : '기록 없음'}</span>
        </div>
        ${s.notes?`<div class="note-box">${s.notes.replace(/\n/g,'<br>')}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleSession(sid) {
  const body = document.getElementById(`body-${sid}`);
  const chev = document.getElementById(`chev-${sid}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

// ============================================================
// Consultation submit
// ============================================================
async function submitConsult() {
  const name = document.getElementById('cName').value.trim();
  const content = document.getElementById('cContent').value.trim();
  const err = document.getElementById('cErr');
  if (!name) { err.textContent = '보내는 분을 입력해주세요'; return; }
  if (!content) { err.textContent = '내용을 입력해주세요'; return; }
  err.textContent = '';
  const btn = document.getElementById('cSubmit');
  btn.disabled = true;
  btn.textContent = '전송 중...';
  try {
    await db.ref(`studentMgmt/consultations/${studentId}`).push({
      name, content, ts: Date.now(), isRead: false
    });
    // Save locally for display
    sentConsults.unshift({ name, content, ts: Date.now() });
    localStorage.setItem(`consults_${studentId}`, JSON.stringify(sentConsults.slice(0,10)));
    renderSentList();
    document.getElementById('cName').value = '';
    document.getElementById('cContent').value = '';
    document.getElementById('cSuccess').style.display = 'block';
    setTimeout(()=>document.getElementById('cSuccess').style.display='none', 4000);
  } catch(e) {
    err.textContent = '전송 실패: ' + e.message;
  }
  btn.disabled = false;
  btn.textContent = '상담 요청 보내기';
}

function renderSentList() {
  const el = document.getElementById('sentList');
  if (!sentConsults.length) { el.innerHTML=''; return; }
  el.innerHTML = `<p style="font-size:12px;color:#94a3b8;margin-top:16px;margin-bottom:6px">내가 보낸 요청</p>` +
    sentConsults.slice(0,5).map(c=>`
      <div class="sent-item">
        <div class="sent-time">${new Date(c.ts).toLocaleString('ko-KR')} · ${c.name}</div>
        <div>${c.content}</div>
      </div>`).join('');
}

load();
</script>
</body>
</html>
