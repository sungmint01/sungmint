<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 — 성민T</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f8faff;color:#1a202c;min-height:100vh}
:root{--bl:#74B3D8;--bld:#5a9ec7;--pu:#a78bfa;--pud:#8b5cf6}

/* Login */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0533,#3b1d6e,#5b2d9e)}
.lbox{background:#fff;border-radius:22px;padding:44px 36px;width:320px;box-shadow:0 24px 60px rgba(0,0,0,.3);text-align:center}
.lbox .ico{width:58px;height:58px;background:linear-gradient(135deg,var(--pu),var(--pud));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px}
.lbox h1{font-family:'Black Han Sans',sans-serif;font-size:22px;margin-bottom:4px;background:linear-gradient(135deg,var(--pu),var(--pud));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lbox .sub{font-family:'Space Mono',monospace;font-size:10px;color:#94a3b8;letter-spacing:2px;margin-bottom:28px;text-transform:uppercase}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:.2s;margin-bottom:12px}
.inp:focus{border-color:var(--pu);box-shadow:0 0 0 3px rgba(167,139,250,.15)}
.btn-pri{width:100%;background:linear-gradient(135deg,var(--pu),var(--pud));color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.btn-pri:hover{opacity:.9}
.errmsg{color:#ef4444;font-size:12px;margin-top:8px;min-height:16px}
.back-link{display:block;margin-top:16px;font-size:12px;color:#94a3b8;text-decoration:none;font-family:'Space Mono',monospace}
.back-link:hover{color:#64748b}

/* App */
#app{display:none;max-width:560px;margin:0 auto;padding:0 14px 60px}

/* Header */
.hdr{background:linear-gradient(135deg,#1a0533,#3b1d6e,#5b2d9e);padding:32px 20px 56px;margin:0 -14px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;width:220px;height:220px;background:radial-gradient(circle,rgba(167,139,250,.2),transparent 70%);top:-50px;right:-30px;pointer-events:none}
.hdr-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,.75);font-family:'Space Mono',monospace;letter-spacing:.04em;margin-bottom:14px}
.hdr-name{font-family:'Black Han Sans',sans-serif;font-size:26px;color:#fff;margin-bottom:6px}
.hdr-sub{font-size:13px;color:rgba(255,255,255,.55)}
.logout-btn{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:11px;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit}

/* Today homework card */
.hw-card{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:22px;margin-top:-28px;position:relative;z-index:1;margin-bottom:16px;border-top:4px solid var(--pu)}
.hw-label{font-family:'Space Mono',monospace;font-size:9px;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.hw-title{font-family:'Black Han Sans',sans-serif;font-size:18px;margin-bottom:14px;background:linear-gradient(135deg,var(--pu),var(--pud));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hw-date{font-size:12px;color:#94a3b8;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hw-content{background:#f5f3ff;border-radius:10px;padding:14px 16px;font-size:14px;color:#374151;line-height:1.7;font-weight:500}
.hw-empty{font-size:13px;color:#94a3b8;text-align:center;padding:20px 0;font-style:italic}
.hw-nav{display:flex;gap:8px;margin-top:12px}
.hw-nav-btn{background:#f1f5f9;border:none;border-radius:8px;padding:6px 12px;font-size:12px;color:#475569;cursor:pointer;font-family:inherit;transition:.15s}
.hw-nav-btn:hover{background:#e2e8f0}
.hw-nav-btn.active{background:var(--pu);color:#fff}

/* Planner upload */
.planner-card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.pc-head{padding:16px 20px 12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.pc-title{font-family:'Black Han Sans',sans-serif;font-size:16px;background:linear-gradient(135deg,var(--pu),var(--pud));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.upload-area{margin:16px 20px;border:2px dashed #e2e8f0;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.upload-area:hover{border-color:var(--pu);background:#faf5ff}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:13px;color:#64748b;line-height:1.6}
.upload-text strong{color:var(--pu)}
.date-row{display:flex;align-items:center;gap:10px;margin:0 20px 12px}
.date-label{font-size:12px;font-weight:600;color:#374151;white-space:nowrap}
.date-inp{flex:1;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:.2s}
.date-inp:focus{border-color:var(--pu)}
.upload-btn{width:calc(100% - 40px);margin:0 20px 20px;background:linear-gradient(135deg,var(--pu),var(--pud));color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.upload-btn:hover{opacity:.9}
.upload-btn:disabled{background:#cbd5e1;cursor:not-allowed}
.preview-img{width:100%;border-radius:10px;margin:0 0 12px;object-fit:cover;max-height:300px;display:none}
.prog-bar{height:4px;background:#e2e8f0;border-radius:99px;margin:0 20px 12px;overflow:hidden;display:none}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pu),var(--pud));border-radius:99px;transition:width .3s}
.upload-msg{font-size:12px;text-align:center;margin:0 20px 8px;min-height:16px}
.upload-msg.ok{color:#15803d}
.upload-msg.err{color:#ef4444}

/* Planner history */
.plan-list{padding:0 20px 20px}
.plan-item{background:#f8fafc;border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid #e2e8f0}
.plan-item-head{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.plan-date{font-size:13px;font-weight:600;color:#374151}
.plan-img{width:100%;max-height:280px;object-fit:cover;cursor:pointer}
.plan-comment{background:#f0fdf4;border-top:1px solid #dcfce7;padding:10px 14px;font-size:13px;color:#166534;line-height:1.6}
.plan-comment-head{font-size:11px;font-weight:700;color:#15803d;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.plan-no-comment{padding:10px 14px;font-size:12px;color:#94a3b8;font-style:italic}

/* Image lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

.empty-plan{text-align:center;padding:28px;color:#94a3b8;font-size:13px}
.type-row{display:flex;gap:8px;margin:0 20px 12px}
.type-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8faff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#64748b;transition:.15s;text-align:center}
.type-btn:hover{border-color:#a78bfa;background:#faf5ff}
.type-btn.sel{border-color:#a78bfa;background:#f5f3ff;color:#7c3aed}
.plan-type-badge{display:inline-flex;align-items:center;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:600}
.badge-plan{background:#eff6ff;color:#2563eb}
.badge-done{background:#f0fdf4;color:#15803d}
.section-title{font-family:'Black Han Sans',sans-serif;font-size:15px;margin-bottom:10px;color:#374151}
</style>
</head>
<body>

<!-- Login -->
<div id="loginPage">
  <div class="lbox">
    <div class="ico">✏️</div>
    <h1>성민T 학생</h1>
    <p class="sub">Student Portal</p>
    <input class="inp" type="password" id="pwIn" placeholder="학생 비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-pri" onclick="doLogin()">로그인</button>
    <div class="errmsg" id="lerr"></div>
    <a class="back-link" href="./main.html">← 홈으로</a>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="hdr">
    <button class="logout-btn" onclick="logout()">로그아웃</button>
    <div class="hdr-badge">✏️ Student</div>
    <div class="hdr-name" id="stuName"></div>
    <div class="hdr-sub" id="stuSub"></div>
  </div>

  <!-- Today HW -->
  <div class="hw-card">
    <div class="hw-label">Today's Homework</div>
    <div class="hw-title">오늘의 숙제</div>
    <div class="hw-date" id="hwDate"></div>
    <div id="hwContent"><div class="hw-empty">오늘의 숙제가 없습니다</div></div>
    <div class="hw-nav" id="hwNav"></div>
  </div>

  <!-- Planner upload -->
  <div class="planner-card">
    <div class="pc-head">
      <span class="pc-title">📸 플래너 제출</span>
    </div>
    <div class="date-row">
      <span class="date-label">날짜</span>
      <input class="date-inp" type="date" id="planDate">
    </div>
    <div class="type-row">
      <button class="type-btn sel" id="typePlan" onclick="setType('plan')">📋 계획 플래너<br><span style="font-size:10px;font-weight:400;color:#94a3b8">전날 밤 · 아침</span></button>
      <button class="type-btn" id="typeDone" onclick="setType('done')">✅ 완료 플래너<br><span style="font-size:10px;font-weight:400;color:#94a3b8">하루 끝</span></button>
    </div>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*" onchange="onFileSelect(event)">
      <div class="upload-icon">📷</div>
      <div class="upload-text"><strong>사진 찍기 또는 선택</strong><br>플래너를 촬영하거나 갤러리에서 선택하세요</div>
    </div>
    <img class="preview-img" id="previewImg">
    <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="upload-msg" id="uploadMsg"></div>
    <button class="upload-btn" id="uploadBtn" onclick="uploadPlanner()" disabled>
      📤 플래너 제출하기
    </button>
  </div>

  <!-- Planner history -->
  <div class="planner-card">
    <div class="pc-head">
      <span class="pc-title">📋 제출 내역</span>
    </div>
    <div class="plan-list" id="planList">
      <div class="empty-plan">제출한 플래너가 없습니다</div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightboxImg">
</div>

<script>
let db, stuId = null, stuData = null, selectedFile = null, sessions = {}, planType = 'plan';

window.addEventListener('DOMContentLoaded', () => {
  if (typeof SM_CONFIG === 'undefined' || !SM_CONFIG.apiKey || SM_CONFIG.apiKey.includes('여기에')) {
    document.getElementById('loginPage').innerHTML = '<div style="color:#fff;text-align:center;padding:40px"><h2>⚠️ 설정 필요</h2></div>';
    return;
  }
  try {
    if (!firebase.apps.length) firebase.initializeApp(SM_CONFIG);
    db = firebase.database();
  } catch(e) { alert('Firebase 오류: ' + e.message); return; }
  document.getElementById('planDate').value = today();
});

async function doLogin() {
  const pw = document.getElementById('pwIn').value;
  if (!pw) return;
  const err = document.getElementById('lerr');
  err.textContent = '';
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hash = [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
  const snap = await db.ref('smStudents').get();
  const all = snap.val() || {};
  const entry = Object.entries(all).find(([,s]) => s.studentPwHash === hash);
  if (entry) {
    stuId = entry[0];
    stuData = entry[1];
    sessionStorage.setItem('stuId', stuId);
    sessionStorage.setItem('stuHash', hash);
    showApp();
  } else {
    err.textContent = '비밀번호가 올바르지 않습니다';
  }
}

function logout() {
  sessionStorage.removeItem('stuId');
  sessionStorage.removeItem('stuHash');
  location.reload();
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('stuName').textContent = stuData.name || '';
  document.getElementById('stuSub').textContent = `${stuData.grade||''} · ${stuData.subj||'수학'}`;
  // Load sessions for homework
  db.ref(`smSessions/${stuId}`).on('value', s => {
    sessions = s.val() || {};
    renderHomework();
  });
  // Load planners
  db.ref(`smPlanners/${stuId}`).on('value', s => {
    renderPlanners(s.val() || {});
  });
}

// ── Homework ──
function renderHomework() {
  const arr = Object.values(sessions)
    .filter(r => r.hwC)
    .sort((a,b) => (b.date||'').localeCompare(a.date||''));
  const todayStr = today();
  // Find today or most recent
  let target = arr.find(r => r.date === todayStr) || arr[0];
  if (!target) {
    document.getElementById('hwContent').innerHTML = '<div class="hw-empty">등록된 숙제가 없습니다</div>';
    document.getElementById('hwDate').textContent = '';
    document.getElementById('hwNav').innerHTML = '';
    return;
  }
  showHw(target, arr);
}

function showHw(rec, arr) {
  const [y,m,d] = rec.date.split('-');
  document.getElementById('hwDate').innerHTML = `📅 ${y}년 ${+m}월 ${+d}일`;
  document.getElementById('hwContent').innerHTML = `<div class="hw-content">${rec.hwC}</div>`;
  // Nav: previous sessions
  if (arr.length > 1) {
    const idx = arr.indexOf(rec);
    const nav = document.getElementById('hwNav');
    nav.innerHTML = arr.slice(0, Math.min(4, arr.length)).map((r, i) => {
      const [,mm,dd] = r.date.split('-');
      return `<button class="hw-nav-btn ${r===rec?'active':''}" onclick="showHwByIdx(${i})">${+mm}/${+dd}</button>`;
    }).join('');
    window._hwArr = arr;
  }
}

function showHwByIdx(i) {
  const arr = window._hwArr;
  if (arr && arr[i]) showHw(arr[i], arr);
}

// ── Planner upload ──
function setType(t) {
  planType = t;
  document.getElementById('typePlan').className = 'type-btn' + (t === 'plan' ? ' sel' : '');
  document.getElementById('typeDone').className = 'type-btn' + (t === 'done' ? ' sel' : '');
}

function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.style.display = 'block';
    img.style.margin = '0 20px 12px';
    img.style.width = 'calc(100% - 40px)';
  };
  reader.readAsDataURL(file);
  document.getElementById('uploadBtn').disabled = false;
  document.getElementById('uploadMsg').textContent = '';
}

async function uploadPlanner() {
  if (!selectedFile) return;
  const date = document.getElementById('planDate').value;
  if (!date) { alert('날짜를 선택하세요'); return; }

  const btn = document.getElementById('uploadBtn');
  const msg = document.getElementById('uploadMsg');
  const prog = document.getElementById('progBar');
  const fill = document.getElementById('progFill');
  btn.disabled = true;
  btn.innerHTML = '압축 중...';
  prog.style.display = 'block';
  fill.style.width = '30%';
  msg.textContent = '';

  try {
    // Compress to small base64 — no Storage needed
    const base64 = await compressToBase64(selectedFile, 900, 0.75);
    fill.style.width = '70%';
    btn.innerHTML = '저장 중...';

    await db.ref(`smPlanners/${stuId}`).push({
      date,
      type: planType,
      imageData: base64,   // base64 stored in RTDB
      ts: Date.now()
    });

    fill.style.width = '100%';
    const label = planType === 'plan' ? '계획' : '완료';
    msg.textContent = `✅ ${label} 플래너 제출 완료!`;
    msg.className = 'upload-msg ok';
    setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 600);
    document.getElementById('previewImg').style.display = 'none';
    document.getElementById('previewImg').src = '';
    document.getElementById('fileInput').value = '';
    selectedFile = null;
    btn.disabled = false;
    btn.innerHTML = '📤 플래너 제출하기';
    setTimeout(() => { msg.textContent = ''; }, 4000);

  } catch(e) {
    console.error(e);
    msg.textContent = '❌ 오류: ' + e.message;
    msg.className = 'upload-msg err';
    prog.style.display = 'none';
    btn.disabled = false;
    btn.innerHTML = '📤 플래너 제출하기';
  }
}

// Compress image and return base64 string
function compressToBase64(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Planner list ──
function renderPlanners(data) {
  const el = document.getElementById('planList');
  const arr = Object.entries(data).sort(([,a],[,b]) => (b.ts||0)-(a.ts||0));
  if (!arr.length) { el.innerHTML = '<div class="empty-plan">제출한 플래너가 없습니다</div>'; return; }
  el.innerHTML = arr.map(([pid, p]) => {
    const [y,m,d] = (p.date||'').split('-');
    return `<div class="plan-item">
      <div class="plan-item-head">
        <span class="plan-date">📅 ${y}년 ${+m}월 ${+d}일</span>
        <span style="font-size:11px;color:#94a3b8">${new Date(p.ts||0).toLocaleString('ko-KR')}</span>
      </div>
      <img class="plan-img" src="${p.imageData||p.imageUrl||''}" onclick="openLightbox(this.src)" loading="lazy">
      ${p.comment
        ? `<div class="plan-comment">
             <div class="plan-comment-head">✏️ 선생님 코멘트</div>
             ${p.comment.replace(/\n/g,'<br>')}
           </div>`
        : `<div class="plan-no-comment">⏳ 코멘트 대기 중</div>`
      }
    </div>`;
  }).join('');
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function today() { return new Date().toISOString().split('T')[0]; }

// Auto-login if session exists
window.addEventListener('DOMContentLoaded', async () => {
  const sid = sessionStorage.getItem('stuId');
  const hash = sessionStorage.getItem('stuHash');
  if (sid && hash && db) {
    const snap = await db.ref(`smStudents/${sid}`).get();
    const s = snap.val();
    if (s && s.studentPwHash === hash) {
      stuId = sid; stuData = s;
      showApp();
    }
  }
});
</script>
</body>
</html>
