<script type="text/babel" data-presets="react">

function getYtId(url){
  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|v=|\/embed\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}

function compressImage(file, cb){
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX=800;
      let w=img.width, h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      const c=document.createElement("canvas");
      c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",0.6));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

// Firebase DB functions
function listenQs(cb){
  const ref=db.ref("questions");
  ref.on("value", snap=>{
    const val=snap.val()||{};
    cb(Object.values(val).sort((a,b)=>b.ts-a.ts));
  });
  return ()=>ref.off();
}
function pushQ(q){ return db.ref("questions/"+q.id).set(q); }
function updateQ(id,data){ return db.ref("questions/"+id).update(data); }
function deleteQ(id){ return db.ref("questions/"+id).remove(); }

// Question Card

          {q.comment&&<div style={{fontSize:13,color:"#33691e",lineHeight:1.6,marginBottom:10,background:"#dcedc8",borderRadius:8,padding:"8px 12px"}}>{q.comment}</div>}

            ?<div style={{borderRadius:10,overflow:"hidden"}}><iframe width="100%" height="220" src={"https://www.youtube.com/embed/"+ytId} frameBorder="0" allowFullScreen style={{display:"block"}}/></div>

          )}

      {big&&q.photo&&(

// Main App
function QnaApp(){
  const [questions,setQuestions]=useState([]);
  const [mode,setMode]=useState("student");
  const [pw,setPw]=useState("");
  const [pwErr,setPwErr]=useState(false);

  const emailAlertRef=useRef(true);

  const [submitting,setSubmitting]=useState(false);

  const [photo,setPhoto]=useState(null);

  const [qText,setQText]=useState("");

  const [subjectFilter,setSubjectFilter]=useState("전체");

    const unsub=listenQs(qs=>{setQuestions(qs);setLoading(false);});
    return unsub;

  const onFile=e=>{
    const f=e.target.files[0];
    if(!f) return;
    compressImage(f,(compressed)=>{setPhoto(compressed);setPreview(compressed);});

    if(!photo&&!qText.trim()) return;
    setSubmitting(true);

      // 이메일 알림
      if(emailAlertRef.current){
        try{
          await emailjs.send("service_fl4emqp","template_jsdwyw9",{
            subject: subject,
            question_text: qText.trim()||"(사진 첨부)",
            time: new Date().toLocaleString("ko-KR"),
          });
        }catch(e){ console.warn("이메일 오류:",e); }
      }
      setPhoto(null);setPreview(null);setQText("");setSubject("공통수학1");
      setDone(true);setTimeout(()=>setDone(false),3000);
    }catch(err){
      alert("전송 실패 😢\n원인: "+err.message);
    }finally{
      setSubmitting(false);
    }
  };

    if(pw===TEACHER_PW){setAuthed(true);setPwErr(false);}
    else{setPwErr(true);setPw("");}
  };

    if(!videoUrl.trim()&&!replyComment.trim()) return;
    await updateQ(qId,{answered:true,videoUrl:videoUrl.trim(),comment:replyComment.trim()});
    setReplyTarget(null);setVideoUrl("");setReplyComment("");
  };

  const onDelete=async(qId)=>{
    if(!window.confirm("삭제할까요?")) return;
    await deleteQ(qId);
    if(replyTarget===qId) setReplyTarget(null);
  };

        <div style={{display:"flex",alignItems:"center",gap:8}}>

              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>

// ── 시간 로직 ─────────────────────────────────────────
// 오전6시~다음날오전2시 접근 가능
function getAvailableDate(){
  const now=new Date();
  const h=now.getHours();
  if(h>=6){return now.toISOString().slice(0,10);}
  else if(h<2){const y=new Date(now);y.setDate(y.getDate()-1);return y.toISOString().slice(0,10);}
  else return null; // 오전2시~6시: 접근불가
}
function todayKey(){return new Date().toISOString().slice(0,10);}
function formatDate(d){if(!d)return"";const[y,m,day]=d.split("-");return`${parseInt(m)}월 ${parseInt(day)}일`;}
function getYtId(url){if(!url)return null;const m=url.match(/(?:youtu\.be\/|v=|\/embed\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;}

// ── Firebase ─────────────────────────────────────────
function listenQuiz(date,subKey,cb){
  const ref=db.ref(`od4p/${date}/${subKey}`);
  ref.on("value",snap=>cb(snap.val()));
  return()=>ref.off("value");
}
function saveProblems(date,subKey,problems){return db.ref(`od4p/${date}/${subKey}/problems`).set(problems);}
function saveSubmission(date,subKey,name,answers){
  const key=name.replace(/[.#$[\]\s]/g,"_")+"-"+Date.now();
  return db.ref(`od4p/${date}/${subKey}/submissions/${key}`).set({name,answers,ts:Date.now()});
}
function deleteSubmission(date,subKey,subId){return db.ref(`od4p/${date}/${subKey}/submissions/${subId}`).remove();}
function deleteAllSubmissions(date,subKey){return db.ref(`od4p/${date}/${subKey}/submissions`).remove();}
async function fetchAllData(){
  const snap=await db.ref("od4p").once("value");
  return snap.val()||{};
}
async function listenAllDates(cb){
  db.ref("od4p").on("value",snap=>cb(snap.val()||{}));
  return()=>db.ref("od4p").off();
}

    reader.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");const MAX=1000;let w=img.width,h=img.height;if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);updateProb(i,"image",c.toDataURL("image/jpeg",0.7));};img.src=ev.target.result;};
    reader.readAsDataURL(file);
  };
  const loadIntoForm=()=>{
    const data=allData?.[editDate]?.[editSub.key];
    if(!data?.problems){alert("해당 날짜/과목에 저장된 문제가 없어요");return;}
    const loaded=Object.values(data.problems).map(p=>({type:p.type||"객관식",unit:p.unit||"",question:p.question||"",image:p.image||"",options:p.options||["","","","",""],answer:String(p.answer||"1"),solutionText:p.solutionText||"",solutionImage:p.solutionImage||""}));
    while(loaded.length<4)loaded.push(emptyProb());
    setProblems(loaded.slice(0,4));
  };
  const handleSolImg=(i,e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");const MAX=1000;let w=img.width,h=img.height;if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);updateProb(i,"solutionImage",c.toDataURL("image/jpeg",0.7));};img.src=ev.target.result;};
    reader.readAsDataURL(file);
  };
  const saveQuiz=async()=>{
    const cleaned=problems.map(p=>{const base={type:p.type,unit:p.unit.trim(),question:p.question.trim(),image:p.image||"",solutionText:p.solutionText.trim(),solutionImage:p.solutionImage||"",answer:p.answer};if(p.type==="객관식")base.options=p.options.map(o=>o.trim());return base;});
    await saveProblems(editDate,editSub.key,cleaned);
    setSaveOk(true);setTimeout(()=>setSaveOk(false),3000);
  };

  // 날짜 목록 (allData 기준)
  const allDates=useMemo(()=>{
    const dates=new Set(Object.keys(allData||{}));
    dates.add(todayKey());
    return Array.from(dates).sort().reverse();
  },[allData]);

  // 현황 데이터
  const curData=allData?.[selDate]?.[selSub.key];
  const curSubs=curData?.submissions?Object.values(curData.submissions):[];
  const curProbs=curData?.problems?Object.values(curData.problems):[];

  // 학생 분석 데이터
  const studentStats=useMemo(()=>{
    const stats={};
    Object.entries(allData||{}).forEach(([date,dateData])=>{
      SUBJECTS.forEach(sub=>{
        const subData=dateData?.[sub.key];
        if(!subData?.problems||!subData?.submissions)return;
        const probs=Object.values(subData.problems);
        Object.values(subData.submissions).forEach(submission=>{
          const sName=submission.name;
          if(!stats[sName])stats[sName]={total:0,correct:0,byUnit:{},bySub:{}};
          if(!stats[sName].bySub[sub.label])stats[sName].bySub[sub.label]={total:0,correct:0};
          probs.forEach((p,i)=>{
            const ua=String(submission.answers?.[i]||"").trim();
            const correct=p.type==="객관식"?ua===String(p.answer):ua.replace(/\s/g,"")===String(p.answer).replace(/\s/g,"");
            stats[sName].total++;
            stats[sName].bySub[sub.label].total++;
            if(correct){stats[sName].correct++;stats[sName].bySub[sub.label].correct++;}
            const unit=p.unit||"미분류";
            if(!stats[sName].byUnit[unit])stats[sName].byUnit[unit]={total:0,correct:0};
            stats[sName].byUnit[unit].total++;
            if(correct)stats[sName].byUnit[unit].correct++;
          });
        });
      });
    });
    return stats;
  },[allData]);

  if(!authed)return(
    <div style={{maxWidth:340,margin:"80px auto",padding:"0 20px",textAlign:"center"}}>
      <div style={{fontSize:36,marginBottom:12}}>🔐</div>
      <div style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:22,color:"#f1f5f9",marginBottom:6}}>선생님 전용</div>
      <div style={{fontSize:13,color:"#64748b",marginBottom:24}}>비밀번호를 입력해 주세요</div>
      <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="비밀번호"
        style={{width:"100%",background:"#1e293b",border:"2px solid "+(pwErr?"#ef4444":"#334155"),borderRadius:10,padding:"12px 16px",fontSize:16,color:"#f1f5f9",outline:"none",textAlign:"center",marginBottom:8}}/>
      {pwErr&&<div style={{color:"#ef4444",fontSize:12,marginBottom:8}}>비밀번호가 틀렸어요</div>}
      <button onClick={login} style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:10,color:"#fff",padding:"13px 0",fontSize:15,fontWeight:900,cursor:"pointer",fontFamily:"'Black Han Sans',sans-serif",marginTop:4}}>입장하기</button>
    </div>
  );

  return(
    <div style={{maxWidth:800,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        <div style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:18,color:"#f1f5f9"}}>문제 관리</div>
        <div style={{display:"flex",gap:6,marginLeft:"auto",flexWrap:"wrap"}}>
          {[["upload","📝 출제"],["results","📊 현황"],["students","👥 학생 분석"]].map(([t,l])=>(
            <button key={t} onClick={()=>setTab(t)} style={{padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",background:tab===t?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#1e293b",color:tab===t?"#fff":"#64748b",fontWeight:700,fontSize:12}}>{l}</button>
          ))}
        </div>
      </div>

      {/* ── 출제 탭 ── */}
      {tab==="upload"&&(
        <div>
          <div style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",padding:"14px 16px",marginBottom:18,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>날짜</div>
              <input type="date" value={editDate} onChange={e=>setEditDate(e.target.value)}
                style={{background:"#0f172a",border:"2px solid #334155",borderRadius:8,padding:"7px 12px",fontSize:13,color:"#f1f5f9",outline:"none"}}/>
            </div>
            <div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>과목</div>
              <div style={{display:"flex",gap:6}}>
                {SUBJECTS.map(s=>(
                  <button key={s.key} onClick={()=>setEditSub(s)} style={{padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:editSub.key===s.key?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#334155",color:editSub.key===s.key?"#fff":"#94a3b8"}}>{s.label}</button>
                ))}
              </div>
            </div>
            <button onClick={loadIntoForm} style={{background:"#334155",border:"none",borderRadius:8,color:"#94a3b8",padding:"8px 14px",cursor:"pointer",fontSize:12,marginTop:16}}>기존 불러오기</button>
          </div>

          {problems.map((p,i)=>(
            <div key={i} style={{background:"#1e293b",borderRadius:14,border:"1px solid #334155",marginBottom:14,overflow:"hidden"}}>
              <div style={{padding:"11px 16px",borderBottom:"1px solid #0f172a",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Black Han Sans',sans-serif",fontSize:13,color:"#fff"}}>{i+1}</div>
                <span style={{fontWeight:700,color:"#f1f5f9",fontSize:13}}>문제 {i+1}</span>
                <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
                  {["객관식","단답형"].map(t=>(
                    <button key={t} onClick={()=>updateProb(i,"type",t)} style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:p.type===t?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#334155",color:p.type===t?"#fff":"#64748b"}}>{t}</button>
                  ))}
                </div>
              </div>
              <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:11}}>
                {/* 단원 */}
                <div>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:5}}>단원 (통계 분류용)</div>
                  <input value={p.unit} onChange={e=>updateProb(i,"unit",e.target.value)} placeholder="예: 지수법칙, 인수분해, 함수의 개념..."
                    style={{width:"100%",background:"#0f172a",border:"2px solid #334155",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#f1f5f9",outline:"none"}}/>
                </div>
                {/* 이미지 */}
                <div>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:5}}>문제 이미지 (선택)</div>
                  <input ref={fr[i]} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleImg(i,e)}/>
                  {p.image?(
                    <div style={{position:"relative",display:"inline-block"}}>
                      <img src={p.image} style={{maxWidth:"100%",maxHeight:180,borderRadius:8,objectFit:"contain",background:"#fff"}}/>
                      <button onClick={()=>updateProb(i,"image","")} style={{position:"absolute",top:5,right:5,background:"#ef4444",border:"none",borderRadius:"50%",width:22,height:22,color:"#fff",cursor:"pointer",fontWeight:900,fontSize:11}}>✕</button>
                    </div>
                  ):(
                    <button onClick={()=>fr[i].current?.click()} style={{background:"#0f172a",border:"2px dashed #334155",borderRadius:8,color:"#64748b",padding:"10px 18px",cursor:"pointer",fontSize:12}}>📷 이미지 업로드</button>
                  )}
                </div>
                {/* 텍스트 */}
                <div>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:5}}>문제 텍스트 (선택)</div>
                  <textarea value={p.question} onChange={e=>updateProb(i,"question",e.target.value)} rows={2} placeholder="문제 내용 입력"
                    style={{width:"100%",background:"#0f172a",border:"2px solid #334155",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#f1f5f9",outline:"none",resize:"vertical"}}/>
                </div>
                {/* 객관식 보기 */}
                {p.type==="객관식"&&(
                  <div>
                    <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>보기 (번호 클릭 → 정답 설정)</div>
                    {p.options.map((opt,oi)=>(
                      <div key={oi} style={{display:"flex",gap:7,alignItems:"center",marginBottom:5}}>
                        <div onClick={()=>updateProb(i,"answer",String(oi+1))} style={{width:26,height:26,borderRadius:"50%",flexShrink:0,cursor:"pointer",background:p.answer===String(oi+1)?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#334155",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{oi+1}</div>
                        <input value={opt} onChange={e=>updateOpt(i,oi,e.target.value)} placeholder={`${oi+1}번 보기`}
                          style={{flex:1,background:"#0f172a",border:"2px solid "+(p.answer===String(oi+1)?"#6366f1":"#334155"),borderRadius:7,padding:"7px 11px",fontSize:12,color:"#f1f5f9",outline:"none"}}/>
                      </div>
                    ))}
                    <div style={{fontSize:11,color:"#6366f1",marginTop:3}}>✓ 정답: {p.answer}번</div>
                  </div>
                )}
                {/* 단답형 정답 */}
                {p.type==="단답형"&&(
                  <div>
                    <div style={{fontSize:11,color:"#64748b",marginBottom:5}}>정답</div>
                    <input value={p.answer} onChange={e=>updateProb(i,"answer",e.target.value)} placeholder="정답 입력"
                      style={{width:"100%",background:"#0f172a",border:"2px solid #6366f1",borderRadius:8,padding:"9px 12px",fontSize:13,color:"#4ade80",fontWeight:700,outline:"none"}}/>
                  </div>
                )}
                {/* 해설 */}
                <div style={{borderTop:"1px solid #334155",paddingTop:10}}>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>해설</div>
                  <textarea value={p.solutionText} onChange={e=>updateProb(i,"solutionText",e.target.value)} rows={2} placeholder="텍스트 해설 (선택)"
                    style={{width:"100%",background:"#0f172a",border:"2px solid #334155",borderRadius:8,padding:"9px 12px",fontSize:12,color:"#f1f5f9",outline:"none",resize:"vertical",marginBottom:7}}/>
                  <input ref={frs[i]} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleSolImg(i,e)}/>
                  {p.solutionImage?(
                    <div style={{position:"relative",display:"inline-block",marginBottom:7}}>
                      <img src={p.solutionImage} style={{maxWidth:"100%",maxHeight:160,borderRadius:8,objectFit:"contain",background:"#fff"}}/>
                      <button onClick={()=>updateProb(i,"solutionImage","")} style={{position:"absolute",top:5,right:5,background:"#ef4444",border:"none",borderRadius:"50%",width:22,height:22,color:"#fff",cursor:"pointer",fontWeight:900,fontSize:11}}>✕</button>
                    </div>
                  ):(
                    <button onClick={()=>frs[i].current?.click()} style={{background:"#0f172a",border:"2px dashed #334155",borderRadius:8,color:"#64748b",padding:"8px 16px",cursor:"pointer",fontSize:12,marginBottom:7}}>🖼️ 해설 이미지 업로드</button>
                  )}

                </div>
              </div>
            </div>
          ))}
          {saveOk?(
            <div style={{background:"#064e3b",border:"2px solid #059669",borderRadius:12,padding:14,textAlign:"center",color:"#4ade80",fontWeight:700}}>✅ {formatDate(editDate)} · {editSub.label} 저장 완료!</div>
          ):(
            <button onClick={saveQuiz} style={{width:"100%",background:"linear-gradient(135deg,#059669,#10b981)",border:"none",borderRadius:14,color:"#fff",padding:"15px 0",fontSize:16,fontWeight:900,cursor:"pointer",fontFamily:"'Black Han Sans',sans-serif"}}>💾 저장하기</button>
          )}
        </div>
      )}

      {/* ── 현황 탭 ── */}
      {tab==="results"&&(
        <div>
          {/* 날짜/과목 선택 */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
            {allDates.slice(0,10).map(d=>(
              <button key={d} onClick={()=>setSelDate(d)} style={{padding:"5px 12px",borderRadius:7,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:selDate===d?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#1e293b",color:selDate===d?"#fff":"#64748b"}}>
                {d===todayKey()?"오늘":formatDate(d)}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:18}}>
            {SUBJECTS.map(s=>(
              <button key={s.key} onClick={()=>setSelSub(s)} style={{padding:"6px 14px",borderRadius:7,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:selSub.key===s.key?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#1e293b",color:selSub.key===s.key?"#fff":"#64748b"}}>{s.label}</button>
            ))}
          </div>

          {!curData?.problems?(
            <div style={{textAlign:"center",padding:"60px",color:"#475569"}}><div style={{fontSize:32,marginBottom:8}}>📭</div>이 날은 문제가 없어요</div>
          ):(
            <>
              {/* 요약 카드 */}
              {(()=>{
                const total=curSubs.length;
                const scores=curSubs.map(s=>{let sc=0;curProbs.forEach((p,i)=>{const ua=String(s.answers?.[i]||"").trim();const correct=p.type==="객관식"?ua===String(p.answer):ua.replace(/\s/g,"")===String(p.answer).replace(/\s/g,"");if(correct)sc++;});return sc;});
                const avg=total?Math.round(scores.reduce((a,b)=>a+b,0)/total*10)/10:0;
                const perfect=scores.filter(s=>s===curProbs.length).length;
                return(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
                    {[{l:"제출 인원",v:total+"명",c:"#6366f1"},{l:"평균 점수",v:avg+"점",c:"#10b981"},{l:"만점자",v:perfect+"명",c:"#f59e0b"}].map((s,si)=>(
                      <div key={si} style={{background:"#1e293b",borderRadius:10,border:"1px solid #334155",padding:"12px 14px"}}>
                        <div style={{fontSize:10,color:"#64748b",marginBottom:3}}>{s.l}</div>
                        <div style={{fontWeight:900,fontSize:20,color:s.c}}>{s.v}</div>
                      </div>
                    ))}
                  </div>
                );
              })()}
              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
                <button onClick={()=>setConfirmDel({type:"all",date:selDate,subKey:selSub.key})} style={{background:"#450a0a",border:"1px solid #7f1d1d",borderRadius:8,color:"#f87171",padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:700}}>🗑️ 전체 기록 삭제</button>
              </div>
              {curSubs.length===0?(
                <div style={{textAlign:"center",padding:"40px",color:"#475569"}}>아직 제출자가 없어요</div>
              ):curSubs.sort((a,b)=>b.ts-a.ts).map((sub,si)=>{
                let score=0;
                const graded=curProbs.map((p,i)=>{const ua=String(sub.answers?.[i]||"").trim();const correct=p.type==="객관식"?ua===String(p.answer):ua.replace(/\s/g,"")===String(p.answer).replace(/\s/g,"");if(correct)score++;return{correct};});
                return(
                  <div key={si} style={{background:"#1e293b",borderRadius:12,border:"1px solid #334155",marginBottom:8,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                    <div style={{width:34,height:34,borderRadius:9,background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👤</div>
                    <div style={{flex:1,minWidth:80}}>
                      <div style={{fontWeight:700,fontSize:14,color:"#f1f5f9"}}>{sub.name}</div>
                      <div style={{fontSize:10,color:"#64748b"}}>{new Date(sub.ts).toLocaleString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</div>
                    </div>
                    <div style={{display:"flex",gap:4}}>
                      {graded.map((g,gi)=>(
                        <div key={gi} style={{width:28,height:28,borderRadius:6,background:g.correct?"#064e3b":"#450a0a",border:"1px solid "+(g.correct?"#059669":"#dc2626"),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>
                          <span style={{fontSize:8,color:"#64748b"}}>{gi+1}번</span>
                          <span style={{fontSize:11,color:g.correct?"#4ade80":"#f87171",fontWeight:700}}>{g.correct?"O":"X"}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:18,color:score===curProbs.length?"#fbbf24":score>=curProbs.length/2?"#4ade80":"#f87171",minWidth:40,textAlign:"right"}}>{score}/{curProbs.length}</div>
                    <button onClick={()=>{const subId=Object.keys(curData.submissions)[si];setConfirmDel({type:"one",date:selDate,subKey:selSub.key,subId,name:sub.name});}} style={{background:"#450a0a",border:"1px solid #7f1d1d",borderRadius:7,color:"#f87171",padding:"5px 9px",cursor:"pointer",fontSize:11}}>삭제</button>
                  </div>
                );
              })}
            </>
          )}
        </div>
      )}

      {/* ── 학생 분석 탭 ── */}
      {tab==="students"&&(
        <div>
          {!dataLoaded?(
            <div style={{textAlign:"center",padding:"60px",color:"#64748b"}}>불러오는 중...</div>
          ):Object.keys(studentStats).length===0?(
            <div style={{textAlign:"center",padding:"60px",color:"#475569"}}><div style={{fontSize:32,marginBottom:8}}>👤</div>아직 데이터가 없어요</div>
          ):(
            Object.entries(studentStats).sort((a,b)=>b[1].total-a[1].total).map(([sName,st])=>{
              const pct=st.total?Math.round(st.correct/st.total*100):0;
              // 취약 단원 (정답률 60% 미만)
              const weakUnits=Object.entries(st.byUnit).filter(([,v])=>v.total>=1&&Math.round(v.correct/v.total*100)<60).sort((a,b)=>Math.round(a[1].correct/a[1].total*100)-Math.round(b[1].correct/b[1].total*100));
              return(
                <div key={sName} style={{background:"#1e293b",borderRadius:14,border:"1px solid #334155",marginBottom:14,overflow:"hidden"}}>
                  <div style={{padding:"14px 18px",borderBottom:"1px solid #0f172a",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    <div style={{width:40,height:40,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>👤</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:16,color:"#f1f5f9"}}>{sName}</div>
                      <div style={{fontSize:11,color:"#64748b"}}>총 {st.total}문제 · {st.correct}개 정답</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:24,color:pct>=80?"#4ade80":pct>=60?"#fbbf24":"#f87171"}}>{pct}%</div>
                      <div style={{fontSize:10,color:"#64748b"}}>전체 정답률</div>
                    </div>
                  </div>
                  <div style={{padding:"14px 18px"}}>
                    {/* 과목별 */}
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>과목별 정답률</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        {Object.entries(st.bySub).map(([subLabel,sv])=>{
                          const sp=Math.round(sv.correct/sv.total*100);
                          return(
                            <div key={subLabel} style={{background:"#0f172a",borderRadius:8,padding:"8px 14px",border:"1px solid #334155"}}>
                              <div style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>{subLabel}</div>
                              <div style={{fontWeight:700,fontSize:15,color:sp>=80?"#4ade80":sp>=60?"#fbbf24":"#f87171"}}>{sp}% <span style={{fontSize:10,color:"#64748b"}}>({sv.correct}/{sv.total})</span></div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    {/* 단원별 */}
                    <div>
                      <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>단원별 정답률</div>
                      <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        {Object.entries(st.byUnit).sort((a,b)=>Math.round(a[1].correct/a[1].total*100)-Math.round(b[1].correct/b[1].total*100)).map(([unit,uv])=>{
                          const up=Math.round(uv.correct/uv.total*100);
                          return(
                            <div key={unit} style={{display:"flex",alignItems:"center",gap:10}}>
                              <div style={{fontSize:12,color:"#94a3b8",width:140,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{unit}</div>
                              <div style={{flex:1,height:6,background:"#334155",borderRadius:3,overflow:"hidden"}}>
                                <div style={{height:"100%",width:up+"%",background:up>=80?"#059669":up>=60?"#d97706":"#dc2626",borderRadius:3}}/>
                              </div>
                              <div style={{fontSize:12,fontWeight:700,color:up>=80?"#4ade80":up>=60?"#fbbf24":"#f87171",minWidth:40,textAlign:"right"}}>{up}%</div>
                              <div style={{fontSize:10,color:"#64748b",minWidth:36}}>({uv.correct}/{uv.total})</div>
                            </div>
                          );
                        })}
                      </div>
                      {weakUnits.length>0&&(
                        <div style={{marginTop:10,background:"#450a0a",borderRadius:8,padding:"8px 12px",border:"1px solid #7f1d1d"}}>
                          <div style={{fontSize:11,color:"#f87171",fontWeight:700,marginBottom:4}}>🎯 취약 단원</div>
                          <div style={{fontSize:12,color:"#fca5a5"}}>{weakUnits.map(([u])=>u).join(", ")}</div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })
          )}
        </div>
      )}
      {/* 삭제 확인 모달 */}
      {confirmDel&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}>
          <div style={{background:"#1e293b",borderRadius:16,border:"2px solid #7f1d1d",padding:28,maxWidth:340,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:12}}>🗑️</div>
            <div style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:18,color:"#f1f5f9",marginBottom:8}}>
              {confirmDel.type==="one"?`${confirmDel.name}의 기록을 삭제할까요?`:"이 날 전체 기록을 삭제할까요?"}
            </div>
            <div style={{fontSize:13,color:"#64748b",marginBottom:24}}>삭제 후 복구가 불가능해요</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirmDel(null)} style={{flex:1,background:"#334155",border:"none",borderRadius:10,color:"#94a3b8",padding:"12px 0",cursor:"pointer",fontSize:14,fontWeight:700}}>취소</button>
              <button onClick={async()=>{
                if(confirmDel.type==="one") await deleteSubmission(confirmDel.date,confirmDel.subKey,confirmDel.subId);
                else await deleteAllSubmissions(confirmDel.date,confirmDel.subKey);
                setConfirmDel(null);
              }} style={{flex:1,background:"#dc2626",border:"none",borderRadius:10,color:"#fff",padding:"12px 0",cursor:"pointer",fontSize:14,fontWeight:700}}>삭제</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:15,background:"linear-gradient(135deg,#6366f1,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>OD4P</span>

// ══════════════════════════════════
// 라우터
// ══════════════════════════════════
function App(){
  const[page,setPage]=useState(()=>{
    const h=window.location.hash.replace("#","");
    return (h==="qna"||h==="od4p")?h:"home";
  });
  const nav=(target)=>{window.location.hash=target;setPage(target);};
  useEffect(()=>{
    const fn=()=>{const h=window.location.hash.replace("#","");setPage((h==="qna"||h==="od4p")?h:"home");};
    window.addEventListener("hashchange",fn);
    return()=>window.removeEventListener("hashchange",fn);
  },[]);

  const BackBtn=({color})=>(
    <button onClick={()=>nav("home")} style={{position:"fixed",top:12,left:12,zIndex:999,background:"rgba(8,11,20,0.85)",backdropFilter:"blur(8px)",border:"1px solid #1e2d45",borderRadius:10,color:color||"#64748b",padding:"7px 14px",cursor:"pointer",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>← 홈</button>
  );

  if(page==="home") return <HomePage onNav={nav}/>;
  if(page==="qna") return <div style={{background:"#0f172a",minHeight:"100vh"}}><BackBtn color="#60a5fa"/><QnaApp/></div>;
  if(page==="od4p") return <div style={{background:"#0f172a",minHeight:"100vh"}}><BackBtn color="#a78bfa"/><OD4PApp/></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
