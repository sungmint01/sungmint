<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 4문제 — 성민T</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
:root{--ye:#F5C842;--yed:#e6b520;--bl:#74B3D8;--ro:#ED9499}
.hdr{background:linear-gradient(135deg,#1a1500,#3d2e00,#5c4400);padding:32px 20px 26px;text-align:center;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;width:200px;height:200px;background:radial-gradient(circle,rgba(245,200,66,.18),transparent 70%);top:-40px;right:-30px;pointer-events:none}
nav a{color:rgba(255,255,255,.55);font-size:12px;text-decoration:none;position:absolute;top:12px;left:16px}
nav a:hover{color:#fff}
.hdr h1{font-size:22px;font-weight:700;color:#fff;margin-bottom:5px}
.hdr-date{font-size:14px;color:rgba(255,255,255,.55);margin-bottom:4px}
.hdr-kst{font-size:12px;color:rgba(255,255,255,.35)}

.wrap{max-width:640px;margin:0 auto;padding:20px 14px 60px}

/* Status bar */
.status{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.st-label{font-size:13px;color:#64748b}
.st-val{font-size:13px;font-weight:600;color:#1e293b}
.st-open{color:#15803d}.st-closed{color:#b91c1c}.st-soon{color:#b45309}

/* Problems */
.prob-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
@media(max-width:480px){.prob-grid{grid-template-columns:1fr}}
.prob{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:18px;cursor:pointer;border:2px solid transparent;transition:.18s;user-select:none;position:relative}
.prob:hover{border-color:#e2e8f0}
.prob.solved{border-color:var(--ye);background:#fffdf0}
.prob-num{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pn{width:32px;height:32px;border-radius:9px;background:#f8fafc;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#64748b;transition:.18s}
.prob.solved .pn{background:var(--ye);color:#1a1500}
.pchk{width:22px;height:22px;border-radius:6px;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.18s;flex-shrink:0}
.prob.solved .pchk{background:var(--ye);border-color:var(--ye);color:#1a1500}
.prob-title{font-size:13px;font-weight:600;color:#1e293b;margin-bottom:5px;line-height:1.4}
.prob-body{font-size:12px;color:#64748b;line-height:1.6;white-space:pre-wrap}
.prob-locked{opacity:.45;cursor:not-allowed}
.prob-locked:hover{border-color:transparent}

/* Submit section */
.sbox{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:20px}
.sbox h2{font-size:14px;font-weight:700;margin-bottom:14px}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;outline:none;transition:.2s;margin-bottom:10px}
.inp:focus{border-color:var(--ye);box-shadow:0 0 0 3px rgba(245,200,66,.15)}
.solved-summary{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.ss-pill{border-radius:99px;padding:4px 12px;font-size:12px;font-weight:600}
.ss-y{background:#fef9c3;color:#b45309}.ss-n{background:#f1f5f9;color:#94a3b8}
.sbtn{background:var(--ye);color:#1a1500;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:.2s}
.sbtn:hover{background:var(--yed)}
.sbtn:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}
.cerr{color:#ef4444;font-size:12px;margin-bottom:6px;min-height:16px}
.succ{background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:11px;font-size:13px;color:#15803d;text-align:center;display:none;margin-top:8px}

/* No quiz */
.noquiz{background:#fff;border-radius:14px;padding:36px 20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.noquiz .ni{font-size:48px;margin-bottom:14px}
.noquiz h2{font-size:17px;font-weight:700;margin-bottom:6px;color:#1e293b}
.noquiz p{font-size:13px;color:#64748b;line-height:1.7}

/* Admin panel */
.admin-toggle{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.admin-toggle span{font-size:13px;color:#64748b}
.btn-admin{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.btn-admin:hover{background:#e2e8f0}
.btn-admin.active{background:#0f172a;color:#fff;border-color:#0f172a}

.admin-box{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:20px;margin-bottom:18px;display:none}
.admin-box.op{display:block}
.admin-box h2{font-size:14px;font-weight:700;margin-bottom:16px;color:#1e293b}
.prow{margin-bottom:12px;padding:12px;background:#f8fafc;border-radius:10px}
.prow-hd{font-size:12px;font-weight:700;color:#475569;margin-bottom:7px}
.trow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.btn-save-quiz{background:var(--ye);color:#1a1500;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:.2s;margin-top:4px}
.btn-save-quiz:hover{background:var(--yed)}
.div{height:1px;background:#e2e8f0;margin:16px 0}
.sub-item{padding:10px 12px;background:#f8fafc;border-radius:8px;margin-bottom:6px;font-size:13px}
.sub-hd{font-weight:600;color:#1e293b;margin-bottom:4px}
.sub-pills{display:flex;gap:5px;flex-wrap:wrap}
.sp2{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.sp2-y{background:#fef9c3;color:#b45309}.sp2-n{background:#f1f5f9;color:#94a3b8}
.sub-time{font-size:11px;color:#94a3b8;margin-top:3px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.pw-inline{display:flex;gap:8px;margin-top:10px}
.pw-inline input{flex:1;border:1.5px solid #e2e8f0;border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:.2s}
.pw-inline input:focus{border-color:var(--ye)}
.pw-inline button{background:var(--ye);color:#1a1500;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
</style>
</head>
<body>
<div class="hdr">
  <nav><a href="main.html">← 홈</a></nav>
  <h1>✏️ 오늘의 4문제</h1>
  <div class="hdr-date" id="hDate"></div>
  <div class="hdr-kst" id="hTime"></div>
</div>

<div class="wrap">
  <div class="status">
    <span class="st-label">📌 오늘의 퀴즈 상태</span>
    <span class="st-val" id="stVal">확인 중...</span>
  </div>

  <div id="quizArea"></div>

  <!-- Admin toggle -->
  <div class="admin-toggle">
    <span>🔒 관리자</span>
    <button class="btn-admin" id="adminBtn" onclick="toggleAdmin()">관리자 모드</button>
  </div>

  <!-- Admin panel -->
  <div class="admin-box" id="adminBox">
    <div id="adminContent">
      <div id="pwForm">
        <p style="font-size:13px;color:#64748b;margin-bottom:8px">관리자 비밀번호를 입력하세요</p>
        <div class="pw-inline">
          <input type="password" id="adminPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')verifyAdmin()">
          <button onclick="verifyAdmin()">확인</button>
        </div>
        <p style="font-size:12px;color:#ef4444;margin-top:6px;min-height:16px" id="pwErr"></p>
      </div>
      <div id="adminPanel" style="display:none">
        <h2>📝 오늘의 문제 설정</h2>
        <div class="trow">
          <div>
            <div style="font-size:12px;font-weight:600;color:#475569;margin-bottom:5px">시작 시간 (KST)</div>
            <input class="inp" type="time" id="qStart" value="06:00">
          </div>
          <div>
            <div style="font-size:12px;font-weight:600;color:#475569;margin-bottom:5px">종료 시간 (KST)</div>
            <input class="inp" type="time" id="qEnd" value="23:59">
          </div>
        </div>
        <div id="probInputs"></div>
        <button class="btn-save-quiz" onclick="saveQuiz()">퀴즈 저장</button>
        <div class="div"></div>
        <h2>📊 오늘의 제출 현황</h2>
        <div id="subList"><p style="font-size:13px;color:#94a3b8">제출 없음</p></div>
        <button class="lnk" style="color:#ef4444;font-size:12px;margin-top:10px;cursor:pointer;border:none;background:none;font-family:inherit" onclick="clearSubs()">오늘 제출 전체 삭제</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const HASH='9e0bc0a9aa374eab9ae10383ab67c9fadb1e2aa69a1d54555a7dff0670678bda';
let db,quiz=null,subs={},solved=[false,false,false,false],adminMode=false;
const todayKST=()=>{const n=new Date(Date.now()+9*3600000);return`${n.getUTCFullYear()}-${String(n.getUTCMonth()+1).padStart(2,'0')}-${String(n.getUTCDate()).padStart(2,'0')}`;};
const nowKSTMin=()=>{const n=new Date(Date.now()+9*3600000);return n.getUTCHours()*60+n.getUTCMinutes();};
const fmtKST=()=>{const n=new Date(Date.now()+9*3600000);return`${String(n.getUTCHours()).padStart(2,'0')}:${String(n.getUTCMinutes()).padStart(2,'0')} KST`;};

window.addEventListener('DOMContentLoaded',()=>{
  if(typeof SM_CONFIG==='undefined'||!SM_CONFIG.apiKey||SM_CONFIG.apiKey.includes('여기에')){
    document.getElementById('quizArea').innerHTML='<div class="noquiz"><div class="ni">⚙️</div><h2>설정 필요</h2><p>config.js 파일을 먼저 설정해주세요</p></div>';return;
  }
  try{
    if(!firebase.apps.length)firebase.initializeApp(SM_CONFIG);
    db=firebase.database();
  }catch(e){document.getElementById('quizArea').innerHTML=`<div class="noquiz"><div class="ni">⚠️</div><h2>오류</h2><p>${e.message}</p></div>`;return;}
  if(sessionStorage.getItem('smAdmin')==='1'){adminMode=true;document.getElementById('adminBtn').classList.add('active');}
  updateClock();setInterval(updateClock,30000);
  const d=todayKST();
  db.ref(`smOd4p/quizzes/${d}`).on('value',s=>{quiz=s.val();renderQuiz();});
  db.ref(`smOd4p/submissions/${d}`).on('value',s=>{subs=s.val()||{};renderAdminSubs();});
});

function updateClock(){
  const d=todayKST();
  const[y,m,dd]=d.split('-');
  document.getElementById('hDate').textContent=`${y}년 ${+m}월 ${+dd}일`;
  document.getElementById('hTime').textContent=fmtKST();
}

function isOpen(){
  if(!quiz)return false;
  const now=nowKSTMin();
  const[sh,sm2]=quiz.start.split(':').map(Number);
  const[eh,em]=quiz.end.split(':').map(Number);
  return now>=sh*60+sm2&&now<=eh*60+em;
}

function renderQuiz(){
  const area=document.getElementById('quizArea');
  if(!quiz||!quiz.problems||!quiz.problems.length){
    document.getElementById('stVal').textContent='문제 없음';
    document.getElementById('stVal').className='st-val st-closed';
    area.innerHTML=`<div class="noquiz"><div class="ni">📭</div><h2>오늘의 문제가 아직 없습니다</h2><p>선생님이 문제를 등록하면 여기에 표시됩니다</p></div>`;
    return;
  }
  const open=isOpen();
  const[sh,sm2]=quiz.start.split(':').map(Number);
  const[eh,em]=quiz.end.split(':').map(Number);
  const timeStr=`${quiz.start} ~ ${quiz.end}`;
  if(open){
    document.getElementById('stVal').innerHTML=`🟢 진행 중 <span style="color:#94a3b8;font-weight:400;font-size:12px">${timeStr}</span>`;
    document.getElementById('stVal').className='st-val st-open';
  }else{
    const now=nowKSTMin();
    const start=sh*60+sm2;
    if(now<start){
      document.getElementById('stVal').innerHTML=`🟡 ${quiz.start} 시작 예정`;
      document.getElementById('stVal').className='st-val st-soon';
    }else{
      document.getElementById('stVal').innerHTML=`🔴 오늘 마감 <span style="color:#94a3b8;font-weight:400;font-size:12px">${timeStr}</span>`;
      document.getElementById('stVal').className='st-val st-closed';
    }
  }
  // check already submitted today
  const myKey=localStorage.getItem(`smOd4p_${todayKST()}`);
  if(myKey){
    area.innerHTML=`<div class="noquiz"><div class="ni">✅</div><h2>오늘 제출 완료!</h2><p>오늘의 4문제를 제출하셨습니다.<br>내일 또 도전해요! 💪</p></div>`;
    return;
  }
  const locked=!open;
  area.innerHTML=`
    <div class="prob-grid">
      ${quiz.problems.slice(0,4).map((p,i)=>`
        <div class="prob ${locked?'prob-locked':''}" id="prob_${i}" onclick="${locked?'':` toggleSolve(${i})`}">
          <div class="prob-num">
            <span class="pn">${i+1}</span>
            <span class="pchk" id="chk_${i}">${solved[i]?'✓':''}</span>
          </div>
          <div class="prob-title">${esc(p.title||`문제 ${i+1}`)}</div>
          ${p.body?`<div class="prob-body">${esc(p.body)}</div>`:''}
        </div>`).join('')}
    </div>
    ${locked?`<div class="noquiz" style="margin-bottom:18px"><div class="ni">🔒</div><h2>제출 시간이 아닙니다</h2><p>제출 가능 시간: ${timeStr}</p></div>`:
    `<div class="sbox">
      <h2>📤 오늘의 결과 제출</h2>
      <div class="solved-summary" id="summary"></div>
      <input class="inp" id="sName" type="text" placeholder="이름을 입력하세요 *">
      <div class="cerr" id="serr"></div>
      <button class="sbtn" id="sBtn" onclick="submitResult()">제출하기</button>
      <div class="succ" id="sSucc">✅ 제출 완료! 수고하셨습니다 🎉</div>
    </div>`}`;
  updateSummary();
  if(adminMode) renderAdminPanel();
}

function toggleSolve(i){
  if(!isOpen())return;
  solved[i]=!solved[i];
  const prob=document.getElementById('prob_'+i);
  const chk=document.getElementById('chk_'+i);
  prob.classList.toggle('solved',solved[i]);
  chk.textContent=solved[i]?'✓':'';
  updateSummary();
}

function updateSummary(){
  const el=document.getElementById('summary');
  if(!el)return;
  el.innerHTML=solved.map((s,i)=>`<span class="ss-pill ${s?'ss-y':'ss-n'}">${i+1}번 ${s?'✅':'✗'}</span>`).join('');
}

async function submitResult(){
  const name=document.getElementById('sName').value.trim();
  const err=document.getElementById('serr');
  if(!name){err.textContent='이름을 입력하세요';return;}
  const btn=document.getElementById('sBtn');
  btn.disabled=true;btn.textContent='제출 중...';
  try{
    const ref=await db.ref(`smOd4p/submissions/${todayKST()}`).push({name,solved:[...solved],ts:Date.now()});
    localStorage.setItem(`smOd4p_${todayKST()}`,ref.key);
    document.getElementById('sSucc').style.display='block';
    setTimeout(()=>renderQuiz(),1800);
  }catch(e){err.textContent='오류: '+e.message;btn.disabled=false;btn.textContent='제출하기';}
}

// Admin
function toggleAdmin(){
  document.getElementById('adminBox').classList.toggle('op');
  if(adminMode)renderAdminPanel();
}

async function verifyAdmin(){
  const pw=document.getElementById('adminPw').value;
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  const h=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  if(h===HASH){
    adminMode=true;
    sessionStorage.setItem('smAdmin','1');
    document.getElementById('pwForm').style.display='none';
    document.getElementById('adminPanel').style.display='';
    document.getElementById('adminBtn').classList.add('active');
    renderAdminPanel();
  }else{document.getElementById('pwErr').textContent='비밀번호가 올바르지 않습니다';}
}

function renderAdminPanel(){
  if(!adminMode)return;
  document.getElementById('pwForm').style.display='none';
  document.getElementById('adminPanel').style.display='';
  // prob inputs
  const pi=document.getElementById('probInputs');
  const probs=quiz?.problems||[{title:'',body:''},{title:'',body:''},{title:'',body:''},{title:'',body:''}];
  document.getElementById('qStart').value=quiz?.start||'06:00';
  document.getElementById('qEnd').value=quiz?.end||'23:59';
  pi.innerHTML=probs.slice(0,4).map((p,i)=>`
    <div class="prow">
      <div class="prow-hd">문제 ${i+1}</div>
      <input class="inp" id="pt_${i}" type="text" placeholder="문제 제목 (예: 삼각함수 미분)" value="${esc(p.title||'')}">
      <textarea class="inp" id="pb_${i}" placeholder="문제 내용 (선택)" style="min-height:55px;margin-bottom:0">${esc(p.body||'')}</textarea>
    </div>`).join('');
  renderAdminSubs();
}

async function saveQuiz(){
  if(!adminMode)return;
  const problems=[];
  for(let i=0;i<4;i++){
    const t=document.getElementById('pt_'+i)?.value.trim()||'';
    const b=document.getElementById('pb_'+i)?.value.trim()||'';
    problems.push({title:t,body:b});
  }
  const start=document.getElementById('qStart').value||'06:00';
  const end=document.getElementById('qEnd').value||'23:59';
  await db.ref(`smOd4p/quizzes/${todayKST()}`).set({problems,start,end,updAt:Date.now()});
  toast('퀴즈가 저장되었습니다');
}

function renderAdminSubs(){
  if(!adminMode)return;
  const el=document.getElementById('subList');
  if(!el)return;
  const arr=Object.entries(subs).sort(([,a],[,b])=>(a.ts||0)-(b.ts||0));
  if(!arr.length){el.innerHTML='<p style="font-size:13px;color:#94a3b8">아직 제출 없음</p>';return;}
  el.innerHTML=arr.map(([,s])=>`
    <div class="sub-item">
      <div class="sub-hd">${esc(s.name||'?')}</div>
      <div class="sub-pills">${(s.solved||[]).map((v,i)=>`<span class="sp2 ${v?'sp2-y':'sp2-n'}">${i+1}</span>`).join('')}</div>
      <div class="sub-time">${new Date(s.ts||0).toLocaleTimeString('ko-KR')}</div>
    </div>`).join('');
}

async function clearSubs(){
  if(!confirm('오늘 제출 내역을 전체 삭제하시겠습니까?'))return;
  await db.ref(`smOd4p/submissions/${todayKST()}`).remove();
  toast('삭제되었습니다');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
</script>
</body>
</html>
