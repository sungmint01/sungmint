<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수업 현황 — 성민T</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
:root{--bl:#74B3D8;--bld:#5a9ec7}
#load{min-height:100vh;display:flex;align-items:center;justify-content:center}
.sp{width:38px;height:38px;border:3px solid #e2e8f0;border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{color:#64748b;font-size:14px;text-align:center}
.err{text-align:center;padding:40px 20px}
.err .ei{font-size:52px;margin-bottom:16px}
.err h2{font-size:19px;font-weight:700;margin-bottom:8px}
.err p{font-size:13px;color:#64748b;line-height:1.7}
#wrap{display:none;max-width:640px;margin:0 auto;padding:0 14px 60px}
.hdr{background:linear-gradient(135deg,#0f172a,#1e3a5f,#2d5286);padding:36px 24px 68px;margin:0 -14px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;width:260px;height:260px;background:radial-gradient(circle,rgba(116,179,216,.2),transparent 70%);top:-60px;right:-40px;pointer-events:none}
.hdr-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:5px 14px;font-size:11px;color:rgba(255,255,255,.75);font-weight:500;letter-spacing:.04em;margin-bottom:16px}
.hdr-name{font-size:28px;font-weight:700;color:#fff;margin-bottom:8px}
.hdr-tags{display:flex;gap:8px;flex-wrap:wrap}
.htag{background:rgba(255,255,255,.14);color:rgba(255,255,255,.88);border-radius:6px;padding:4px 11px;font-size:12px;font-weight:500}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:-28px;margin-bottom:20px;position:relative;z-index:1}
.sc{background:#fff;border-radius:12px;padding:14px 10px;box-shadow:0 4px 16px rgba(0,0,0,.08);text-align:center}
.sn{font-size:22px;font-weight:700;color:var(--bl);line-height:1}
.sl{font-size:11px;color:#64748b;margin-top:4px;font-weight:500}
/* Calendar */
.card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.card-head{padding:16px 18px 12px;border-bottom:1px solid #f1f5f9;font-size:14px;font-weight:700}
.cal-wrap{padding:14px 16px 18px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-month{font-size:14px;font-weight:700}
.cal-nav-btn{background:#f1f5f9;border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:#475569;transition:.15s}
.cal-nav-btn:hover{background:#e2e8f0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:#94a3b8;padding:3px 0}
.cal-dow:first-child{color:#ef4444}.cal-dow:last-child{color:#3b82f6}
.cal-day{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:.15s;border:1.5px solid transparent;min-height:34px}
.cal-day.clickable{cursor:pointer}
.cal-day.clickable:hover{filter:brightness(.95)}
.cal-day.today{border-color:var(--bl)}
.cal-day-num{font-size:12px;font-weight:500;line-height:1;color:#374151}
.cal-day.today .cal-day-num{color:var(--bld);font-weight:700}
.cal-day.other-month .cal-day-num{color:#dde3ed}
.cal-dots{display:flex;gap:2px;margin-top:2px;justify-content:center}
.cal-dot{width:5px;height:5px;border-radius:50%}
.dot-상{background:#22c55e}.dot-중{background:#f59e0b}.dot-하{background:#ef4444}
/* Record detail */
.rec-detail{display:none;margin:0 16px 16px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0;animation:fi .2s ease}
.rec-detail.open{display:block}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.rd-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
.rd-date{font-size:14px;font-weight:700}
.rd-close{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px;padding:0}
.rd-body{padding:0 16px 14px}
.rd-grid{display:grid;grid-template-columns:72px 1fr;gap:5px 10px;font-size:13px}
.rd-k{color:#94a3b8;font-weight:500;padding-top:1px}
.rd-v{color:#334155;line-height:1.6}
.rd-eval{display:inline-flex;align-items:center;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:600}
.ev-상{background:#dcfce7;color:#15803d}.ev-중{background:#fef9c3;color:#b45309}.ev-하{background:#fee2e2;color:#b91c1c}
.note-box{background:#fffbea;border:1px solid #fde68a;border-radius:8px;padding:9px 12px;margin-top:10px;font-size:12px;color:#854d0e;line-height:1.6}
/* Consult */
.csec{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:20px;margin-bottom:16px}
.csec h2{font-size:14px;font-weight:700;margin-bottom:5px}
.csec p{font-size:12px;color:#64748b;margin-bottom:14px;line-height:1.7}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;outline:none;transition:.2s}
.inp:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(116,179,216,.14)}
textarea.inp{resize:vertical;min-height:90px}
.sbtn{background:var(--bl);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-top:10px;transition:.2s}
.sbtn:hover{background:var(--bld)}
.sbtn:disabled{background:#cbd5e1;cursor:not-allowed}
.succ{background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:11px;font-size:13px;color:#15803d;text-align:center;display:none;margin-top:8px}
.cerr{color:#ef4444;font-size:12px;margin-top:5px;min-height:16px}
.sent-hd{font-size:12px;color:#94a3b8;margin:14px 0 6px}
.sent-i{background:#f8fafc;border-radius:8px;padding:10px 13px;margin-bottom:7px;font-size:13px;color:#475569;border-left:3px solid var(--bl);line-height:1.6}
.sent-t{font-size:11px;color:#94a3b8;margin-bottom:3px}
footer{text-align:center;padding:24px 0 12px;color:#cbd5e1;font-size:12px}
</style>
</head>
<body>
<div id="load"><div><div class="sp"></div><p class="ld-txt">불러오는 중...</p></div></div>
<div id="wrap">
  <div class="hdr">
    <div class="hdr-badge">📚 수업 현황</div>
    <div class="hdr-name" id="hName"></div>
    <div class="hdr-tags"><span class="htag" id="hGrade"></span><span class="htag" id="hSubj"></span></div>
  </div>
  <div>
    <div class="stats">
      <div class="sc"><div class="sn" id="sTot">0</div><div class="sl">총 수업 횟수</div></div>
      <div class="sc"><div class="sn" id="sRate">-</div><div class="sl">상 비율</div></div>
      <div class="sc"><div class="sn" id="sLast">-</div><div class="sl">최근 평가</div></div>
    </div>
    <!-- Calendar -->
    <div class="card">
      <div class="card-head">📅 수업 달력</div>
      <div class="cal-wrap">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <span class="cal-month" id="calMonth"></span>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid">
          <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
          <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
        </div>
      </div>
      <div class="rec-detail" id="recDetail">
        <div class="rd-head">
          <span class="rd-date" id="rdDate"></span>
          <button class="rd-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="rd-body" id="rdBody"></div>
      </div>
    </div>
    <!-- Consult -->
    <div class="csec">
      <h2>💬 상담 요청</h2>
      <p>선생님께 궁금한 점이나 전달하실 내용을 남겨주세요.<br>확인 후 연락드리겠습니다.</p>
      <input class="inp" id="cName" type="text" placeholder="보내는 분 (예: 홍길동 어머니)" style="margin-bottom:10px">
      <textarea class="inp" id="cContent" placeholder="내용을 입력해주세요"></textarea>
      <div class="cerr" id="cerr"></div>
      <button class="sbtn" id="cBtn" onclick="submitC()">상담 요청 보내기</button>
      <div class="succ" id="cSucc">✅ 요청이 전송되었습니다. 곧 연락드리겠습니다.</div>
      <div id="sentList"></div>
    </div>
    <footer>이 페이지는 학부모 확인용입니다</footer>
  </div>
</div>
<script>
let db,sid_=null,recData={},sent=[],calYear,calMonth;

window.addEventListener('DOMContentLoaded',()=>{
  const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
  if(typeof SM_CONFIG==='undefined'||!SM_CONFIG.apiKey||SM_CONFIG.apiKey.includes('여기에')){
    document.getElementById('load').innerHTML='<div class="err"><div class="ei">⚙️</div><h2>설정 오류</h2><p>config.js 파일에 Firebase 설정이 필요합니다</p></div>';return;
  }
  try{if(!firebase.apps.length)firebase.initializeApp(SM_CONFIG);db=firebase.database();}
  catch(e){showErr('Firebase 오류',''+e.message);return;}
  loadPage();
});

async function loadPage(){
  const token=new URLSearchParams(location.search).get('token');
  if(!token){showErr('잘못된 링크','올바른 학부모 링크로 접속해주세요.');return;}
  try{
    const snap=await db.ref('smStudents').orderByChild('token').equalTo(token).get();
    if(!snap.exists()){showErr('학생을 찾을 수 없습니다','링크가 만료되었거나 잘못된 링크입니다.');return;}
    const data=snap.val();
    sid_=Object.keys(data)[0];
    const stu=data[sid_];
    document.title=`${stu.name} — 수업 현황`;
    document.getElementById('hName').textContent=stu.name||'';
    document.getElementById('hGrade').textContent=stu.grade||'';
    document.getElementById('hSubj').textContent=stu.subj||'';
    document.getElementById('load').style.display='none';
    document.getElementById('wrap').style.display='';
    db.ref(`smSessions/${sid_}`).on('value',s=>{recData=s.val()||{};renderStats();renderCal();});
    const stored=localStorage.getItem(`smSent_${sid_}`);
    if(stored)try{sent=JSON.parse(stored);}catch(e){}
    renderSent();
  }catch(e){showErr('오류 발생',''+e.message);}
}
function showErr(title,msg){document.getElementById('load').innerHTML=`<div class="err"><div class="ei">😔</div><h2>${title}</h2><p>${msg}</p></div>`;}

function renderStats(){
  const arr=Object.values(recData);
  document.getElementById('sTot').textContent=arr.length;
  if(arr.length){
    const top=arr.filter(r=>r.eval==='상').length;
    document.getElementById('sRate').textContent=`${Math.round(top/arr.length*100)}%`;
    const sorted=arr.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const ev=sorted[0].eval||'중';
    document.getElementById('sLast').textContent=ev==='상'?'⭐ 상':ev==='하'?'📌 하':'✅ 중';
  }
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  closeDetail();renderCal();
}

function renderCal(){
  const recMap={};
  Object.values(recData).forEach(r=>{if(r.date)recMap[r.date]=r;});
  const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonth').textContent=`${calYear}년 ${mn[calMonth]}`;
  const todayStr=new Date().toISOString().split('T')[0];
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const grid=document.getElementById('calGrid');
  const headers=Array.from(grid.children).slice(0,7);
  grid.innerHTML='';
  headers.forEach(h=>grid.appendChild(h));
  for(let i=firstDay-1;i>=0;i--){
    const cell=document.createElement('div');
    cell.className='cal-day other-month';
    cell.innerHTML=`<span class="cal-day-num">${daysInPrev-i}</span>`;
    grid.appendChild(cell);
  }
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec=recMap[ds];
    const cell=document.createElement('div');
    cell.className='cal-day'+(ds===todayStr?' today':'')+(rec?' clickable':'');
    if(rec){
      const bg=rec.eval==='상'?'#f0fdf4':rec.eval==='하'?'#fff5f5':'#fffef0';
      cell.style.background=bg;
      cell.innerHTML=`<span class="cal-day-num">${d}</span><div class="cal-dots"><div class="cal-dot dot-${rec.eval||'중'}"></div></div>`;
      cell.addEventListener('click',()=>showDetail(ds,rec));
    } else {
      cell.innerHTML=`<span class="cal-day-num">${d}</span>`;
    }
    grid.appendChild(cell);
  }
  const total=firstDay+daysInMonth;
  const rem=(7-total%7)%7;
  for(let d=1;d<=rem;d++){
    const cell=document.createElement('div');
    cell.className='cal-day other-month';
    cell.innerHTML=`<span class="cal-day-num">${d}</span>`;
    grid.appendChild(cell);
  }
}

function showDetail(ds,rec){
  const[y,m,d]=ds.split('-');
  document.getElementById('rdDate').textContent=`${y}년 ${+m}월 ${+d}일 (${rec.num||'-'}회차)`;
  const ev=rec.eval||'중';
  const evLabel=ev==='상'?'⭐ 상':ev==='하'?'📌 하':'✅ 중';
  document.getElementById('rdBody').innerHTML=`
    <div class="rd-grid">
      <span class="rd-k">평가</span><span class="rd-v"><span class="rd-eval ev-${ev}">${evLabel}</span></span>
      <span class="rd-k">진도</span><span class="rd-v">${rec.prog||'<span style="color:#cbd5e1;font-size:12px">없음</span>'}</span>
      <span class="rd-k">숙제</span><span class="rd-v">${rec.hwC||'<span style="color:#cbd5e1;font-size:12px">없음</span>'}</span>
      <span class="rd-k">클리닉</span><span class="rd-v">${rec.cli?rec.cli.replace(/\n/g,'<br>'):'<span style="color:#cbd5e1;font-size:12px">없음</span>'}</span>
    </div>
    ${rec.note?`<div class="note-box">📌 ${rec.note.replace(/\n/g,'<br>')}</div>`:''}`;
  document.getElementById('recDetail').classList.add('open');
  document.getElementById('recDetail').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeDetail(){document.getElementById('recDetail').classList.remove('open');}

async function submitC(){
  const name=document.getElementById('cName').value.trim();
  const content=document.getElementById('cContent').value.trim();
  const err=document.getElementById('cerr');
  if(!name){err.textContent='보내는 분을 입력해주세요';return;}
  if(!content){err.textContent='내용을 입력해주세요';return;}
  err.textContent='';
  const btn=document.getElementById('cBtn');
  btn.disabled=true;btn.textContent='전송 중...';
  try{
    await db.ref(`smConsultations/${sid_}`).push({name,content,ts:Date.now(),isRead:false});
    sent.unshift({name,content,ts:Date.now()});
    localStorage.setItem(`smSent_${sid_}`,JSON.stringify(sent.slice(0,10)));
    renderSent();
    document.getElementById('cName').value='';
    document.getElementById('cContent').value='';
    const s=document.getElementById('cSucc');s.style.display='block';setTimeout(()=>s.style.display='none',4000);
  }catch(e){err.textContent='전송 실패: '+e.message;}
  btn.disabled=false;btn.textContent='상담 요청 보내기';
}
function renderSent(){
  const el=document.getElementById('sentList');
  if(!sent.length){el.innerHTML='';return;}
  el.innerHTML='<p class="sent-hd">내가 보낸 요청</p>'+sent.slice(0,5).map(c=>`
    <div class="sent-i"><div class="sent-t">${new Date(c.ts).toLocaleString('ko-KR')} · ${c.name}</div>${c.content}</div>`).join('');
}
</script>
</body>
</html>
