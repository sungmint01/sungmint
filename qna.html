<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const TEACHER_PW = "1340";
const SUBJECTS = ["공통수학1","공통수학2","대수(수1)","미적분1(수2)","확통","기하","미적분2"];

// 과목별 색상 (배경, 텍스트)
const SC = {
  "공통수학1":   ["#f0f4ff","#4f6ef7"],
  "공통수학2":   ["#f3f0ff","#7c5cfc"],
  "대수(수1)":   ["#f0fafb","#0ea5aa"],
  "미적분1(수2)":["#f0fdf6","#0ea872"],
  "확통":        ["#fdf4ff","#c026d3"],
  "기하":        ["#fff8f0","#f97316"],
  "미적분2":     ["#fff0f3","#e11d6a"],
};

function getYtId(url){
  if(!url) return null;
  const m = url.match(/(?:youtu\.be\/|v=|\/embed\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}

function compressImage(file, cb){
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX=800; let w=img.width, h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      const c=document.createElement("canvas");
      c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",0.6));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function listenQs(cb){
  const ref=db.ref("questions");
  ref.on("value", snap=>{
    const val=snap.val()||{};
    cb(Object.values(val).sort((a,b)=>b.ts-a.ts));
  });
  return ()=>ref.off();
}
function pushQ(q){ return db.ref("questions/"+q.id).set(q); }
function updateQ(id,data){ return db.ref("questions/"+id).update(data); }
function deleteQ(id){ return db.ref("questions/"+id).remove(); }

// 과목 뱃지
function SubjectBadge({subject}){
  const [bg, color] = SC[subject] || ["#f1f5f9","#64748b"];
  return (
    <span style={{background:bg,color,borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700,letterSpacing:"0.02em",whiteSpace:"nowrap"}}>
      {subject}
    </span>
  );
}

// 질문 카드
function QCard({q,num,isTeacher,replyTarget,setReplyTarget,videoUrl,setVideoUrl,replyComment,setReplyComment,onReply,onDelete}){
  const [big,setBig]=useState(false);
  const [editSub,setEditSub]=useState(false);
  const ytId=getYtId(q.videoUrl);
  const timeStr = new Date(q.ts).toLocaleDateString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});

  return(
    <div style={{background:"#e4e8f4",borderRadius:16,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.07)",border:"1px solid #e8edf5"}}>

      {/* 카드 헤더 */}
      <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid #f1f5f9"}}>
        <div style={{minWidth:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:"0 6px"}}>
            <span style={{color:"#fff",fontWeight:700,fontSize:num>9999?10:num>999?11:num>99?12:14,letterSpacing:"-0.5px",fontVariantNumeric:"tabular-nums"}}>#{String(num).padStart(1,"0")}</span>
          </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:"#374151"}}>익명의 학생</div>
          <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>{timeStr}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          {isTeacher&&editSub?(
              <select value={q.subject} onChange={e=>{updateQ(q.id,{subject:e.target.value});setEditSub(false);}}
                onBlur={()=>setEditSub(false)}
                autoFocus
                style={{border:"1.5px solid #6366f1",borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700,outline:"none",cursor:"pointer",background:"#e4e8f4",color:"#1e2533"}}>
                {SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            ):(
              <span onClick={()=>isTeacher&&setEditSub(true)} title={isTeacher?"클릭해서 과목 수정":""} style={{display:"inline-flex",alignItems:"center",gap:3,cursor:isTeacher?"pointer":"default"}}>
                <SubjectBadge subject={q.subject}/>
                {isTeacher&&<span style={{fontSize:10,color:"#c4c9d4"}}>✏️</span>}
              </span>
            )}
          {q.answered
            ? <span style={{background:"#f0fdf4",color:"#16a34a",borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700}}>해설완료</span>
            : <span style={{background:"#fff7ed",color:"#ea580c",borderRadius:99,padding:"3px 10px",fontSize:11,fontWeight:700}}>대기중</span>
          }
          {isTeacher&&<button onClick={onDelete} style={{background:"none",border:"none",color:"#cbd5e1",cursor:"pointer",fontSize:16,lineHeight:1,padding:"2px 4px"}}>✕</button>}
        </div>
      </div>

      {/* 사진 */}
      {q.photo&&(
        <div style={{background:"#f8fafc",cursor:"pointer"}} onClick={()=>setBig(!big)}>
          <img src={q.photo} alt="질문" style={{width:"100%",maxHeight:big?9999:220,objectFit:big?"contain":"cover",display:"block"}}/>
          <div style={{textAlign:"center",fontSize:11,color:"#94a3b8",padding:"6px 0"}}>{big?"▲ 접기":"▼ 전체보기"}</div>
        </div>
      )}

      {/* 텍스트 */}
      {q.text&&<div style={{padding:"12px 16px",fontSize:14,color:"#374151",lineHeight:1.75}}>{q.text}</div>}

      {/* 해설 영역 */}
      {q.answered&&(
        <div style={{borderTop:"1px solid #f1f5f9",background:"#f8fffe",padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
            <span style={{fontSize:13}}>✏️</span>
            <span style={{fontSize:13,fontWeight:700,color:"#0d9488"}}>선생님 해설</span>
          </div>
          {q.comment&&(
            <div style={{fontSize:13,color:"#374151",lineHeight:1.75,background:"#e4e8f4",border:"1px solid #ccfbf1",borderRadius:10,padding:"10px 14px",marginBottom:10}}>{q.comment}</div>
          )}
          {q.videoUrl&&(ytId
            ? <div style={{borderRadius:12,overflow:"hidden"}}><iframe width="100%" height="210" src={"https://www.youtube.com/embed/"+ytId} frameBorder="0" allowFullScreen style={{display:"block"}}/></div>
            : <a href={q.videoUrl} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:8,background:"#e4e8f4",border:"1px solid #99f6e4",borderRadius:10,padding:"9px 14px",color:"#0d9488",fontWeight:700,fontSize:13,textDecoration:"none"}}>🔗 해설 영상 보러가기</a>
          )}
        </div>
      )}

      {/* 선생님 해설 달기 */}
      {isTeacher&&(
        replyTarget===q.id?(
          <div style={{borderTop:"1px solid #f1f5f9",padding:"14px 16px",background:"#fafbff"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#64748b",marginBottom:10}}>해설 달기</div>
            <textarea value={replyComment} onChange={e=>setReplyComment(e.target.value)} placeholder="코멘트 (선택)" rows={2}
              style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:10,padding:"9px 12px",fontSize:13,resize:"none",outline:"none",marginBottom:8,background:"#e4e8f4"}}/>
            <input value={videoUrl} onChange={e=>setVideoUrl(e.target.value)} placeholder="YouTube 링크"
              style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:10,padding:"9px 12px",fontSize:13,outline:"none",marginBottom:10,background:"#e4e8f4"}}/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>{setReplyTarget(null);setVideoUrl("");setReplyComment("");}}
                style={{background:"#f1f5f9",border:"none",borderRadius:8,color:"#64748b",padding:"8px 18px",cursor:"pointer",fontSize:13}}>취소</button>
              <button onClick={onReply}
                style={{background:"linear-gradient(135deg,#0d9488,#0891b2)",border:"none",borderRadius:8,color:"#fff",padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:700}}>등록</button>
            </div>
          </div>
        ):(
          <div style={{borderTop:"1px solid #f1f5f9",padding:"10px 16px"}}>
            <button onClick={()=>{setReplyTarget(q.id);setVideoUrl(q.videoUrl||"");setReplyComment(q.comment||"");}}
              style={{width:"100%",background:q.answered?"#f8fffe":"linear-gradient(135deg,#6366f1,#8b5cf6)",border:q.answered?"1px solid #ccfbf1":"none",borderRadius:10,color:q.answered?"#0d9488":"#fff",padding:"10px 0",cursor:"pointer",fontSize:13,fontWeight:700}}>
              {q.answered?"✏️ 해설 수정":"해설 달기"}
            </button>
          </div>
        )
      )}

      {/* 사진 전체보기 모달 */}
      {big&&q.photo&&(
        <div onClick={()=>setBig(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,cursor:"zoom-out"}}>
          <img src={q.photo} alt="전체" style={{maxWidth:"95vw",maxHeight:"90vh",borderRadius:12}}/>
        </div>
      )}
    </div>
  );
}

function App(){
  const [questions,setQuestions]=useState([]);
  const [mode,setMode]=useState("student");
  const [pw,setPw]=useState("");
  const [pwErr,setPwErr]=useState(false);
  const [authed,setAuthed]=useState(false);
  const [emailAlert,setEmailAlert]=useState(true);
  const emailAlertRef=useRef(true);
  const [loading,setLoading]=useState(true);
  const [submitting,setSubmitting]=useState(false);
  const [done,setDone]=useState(false);
  const [photo,setPhoto]=useState(null);
  const [preview,setPreview]=useState(null);
  const [qText,setQText]=useState("");
  const [subject,setSubject]=useState("공통수학1");
  const [replyTarget,setReplyTarget]=useState(null);
  const [videoUrl,setVideoUrl]=useState("");
  const [replyComment,setReplyComment]=useState("");
  const [filter,setFilter]=useState("all");
  const [subjectFilter,setSubjectFilter]=useState("전체");

  useEffect(()=>{
    const unsub=listenQs(qs=>{setQuestions(qs);setLoading(false);});
    db.ref('settings/emailAlert').on('value', snap=>{
      const val = snap.val();
      if(val !== null){ setEmailAlert(val); emailAlertRef.current = val; }
    });
    return unsub;
  },[]);

  const onFile=e=>{
    const f=e.target.files[0];
    if(!f) return;
    compressImage(f,(compressed)=>{setPhoto(compressed);setPreview(compressed);});
  };

  const submit=async()=>{
    if(!photo&&!qText.trim()) return;
    setSubmitting(true);
    try{
      const id=Date.now().toString();
      await pushQ({id,ts:Date.now(),subject,text:qText.trim(),photo:photo||"",answered:false,videoUrl:"",comment:""});
      if(emailAlertRef.current){
        try{
          await emailjs.send("service_fl4emqp","template_jsdwyw9",{
            subject: subject,
            question_text: qText.trim()||"(사진 첨부)",
            time: new Date().toLocaleString("ko-KR"),
          });
        }catch(e){ console.warn("이메일 오류:",e); }
      }
      setPhoto(null);setPreview(null);setQText("");setSubject("공통수학1");
      setDone(true);setTimeout(()=>setDone(false),3000);
    }catch(err){
      alert("전송 실패 😢\n원인: "+err.message);
    }finally{
      setSubmitting(false);
    }
  };

  const login=()=>{
    if(pw===TEACHER_PW){setAuthed(true);setPwErr(false);}
    else{setPwErr(true);setPw("");}
  };

  const onReply=async(qId)=>{
    if(!videoUrl.trim()&&!replyComment.trim()) return;
    await updateQ(qId,{answered:true,videoUrl:videoUrl.trim(),comment:replyComment.trim()});
    setReplyTarget(null);setVideoUrl("");setReplyComment("");
  };

  const onDelete=async(qId)=>{
    if(!window.confirm("삭제할까요?")) return;
    await deleteQ(qId);
    if(replyTarget===qId) setReplyTarget(null);
  };

  const filtered=questions.filter(q=>filter==="all"?true:filter==="pending"?!q.answered:q.answered);
  const pending=questions.filter(q=>!q.answered).length;
  const canSubmit = !submitting && (!!photo || !!qText.trim());

  return(
    <div style={{minHeight:"100vh",background:"#f4f6fb"}}>

      {/* 헤더 */}
      <header style={{background:"#e4e8f4",padding:"0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",height:54,position:"sticky",top:0,zIndex:100,borderBottom:"1px solid #e8edf5"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <a href="./main.html" style={{color:"#94a3b8",fontSize:18,textDecoration:"none",fontWeight:700,lineHeight:1}}>←</a>
          <span style={{fontSize:15,fontWeight:700,color:"#1e2533"}}>익명 질문함</span>
          {pending>0&&mode==="teacher"&&authed&&(
            <span style={{background:"#ef4444",color:"#fff",borderRadius:99,padding:"1px 8px",fontSize:11,fontWeight:700}}>{pending}</span>
          )}
        </div>
        <button onClick={()=>setMode(mode==="teacher"?"student":"teacher")}
          style={{padding:"6px 14px",borderRadius:99,border:"1px solid #e2e8f0",cursor:"pointer",background:mode==="teacher"?"#f1f5f9":"transparent",color:mode==="teacher"?"#6366f1":"#94a3b8",fontWeight:700,fontSize:12}}>
          🔐 선생님
        </button>
      </header>

      <div style={{maxWidth:640,margin:"0 auto",padding:"20px 16px"}}>

        {/* 학생 모드 */}
        {mode==="student"&&(
          <>
            {/* 질문 작성 카드 */}
            <div style={{background:"#e4e8f4",borderRadius:16,border:"1px solid #e8edf5",padding:20,marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:16,fontWeight:700,color:"#1e2533",marginBottom:4}}>모르는 문제를 올려보세요</div>
                <div style={{fontSize:12,color:"#94a3b8"}}>선생님이 해설을 달아드려요 🎬</div>
              </div>

              {/* 과목 선택 */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                {SUBJECTS.map(s=>{
                  const [bg,color]=SC[s];
                  const sel = subject===s;
                  return(
                    <button key={s} onClick={()=>setSubject(s)}
                      style={{padding:"5px 14px",borderRadius:99,border:`2px solid ${sel?color:"#e8edf5"}`,cursor:"pointer",fontSize:12,fontWeight:700,
                        background:sel?color:"#fff", color:sel?"#fff":"#64748b", transition:"all 0.15s",
                        boxShadow:sel?`0 2px 8px ${color}55`:"none"}}>
                      {s}
                    </button>
                  );
                })}
              </div>

              {/* 사진 업로드 */}
              <label style={{display:"block",border:"1.5px dashed "+(preview?"#a5b4fc":"#cbd5e1"),borderRadius:12,padding:preview?0:"28px 20px",textAlign:"center",cursor:"pointer",background:preview?"#fafbff":"#f8fafc",marginBottom:12,overflow:"hidden"}}>
                <input type="file" accept="image/*" style={{position:"absolute",opacity:0,width:0,height:0,overflow:"hidden"}} onChange={onFile}/>
                {preview?(
                  <div style={{position:"relative"}}>
                    <img src={preview} style={{maxWidth:"100%",maxHeight:240,display:"block",margin:"0 auto"}}/>
                    <button onClick={e=>{e.preventDefault();e.stopPropagation();setPhoto(null);setPreview(null);}}
                      style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",border:"none",borderRadius:"50%",width:28,height:28,color:"#fff",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                  </div>
                ):(
                  <>
                    <div style={{fontSize:28,marginBottom:6}}>📷</div>
                    <div style={{fontWeight:700,fontSize:13,color:"#6366f1",marginBottom:2}}>사진 업로드</div>
                    <div style={{fontSize:11,color:"#94a3b8"}}>클릭하거나 촬영해서 올려주세요</div>
                  </>
                )}
              </label>

              {/* 텍스트 */}
              <textarea value={qText} onChange={e=>setQText(e.target.value)} placeholder="어떤 부분이 어려운지 적어주세요 (선택)" rows={3}
                style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 14px",fontSize:14,resize:"none",outline:"none",background:"#f8fafc",marginBottom:14,lineHeight:1.6}}/>

              {done?(
                <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"13px 16px",textAlign:"center",color:"#16a34a",fontWeight:700,fontSize:14}}>
                  ✅ 질문이 전송됐어요!
                </div>
              ):(
                <button onClick={submit} disabled={!canSubmit}
                  style={{width:"100%",background:canSubmit?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#e8edf5",border:"none",borderRadius:10,color:canSubmit?"#fff":"#94a3b8",padding:"13px 0",fontSize:14,fontWeight:700,cursor:canSubmit?"pointer":"not-allowed",transition:"all 0.2s"}}>
                  {submitting?"전송 중...":"익명으로 질문 보내기"}
                </button>
              )}
            </div>

            {/* 해설 완료된 질문 목록 */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:700,color:"#64748b",marginBottom:10}}>해설 완료된 질문</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {["전체",...SUBJECTS].map(s=>(
                  <button key={s} onClick={()=>setSubjectFilter(s)}
                    style={{padding:"5px 12px",borderRadius:99,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
                      background:subjectFilter===s?"#1e2533":"#e8edf5",
                      color:subjectFilter===s?"#fff":"#64748b",transition:"all 0.15s"}}>
                    {s}
                  </button>
                ))}
              </div>
            </div>

            {loading
              ? <div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8",fontSize:13}}>불러오는 중...</div>
              : questions.filter(q=>q.answered&&(subjectFilter==="전체"||q.subject===subjectFilter)).length===0
                ? <div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8",fontSize:13}}>해설된 질문이 없어요</div>
                : questions.filter(q=>q.answered&&(subjectFilter==="전체"||q.subject===subjectFilter)).map(q=><QCard key={q.id} q={q} num={questions.length-questions.indexOf(q)} isTeacher={false}/>)
            }
          </>
        )}

        {/* 선생님 로그인 */}
        {mode==="teacher"&&!authed&&(
          <div style={{background:"#e4e8f4",borderRadius:16,border:"1px solid #e8edf5",padding:36,maxWidth:320,margin:"60px auto",textAlign:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
            <div style={{fontSize:36,marginBottom:12}}>🔐</div>
            <div style={{fontSize:17,fontWeight:700,marginBottom:6}}>선생님 전용</div>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:20}}>비밀번호를 입력해 주세요</div>
            <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwErr(false);}}
              onKeyDown={e=>e.key==="Enter"&&login()} placeholder="비밀번호"
              style={{width:"100%",border:"1px solid "+(pwErr?"#ef4444":"#e2e8f0"),borderRadius:10,padding:"11px 14px",fontSize:15,outline:"none",textAlign:"center",marginBottom:8,background:"#f8fafc"}}/>
            {pwErr&&<div style={{color:"#ef4444",fontSize:12,marginBottom:8}}>비밀번호가 틀렸어요</div>}
            <button onClick={login}
              style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",border:"none",borderRadius:10,color:"#fff",padding:"12px 0",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:4}}>
              입장하기
            </button>
          </div>
        )}

        {/* 선생님 대시보드 */}
        {mode==="teacher"&&authed&&(
          <>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <div>
                <span style={{fontSize:15,fontWeight:700}}>질문 관리</span>
                <span style={{fontSize:12,color:"#94a3b8",marginLeft:8}}>총 {questions.length}개 · 미답변 {pending}개</span>
              </div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                {[["all","전체"],["pending","미답변"],["answered","완료"]].map(([val,label])=>(
                  <button key={val} onClick={()=>setFilter(val)}
                    style={{padding:"5px 12px",borderRadius:99,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,
                      background:filter===val?"#1e2533":"#e8edf5",
                      color:filter===val?"#fff":"#64748b"}}>
                    {label}
                  </button>
                ))}

                {/* 이메일 알림 토글 */}
                <div onClick={()=>{const next=!emailAlert;db.ref('settings/emailAlert').set(next);emailAlertRef.current=next;setEmailAlert(next);}}
                  style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",background:emailAlert?"#f0fdf4":"#f8fafc",border:"1px solid "+(emailAlert?"#bbf7d0":"#e2e8f0"),borderRadius:99,padding:"5px 12px 5px 8px"}}>
                  <div style={{width:28,height:16,borderRadius:8,background:emailAlert?"#22c55e":"#cbd5e1",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                    <div style={{position:"absolute",top:2,left:emailAlert?12:2,width:12,height:12,borderRadius:"50%",background:"#e4e8f4",transition:"left 0.2s",boxShadow:"0 1px 2px rgba(0,0,0,0.2)"}}/>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:emailAlert?"#16a34a":"#94a3b8",whiteSpace:"nowrap"}}>메일 {emailAlert?"ON":"OFF"}</span>
                </div>
              </div>
            </div>

            {loading
              ? <div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8",fontSize:13}}>불러오는 중...</div>
              : filtered.length===0
                ? <div style={{textAlign:"center",padding:"60px 0",color:"#94a3b8",fontSize:13}}>질문이 없어요</div>
                : filtered.map(q=>(
                    <QCard key={q.id} q={q} num={questions.length-questions.indexOf(q)} isTeacher={true}
                      replyTarget={replyTarget} setReplyTarget={setReplyTarget}
                      videoUrl={videoUrl} setVideoUrl={setVideoUrl}
                      replyComment={replyComment} setReplyComment={setReplyComment}
                      onReply={()=>onReply(q.id)}
                      onDelete={()=>onDelete(q.id)}/>
                  ))
            }
          </>
        )}
      </div>
    </div>
  );
}

document.getElementById("loading").style.display="none";
document.getElementById("root").style.display="block";
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>



<script>
(function(){
  if(typeof firebase==='undefined') return;
  var VK='smv';
  function initFB(){
    // 이미 초기화된 경우(inline config) 바로 true
    if(typeof firebase!=='undefined'&&firebase.apps&&firebase.apps.length>0) return true;
    if(typeof SM_CONFIG==='undefined'||!SM_CONFIG.apiKey||SM_CONFIG.apiKey.includes('여기에')) return false;
    try{if(!firebase.apps.length)firebase.initializeApp(SM_CONFIG);}catch(e){}
    return firebase.apps.length>0;
  }
  function doCheck(){
    if(!firebase.apps.length) return;
    firebase.database().ref('smAppVersion').once('value',function(s){
      var sv=s.val();
      if(!sv) return;
      var lv=sessionStorage.getItem(VK);
      if(lv===null){sessionStorage.setItem(VK,sv);return;}
      if(sv!==lv){sessionStorage.setItem(VK,sv);location.reload(true);}
    });
  }
  // 페이지 최초 로드 시 즉시 체크
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){if(initFB())doCheck();});
  }else{if(initFB())doCheck();}
  // 탭이 포커스될 때마다 체크
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible'&&initFB())doCheck();
  });
  // 30초마다 백그라운드 체크
  setInterval(function(){if(initFB())doCheck();},30000);
})();
</script>

</body>
