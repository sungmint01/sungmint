<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 — 성민T</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gothic+A1:wght@300;400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f8faff;color:#1a202c;min-height:100vh}
:root{--bl:#74B3D8;--bld:#5a9ec7;--pu:#5a8ae0;--pud:#3764bf}

/* Login */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0533,#3b1d6e,#5b2d9e)}
.lbox{background:#fff;border-radius:22px;padding:44px 36px;width:320px;box-shadow:0 24px 60px rgba(0,0,0,.3);text-align:center}
.lbox .ico{width:58px;height:58px;background:linear-gradient(135deg,#5a8ae0,#3764bf);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px}
.lbox h1{font-family:'Black Han Sans',sans-serif;font-size:22px;margin-bottom:4px;background:linear-gradient(135deg,#5a8ae0,#3764bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lbox .sub{font-family:'Space Mono',monospace;font-size:10px;color:#94a3b8;letter-spacing:2px;margin-bottom:28px;text-transform:uppercase}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;outline:none;transition:.2s;margin-bottom:12px}
.inp:focus{border-color:var(--pu);box-shadow:0 0 0 3px rgba(167,139,250,.15)}
.btn-pri{width:100%;background:linear-gradient(135deg,#5a8ae0,#3764bf);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.btn-pri:hover{opacity:.9}
.errmsg{color:#ef4444;font-size:12px;margin-top:8px;min-height:16px}
.back-link{display:block;margin-top:16px;font-size:12px;color:#94a3b8;text-decoration:none;font-family:'Space Mono',monospace}
.back-link:hover{color:#64748b}

/* App */
#app{display:none;max-width:560px;margin:0 auto;padding:0 14px 60px}

/* Header */
.hdr{background:linear-gradient(135deg,#1a2840,#2a3f6f,#3764bf);padding:32px 20px 56px;margin:0 -14px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;width:220px;height:220px;background:radial-gradient(circle,rgba(167,139,250,.2),transparent 70%);top:-50px;right:-30px;pointer-events:none}
.hdr-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:4px 12px;font-size:11px;color:rgba(255,255,255,.75);font-family:'Space Mono',monospace;letter-spacing:.04em;margin-bottom:14px}
.hdr-name{font-family:'Black Han Sans',sans-serif;font-size:26px;color:#fff;margin-bottom:6px}
.hdr-sub{font-size:13px;color:rgba(255,255,255,.55)}
.logout-btn{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:11px;border-radius:8px;padding:5px 10px;cursor:pointer;font-family:inherit}

/* Homework card (1 week) */
.hw-card{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:22px;margin-top:-28px;position:relative;z-index:1;margin-bottom:16px;border-top:4px solid var(--pu)}
.hw-label{font-family:'Space Mono',monospace;font-size:9px;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.hw-item{background:#f5f3ff;border-radius:12px;padding:14px 16px;margin-bottom:10px;border-left:4px solid var(--pu)}
.hw-item-date{font-size:11px;color:#7c3aed;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.hw-item-today{background:#7c3aed;color:#fff;border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700}
.hw-item-content{font-size:14px;color:#374151;line-height:1.7;font-weight:500}
.hw-title{font-family:'Black Han Sans',sans-serif;font-size:18px;margin-bottom:14px;background:linear-gradient(135deg,#5a8ae0,#3764bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hw-date{font-size:12px;color:#94a3b8;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hw-content{background:#f5f3ff;border-radius:10px;padding:14px 16px;font-size:14px;color:#374151;line-height:1.7;font-weight:500}
.hw-empty{font-size:13px;color:#94a3b8;text-align:center;padding:20px 0;font-style:italic}
.hw-nav{display:flex;gap:8px;margin-top:12px}
.hw-nav-btn{background:#f1f5f9;border:none;border-radius:8px;padding:6px 12px;font-size:12px;color:#475569;cursor:pointer;font-family:inherit;transition:.15s}
.hw-nav-btn:hover{background:#e2e8f0}
.hw-nav-btn.active{background:var(--pu);color:#fff}

/* Planner upload */
.planner-card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.pc-head{padding:16px 20px 12px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.pc-title{font-family:'Black Han Sans',sans-serif;font-size:16px;background:linear-gradient(135deg,#5a8ae0,#3764bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.upload-area{margin:16px 20px;border:2px dashed #e2e8f0;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.upload-area:hover{border-color:var(--pu);background:#faf5ff}
.upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:13px;color:#64748b;line-height:1.6}
.upload-text strong{color:var(--pu)}
.date-row{display:flex;align-items:center;gap:10px;margin:0 20px 12px}
.date-label{font-size:12px;font-weight:600;color:#374151;white-space:nowrap}
.date-inp{flex:1;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:.2s}
.date-inp:focus{border-color:var(--pu)}
.upload-btn{width:calc(100% - 40px);margin:0 20px 20px;background:linear-gradient(135deg,#5a8ae0,#3764bf);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
.upload-btn:hover{opacity:.9}
.upload-btn:disabled{background:#cbd5e1;cursor:not-allowed}
.preview-img{width:100%;border-radius:10px;margin:0 0 12px;object-fit:cover;max-height:300px;display:none}
.prog-bar{height:4px;background:#e2e8f0;border-radius:99px;margin:0 20px 12px;overflow:hidden;display:none}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pu),var(--pud));border-radius:99px;transition:width .3s}
.upload-msg{font-size:12px;text-align:center;margin:0 20px 8px;min-height:16px}
.upload-msg.ok{color:#15803d}
.upload-msg.err{color:#ef4444}

/* Planner history */
.plan-list{padding:0 20px 20px}
.plan-item{background:#f8fafc;border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid #e2e8f0}
.plan-item-head{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.plan-date{font-size:13px;font-weight:600;color:#374151}
.plan-img{width:100%;max-height:280px;object-fit:cover;cursor:pointer}
.plan-comment{background:#f0fdf4;border-top:1px solid #dcfce7;padding:10px 14px;font-size:13px;color:#166534;line-height:1.6}
.plan-comment-head{font-size:11px;font-weight:700;color:#15803d;margin-bottom:3px;display:flex;align-items:center;gap:4px}
.plan-no-comment{padding:10px 14px;font-size:12px;color:#94a3b8;font-style:italic}

/* Image lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

.empty-plan{text-align:center;padding:28px;color:#94a3b8;font-size:13px}
/* Planner calendar */
.plan-cal-wrap{padding:12px 14px 16px}
.plan-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.plan-cal-month{font-size:13px;font-weight:700}
.plan-cal-btn{background:#f1f5f9;border:none;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#475569}
.plan-cal-btn:hover{background:#e2e8f0}
.plan-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.plan-cal-dow{text-align:center;font-size:10px;font-weight:600;color:#94a3b8;padding:2px 0}
.plan-cal-dow:first-child{color:#ef4444}.plan-cal-dow:last-child{color:#3b82f6}
.plan-cal-day{min-height:44px;border-radius:8px;padding:3px 4px;display:flex;flex-direction:column;cursor:pointer;border:1.5px solid transparent;background:#fafbfc;transition:.12s}
.plan-cal-day:hover{background:#f0f4f8;border-color:#e2e8f0}
.plan-cal-day.today{border-color:#a78bfa;background:#faf5ff}
.plan-cal-day.other-month{background:transparent;cursor:default}
.plan-cal-day.other-month:hover{background:transparent;border-color:transparent}
.plan-cal-day-num{font-size:11px;font-weight:600;color:#374151}
.plan-cal-day.today .plan-cal-day-num{color:#7c3aed}
.plan-cal-day.other-month .plan-cal-day-num{color:#dde3ed}
.plan-cal-day.sun .plan-cal-day-num{color:#ef4444}
.plan-cal-day.sat .plan-cal-day-num{color:#3b82f6}
.plan-cal-day.other-month .plan-cal-day-num{color:#dde3ed !important}
.plan-cal-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap}
.plan-cal-dot{width:7px;height:7px;border-radius:50%}
.dot-plan-type{background:#60a5fa}
.dot-done-type{background:#34d399}
/* Planner detail modal */
.plan-detail-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:14px}
.plan-detail-ov.open{display:flex}
.plan-detail-modal{background:#fff;border-radius:18px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.pdm-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;border-bottom:1px solid #f1f5f9}
.pdm-date{font-size:14px;font-weight:700}
.pdm-close{background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8}
.pdm-body{padding:14px 18px 20px}
.pdm-item{background:#f8fafc;border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid #e2e8f0}
.pdm-item-head{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;background:#f1f5f9}
.pdm-img{width:100%;max-height:260px;object-fit:cover;cursor:pointer}
.pdm-comment{padding:10px 12px;font-size:13px;color:#166534;background:#f0fdf4;line-height:1.6;white-space:pre-wrap}
.pdm-comment-head{font-size:10px;font-weight:700;color:#15803d;margin-bottom:3px}
.pdm-no-comment{padding:8px 12px;font-size:12px;color:#94a3b8;font-style:italic}
.pdm-empty{text-align:center;padding:28px;color:#94a3b8;font-size:13px}
.type-row{display:flex;gap:8px;margin:0 20px 12px}
.type-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8faff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#64748b;transition:.15s;text-align:center}
.type-btn:hover{border-color:#a78bfa;background:#faf5ff}
.type-btn.sel{border-color:#a78bfa;background:#f5f3ff;color:#7c3aed}
.plan-type-badge{display:inline-flex;align-items:center;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:600}
.badge-plan{background:#eff6ff;color:#2563eb}
.badge-done{background:#f0fdf4;color:#15803d}
.section-title{font-family:'Black Han Sans',sans-serif;font-size:15px;margin-bottom:10px;color:#374151}
</style>
</head>
<body>

<!-- Login -->
<div id="loginPage">
  <div class="lbox">
    <div class="ico">✏️</div>
    <h1>성민T 학생</h1>
    <p class="sub">Student Portal</p>
    <input class="inp" type="password" id="pwIn" placeholder="학생 비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-pri" onclick="doLogin()">로그인</button>
    <div class="errmsg" id="lerr"></div>
    <a class="back-link" href="./main.html">← 홈으로</a>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="hdr">
    <button class="logout-btn" onclick="logout()">로그아웃</button>
    <div class="hdr-badge">✏️ Student</div>
    <div class="hdr-name" id="stuName"></div>
    <div class="hdr-sub" id="stuSub"></div>
  </div>

  <!-- Today HW -->
  <div class="hw-card">
    <div class="hw-label">This Week's Homework</div>
    <div class="hw-title">이번 주 숙제</div>
    <div id="hwContent"><div class="hw-empty">등록된 숙제가 없습니다</div></div>
  </div>

  <!-- Planner upload -->
  <div class="planner-card">
    <div class="pc-head">
      <span class="pc-title">📸 플래너 제출</span>
    </div>
    <div class="date-row">
      <span class="date-label">날짜</span>
      <input class="date-inp" type="date" id="planDate">
    </div>
    <div class="type-row">
      <button class="type-btn sel" id="typePlan" onclick="setType('plan')">📋 계획 플래너<br><span style="font-size:10px;font-weight:400;color:#94a3b8">전날 밤 · 아침</span></button>
      <button class="type-btn" id="typeDone" onclick="setType('done')">✅ 완료 플래너<br><span style="font-size:10px;font-weight:400;color:#94a3b8">하루 끝</span></button>
    </div>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*" onchange="onFileSelect(event)">
      <div class="upload-icon">📷</div>
      <div class="upload-text"><strong>사진 찍기 또는 선택</strong><br>플래너를 촬영하거나 갤러리에서 선택하세요</div>
    </div>
    <img class="preview-img" id="previewImg">
    <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="upload-msg" id="uploadMsg"></div>
    <button class="upload-btn" id="uploadBtn" onclick="uploadPlanner()" disabled>
      📤 플래너 제출하기
    </button>
  </div>

  <!-- Planner calendar -->
  <div class="planner-card">
    <div class="pc-head">
      <span class="pc-title">📋 제출 달력</span>
    </div>
    <div class="plan-cal-wrap">
      <div class="plan-cal-nav">
        <button class="plan-cal-btn" onclick="changePlanMonth(-1)">‹</button>
        <span class="plan-cal-month" id="planCalMonth"></span>
        <button class="plan-cal-btn" onclick="changePlanMonth(1)">›</button>
      </div>
      <div class="plan-cal-grid" id="planCalGrid">
        <div class="plan-cal-dow">일</div><div class="plan-cal-dow">월</div><div class="plan-cal-dow">화</div>
        <div class="plan-cal-dow">수</div><div class="plan-cal-dow">목</div><div class="plan-cal-dow">금</div><div class="plan-cal-dow">토</div>
      </div>
    </div>
  </div>
  <!-- Planner detail modal -->
  <div class="plan-detail-ov" id="planDetailOv" onclick="if(event.target===this)closePlanDetail()">
    <div class="plan-detail-modal">
      <div class="pdm-head">
        <span class="pdm-date" id="pdmDate"></span>
        <button class="pdm-close" onclick="closePlanDetail()">✕</button>
      </div>
      <div class="pdm-body" id="pdmBody"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">✕</button>
  <img id="lightboxImg">
</div>

<script>
function today(){
  const d=new Date();
  if(d.getHours()<3) d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
let db, stuId = null, stuData = null, selectedFile = null, sessions = {}, planType = 'plan', plannerData = {}, planYear, planMonth, od4pData = {};

window.addEventListener('DOMContentLoaded', () => {
  if (typeof SM_CONFIG === 'undefined' || !SM_CONFIG.apiKey || SM_CONFIG.apiKey.includes('여기에')) {
    document.getElementById('loginPage').innerHTML = '<div style="color:#fff;text-align:center;padding:40px"><h2>⚠️ 설정 필요</h2></div>';
    return;
  }
  try {
    if (!firebase.apps.length) firebase.initializeApp(SM_CONFIG);
    db = firebase.database();
  } catch(e) { alert('Firebase 오류: ' + e.message); return; }
  document.getElementById('planDate').value = today();
});

async function doLogin() {
  const pw = document.getElementById('pwIn').value;
  if (!pw) return;
  const err = document.getElementById('lerr');
  err.textContent = '';
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  const hash = [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
  const snap = await db.ref('smStudents').get();
  const all = snap.val() || {};
  const entry = Object.entries(all).find(([,s]) => s.studentPwHash === hash);
  if (entry) {
    stuId = entry[0];
    stuData = entry[1];
    sessionStorage.setItem('stuId', stuId);
    sessionStorage.setItem('stuHash', hash);
    showApp();
  } else {
    err.textContent = '비밀번호가 올바르지 않습니다';
  }
}

function logout() {
  sessionStorage.removeItem('stuId');
  sessionStorage.removeItem('stuHash');
  location.reload();
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('stuName').textContent = stuData.name || '';
  document.getElementById('stuSub').textContent = `${stuData.grade||''} · ${stuData.subj||'수학'}`;
  // Load sessions for homework
  db.ref(`smSessions/${stuId}`).on('value', s => {
    sessions = s.val() || {};
    renderHomework();
  });
  // Load planners
  db.ref(`smPlanners/${stuId}`).on('value', s => {
    renderPlanners(s.val() || {});
  });
  // Load od4p submissions for this student
  db.ref('od4p').on('value', s => {
    const allOd4p = s.val() || {};
    od4pData = {};
    Object.entries(allOd4p).forEach(([date, subjects]) => {
      Object.values(subjects).forEach(sub => {
        const subs = sub.submissions || {};
        const myEntry = Object.values(subs).find(e => e.name === stuData.name);
        if (myEntry) {
          if (!od4pData[date]) od4pData[date] = [];
          // 채점: 정답과 비교
          var problems = sub.problems || {};
          var probArr = Object.values(problems);
          var myAnswers = myEntry.answers || {};
          var score = 0;
          var total = probArr.length;
          var wrongNums = [];
          probArr.forEach(function(p, i) {
            var ua = String(myAnswers[i] || '').trim();
            var correct = p.type === '객관식' ? ua === String(p.answer) : ua.replace(/\s/g,'') === String(p.answer).replace(/\s/g,'');
            if (correct) score++;
            else wrongNums.push(i+1);
          });
          od4pData[date].push({
            subject: sub.title || '',
            answers: myAnswers,
            score: score,
            total: total,
            wrongNums: wrongNums,
            ts: myEntry.ts || 0
          });
        }
      });
    });
    if (_planCalYear) renderPlanCal();
  });
}

// ── Homework ──
function renderHomework() {
  const todayStr = today();
  // 오늘로부터 7일 전
  const weekAgo = new Date(Date.now() - 7 * 24 * 3600 * 1000).toISOString().split('T')[0];
  const arr = Object.values(sessions)
    .filter(r => r.hwC && r.date && r.date >= weekAgo)
    .sort((a,b) => (b.date||'').localeCompare(a.date||''));
  const el = document.getElementById('hwContent');
  if (!arr.length) {
    el.innerHTML = '<div class="hw-empty">최근 1주일 내 숙제가 없습니다</div>';
    return;
  }
  el.innerHTML = arr.map(r => {
    const [y,m,d] = r.date.split('-');
    const isToday = r.date === todayStr;
    return `<div class="hw-item">
      <div class="hw-item-date">
        📅 ${y}년 ${+m}월 ${+d}일
        ${isToday ? '<span class="hw-item-today">오늘</span>' : ''}
      </div>
      <div class="hw-item-content">${r.hwC}</div>
    </div>`;
  }).join('');
}

function setType(t) {

function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('previewImg');

    img.style.display = 'block';
    img.style.margin = '0 20px 12px';

async function uploadPlanner() {
  if (!selectedFile) return;
  const date = document.getElementById('planDate').value;
  if (!date) { alert('날짜를 선택하세요'); return; }

  const btn = document.getElementById('uploadBtn');
  const msg = document.getElementById('uploadMsg');
  const prog = document.getElementById('progBar');
  const fill = document.getElementById('progFill');
  btn.disabled = true;
  btn.innerHTML = '압축 중...';
  prog.style.display = 'block';
  fill.style.width = '30%';
  msg.textContent = '';

  try {
    // Compress to small base64 — no Storage needed
    const base64 = await compressToBase64(selectedFile, 900, 0.75);
    fill.style.width = '70%';
    btn.innerHTML = '저장 중...';

    await db.ref(`smPlanners/${stuId}`).push({
      date,
      type: planType,
      imageData: base64,   // base64 stored in RTDB
      ts: Date.now()
    });

    fill.style.width = '100%';
    const label = planType === 'plan' ? '계획' : '완료';
    msg.textContent = `✅ ${label} 플래너 제출 완료!`;
    msg.className = 'upload-msg ok';
    setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 600);
    document.getElementById('previewImg').style.display = 'none';
    document.getElementById('previewImg').src = '';
    document.getElementById('fileInput').value = '';
    selectedFile = null;
    btn.disabled = false;
    btn.innerHTML = '📤 플래너 제출하기';
    setTimeout(() => { msg.textContent = ''; }, 4000);

  } catch(e) {
    console.error(e);
    msg.textContent = '❌ 오류: ' + e.message;
    msg.className = 'upload-msg err';
    prog.style.display = 'none';
    btn.disabled = false;
    btn.innerHTML = '📤 플래너 제출하기';
  }
}

// Compress image and return base64 string
function compressToBase64(file, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── Planner calendar ──
var _planCalYear, _planCalMonth;
function renderPlanners(data) {
  plannerData = data;
  if (!_planCalYear) {
    var now = new Date();
    _planCalYear = now.getFullYear();
    _planCalMonth = now.getMonth();
  }
  renderPlanCal();
}
function changePlanMonth(dir) {
  _planCalMonth += dir;
  if (_planCalMonth > 11) { _planCalMonth = 0; _planCalYear++; }
  if (_planCalMonth < 0) { _planCalMonth = 11; _planCalYear--; }
  renderPlanCal();
}
function renderPlanCal() {
  var mn = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('planCalMonth').textContent = _planCalYear + '년 ' + mn[_planCalMonth];
  var todayStr = today();
  var firstDay = new Date(_planCalYear, _planCalMonth, 1).getDay();
  var daysInMonth = new Date(_planCalYear, _planCalMonth + 1, 0).getDate();
  var daysInPrev = new Date(_planCalYear, _planCalMonth, 0).getDate();
  var dateMap = {};
  Object.values(plannerData).forEach(function(p) {
    if (!p.date) return;
    if (!dateMap[p.date]) dateMap[p.date] = [];
    dateMap[p.date].push(p);
  });
  var grid = document.getElementById('planCalGrid');
  var headers = Array.from(grid.children).slice(0, 7);
  grid.innerHTML = ''; headers.forEach(function(h) { grid.appendChild(h); });
  for (var i = firstDay - 1; i >= 0; i--) {
    var cell = document.createElement('div');
    cell.className = 'plan-cal-day other-month';
    cell.innerHTML = '<span class="plan-cal-day-num">' + (daysInPrev - i) + '</span>';
    grid.appendChild(cell);
  }
  for (var d = 1; d <= daysInMonth; d++) {
    var ds = _planCalYear + '-' + String(_planCalMonth + 1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    var dow = (firstDay + d - 1) % 7;
    var plans = dateMap[ds] || [];
    var cell = document.createElement('div');
    var cls = 'plan-cal-day';
    if (ds === todayStr) cls += ' today';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    cell.className = cls;
    var dotsHtml = '';
    if (plans.length) {
      var hasPlan = plans.some(function(p){ return p.type !== 'done'; });
      var hasDone = plans.some(function(p){ return p.type === 'done'; });
      if (hasPlan) dotsHtml += '<div class="plan-cal-dot dot-plan-type"></div>';
      if (hasDone) dotsHtml += '<div class="plan-cal-dot dot-done-type"></div>';
      cell.style.background = '#faf5ff';
      cell.style.borderColor = '#e9d5ff';
    }
    var od4pEntries = od4pData[ds] || [];
    if (od4pEntries.length) {
      dotsHtml += '<div class="plan-cal-dot dot-od4p"></div>';
      if (!plans.length) { cell.style.background = '#fffbeb'; cell.style.borderColor = '#fde68a'; }
      // 점수 요약
      var totalScore = od4pEntries.reduce(function(a,e){return a+e.score;},0);
      var totalProbs = od4pEntries.reduce(function(a,e){return a+e.total;},0);
      if (totalProbs > 0) {
        var scoreEl = document.createElement('div');
        scoreEl.style.cssText='font-size:9px;color:#92400e;font-weight:700;line-height:1.2';
        scoreEl.textContent = totalScore+'/'+totalProbs;
        cell.appendChild(scoreEl);
      }
    }
    cell.innerHTML = '<span class="plan-cal-day-num">' + d + '</span>'
      + (dotsHtml ? '<div class="plan-cal-dots">' + dotsHtml + '</div>' : '');
    var od4pDay2 = od4pData[ds] || [];
    if (plans.length || od4pDay2.length) {
      cell.style.cursor = 'pointer';
      (function(date, ps) {
        cell.addEventListener('click', function() { openPlanDetail(date, ps); });
      })(ds, plans);
    }
    grid.appendChild(cell);
  }
  var total = firstDay + daysInMonth;
  var rem = (7 - total % 7) % 7;
  for (var d = 1; d <= rem; d++) {
    var cell = document.createElement('div');
    cell.className = 'plan-cal-day other-month';
    cell.innerHTML = '<span class="plan-cal-day-num">' + d + '</span>';
    grid.appendChild(cell);
  }
}
function openPlanDetail(ds, plans) {
  var parts = ds.split('-');
  var y = parts[0], m = +parts[1], d = +parts[2];
  document.getElementById('pdmDate').textContent = y + '년 ' + m + '월 ' + d + '일';
  var html = '';
  // od4p 성적 표시
  var od4pDay = od4pData[ds] || [];
  if (od4pDay.length) {
    od4pDay.forEach(function(e){
      var scoreColor = e.total > 0 ? (e.score/e.total >= 0.8 ? '#166534' : e.score/e.total >= 0.5 ? '#92400e' : '#b91c1c') : '#374151';
      html += '<div style="background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:10px">';
      html += '<div style="font-weight:700;color:#92400e;margin-bottom:6px;font-size:13px">📝 OD4P — ' + (e.subject||'') + '</div>';
      if (e.total > 0) {
        html += '<div style="font-size:22px;font-weight:800;color:' + scoreColor + ';margin-bottom:4px">' + e.score + ' / ' + e.total + '점</div>';
        if (e.wrongNums && e.wrongNums.length > 0) {
          html += '<div style="font-size:11px;color:#ef4444;margin-top:2px">오답: ' + e.wrongNums.join('번, ') + '번</div>';
        } else {
          html += '<div style="font-size:11px;color:#166534;margin-top:2px">🎉 모두 정답!</div>';
        }
      } else {
        html += '<div style="font-size:12px;color:#92400e">' + Object.keys(e.answers).length + '문제 응시</div>';
      }
      html += '</div>';
    });
  }
  plans.sort(function(a,b){ return (a.ts||0)-(b.ts||0); }).forEach(function(p) {
    var badge = p.type === 'done'
      ? '<span class="plan-type-badge badge-done">✅ 완료</span>'
      : '<span class="plan-type-badge badge-plan">📋 계획</span>';
    var commentHtml = p.comment
      ? '<div class="pdm-comment"><div class="pdm-comment-head">✏️ 선생님 코멘트</div>' + p.comment.split('\n').join('<br>') + '</div>'
      : '<div class="pdm-no-comment">⏳ 코멘트 대기 중</div>';
    html += '<div class="pdm-item">';
    html += '<div class="pdm-item-head">' + badge + '</div>';
    html += '<img class="pdm-img" src="' + (p.imageData||p.imageUrl||'') + '" onclick="openLightbox(this.src)" loading="lazy">';
    html += commentHtml + '</div>';
  });
  document.getElementById('pdmBody').innerHTML = html || '<div class="pdm-empty">기록이 없습니다</div>';
  document.getElementById('planDetailOv').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePlanDetail() {
  document.getElementById('planDetailOv').classList.remove('open');
  document.body.style.overflow = '';
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

<script>
(function(){
  // URL에 _v 파라미터 있으면 제거 (새로 받아온 것)
  var url=new URL(location.href);
  var urlVer=url.searchParams.get('_v');
  if(urlVer){
    sessionStorage.setItem('smv',urlVer);
    url.searchParams.delete('_v');
    history.replaceState(null,'',url.toString());
  }

  function getDB(){
    try{
      if(typeof firebase==='undefined') return null;
      if(firebase.apps&&firebase.apps.length>0) return firebase.database();
      if(typeof SM_CONFIG==='undefined'||!SM_CONFIG.apiKey||SM_CONFIG.apiKey.includes('여기에')) return null;
      firebase.initializeApp(SM_CONFIG);
      return firebase.database();
    }catch(e){return null;}
  }

  function doCheck(){
    var db=getDB();
    if(!db) return;
    db.ref('smAppVersion').once('value',function(s){
      var sv=String(s.val()||'');
      if(!sv) return;
      var lv=sessionStorage.getItem('smv')||'';
      if(!lv){sessionStorage.setItem('smv',sv);return;}
      if(sv===lv) return;
      // 버전 다름 → fetch로 새 파일 강제 다운로드 후 이동
      sessionStorage.setItem('smv',sv);
      var newUrl=location.pathname+'?_v='+sv;
      fetch(newUrl,{cache:'no-store',credentials:'same-origin'})
        .then(function(r){
          if(r.ok) location.replace(newUrl);
          else location.replace(location.pathname+'?nocache='+Date.now());
        })
        .catch(function(){
          location.replace(location.pathname+'?nocache='+Date.now());
        });
    });
  }

  // 페이지 로드 시 즉시
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){doCheck();});
  }else{doCheck();}
  // 탭 포커스 시
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='visible') doCheck();
  });
  // 30초마다
  setInterval(doCheck,30000);
})();
</script>
