<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교재 질문 — 성민T</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
:root{
  --bg:#FBFAFF;--surface:#fff;--fg:#1E1B3A;--fg2:#6A6688;--fg3:#A8A4C0;
  --p1:#8B7FD9;--p2:#A89BEB;--p3:#C7BEF3;
  --warm:#E8795A;--cool:#56A08A;
  --shadow:rgba(120,105,205,.12);
  --border:rgba(120,100,200,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background-image:radial-gradient(circle at 12% 8%,rgba(240,166,196,.10) 0%,transparent 42%),radial-gradient(circle at 88% 92%,rgba(139,127,217,.10) 0%,transparent 45%);font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(ellipse 60% 40% at 10% 0%,rgba(155,143,224,.12) 0%,transparent 60%),
  radial-gradient(ellipse 50% 40% at 90% 100%,rgba(86,160,138,.08) 0%,transparent 60%)}

/* LOGIN */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(150deg,#8B7FD9 0%,#A89BEB 45%,#D4A5C8 100%)}
.lbox{background:#fff;border-radius:28px;padding:44px 36px;width:320px;max-width:100%;box-shadow:0 20px 50px rgba(120,105,205,.28),0 6px 16px rgba(120,105,205,.14);text-align:center}
.lbox .ico{color:#fff;font-weight:800;width:60px;height:60px;background:linear-gradient(135deg,#8B7FD9,#A89BEB);border-radius:19px;display:flex;align-items:center;justify-content:center;font-size:27px;margin:0 auto 18px;box-shadow:0 8px 20px rgba(139,127,217,.35)}
.lbox-badge{display:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--p1);background:rgba(157,145,238,.1);
  padding:4px 12px;border-radius:20px;margin-bottom:18px}
.lbox h1{font-family:'MaruBuri','Noto Sans KR',sans-serif;font-size:22px;margin-bottom:4px;background:linear-gradient(135deg,#8B7FD9,#A89BEB);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lbox .sub{font-size:10px;color:#AAA5C8;letter-spacing:2px;margin-bottom:28px;text-transform:uppercase}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;
  font-size:14px;font-family:inherit;color:var(--fg);background:#fff;outline:none;transition:.15s}
.inp:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(157,145,238,.15)}
.btn-pri{width:100%;padding:13px;background:linear-gradient(135deg,#8B7FD9,#A89BEB);border:none;
  border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-top:12px;letter-spacing:-.2px;transition:.15s}
.btn-pri:hover{opacity:.92}
.errmsg{font-size:12px;color:var(--warm);margin-top:8px;min-height:18px}
.back-link{display:block;text-align:center;font-size:13px;color:var(--fg3);margin-top:16px;
  text-decoration:none}
.back-link:hover{color:var(--fg2)}

/* APP */
#app{display:none;max-width:480px;margin:0 auto;padding:0 0 40px}

/* HEADER */
.hdr{background:linear-gradient(145deg,#6A5CC8 0%,#8878E0 50%,#AAA0F0 100%);
  padding:44px 22px 52px;position:relative;overflow:hidden;border-radius:0 0 32px 32px}
.hdr::before{content:'';position:absolute;width:200px;height:200px;
  background:rgba(255,255,255,.07);border-radius:50%;right:-40px;top:-60px}
.hdr::after{content:'';position:absolute;left:20px;bottom:-50px;width:130px;height:130px;
  background:rgba(232,121,90,.15);border-radius:50%;filter:blur(24px)}
.hdr-inner{position:relative;z-index:2}
.hdr-label{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;letter-spacing:2.5px;
  color:rgba(255,255,255,.5);text-transform:uppercase;margin-bottom:6px}
.hdr-name{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:2px}
.hdr-sub{font-size:12px;color:rgba(255,255,255,.5)}
.logout-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);
  border:none;padding:6px 12px;border-radius:20px;color:#fff;font-size:12px;cursor:pointer;
  font-family:inherit;font-weight:500;z-index:10}

/* BODY */
.body{padding:16px 16px 0}

.card{background:var(--surface);border-radius:18px;padding:18px;
  box-shadow:0 4px 24px var(--shadow);margin-bottom:14px}
.card-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;color:var(--fg3);text-transform:uppercase;margin-bottom:12px}

/* TB SELECTOR */
.tb-item{padding:12px 14px;border-radius:12px;background:var(--bg);cursor:pointer;
  margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;
  border:1.5px solid transparent;transition:.15s}
.tb-item:hover{border-color:var(--p2)}
.tb-item.selected{border-color:var(--p1);background:rgba(157,145,238,.08)}
.tb-name{font-size:14px;font-weight:600;color:var(--fg)}
.tb-cnt{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;color:var(--fg3)}

/* PROBLEM GRID */
.prob-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:4px}
@media(max-width:360px){.prob-grid{grid-template-columns:repeat(6,1fr)}}
/* prob-cell: 기본=회색, 체크=빨강, 영상=초록, 둘다=초록테두리+빨강배경 */
.prob-cell{position:relative;border-radius:10px;
  background:#fff;border:1.5px solid rgba(120,100,200,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:.12s;padding:7px 4px;min-width:0}
.prob-cell:hover{border-color:var(--p2);background:rgba(157,145,238,.05)}
.prob-cell.checked{background:rgba(239,68,68,.1);border-color:#ef4444}
.prob-cell.has-yt{border-color:#56A08A;background:rgba(86,160,138,.08)}
.prob-cell.checked.has-yt{background:rgba(239,68,68,.1);border-color:#56A08A;
  outline:2px solid rgba(239,68,68,.4)}
.prob-num{font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;
  color:var(--fg);line-height:1}
.prob-cell.checked .prob-num{color:#ef4444}
.prob-cell.has-yt .prob-num{color:#56A08A}
.prob-cell.checked.has-yt .prob-num{color:#ef4444}
.prob-yt-dot{width:5px;height:5px;border-radius:50%;background:#56A08A;margin-top:2px;display:none}
.prob-cell.has-yt .prob-yt-dot{display:block}
/* 영상 있으면 클릭 가능 커서 강조 */
.prob-cell.has-yt{cursor:pointer}

/* YOUTUBE PANEL */
.yt-panel{background:var(--surface);border-radius:18px;padding:16px;
  box-shadow:0 4px 24px var(--shadow);margin-bottom:14px}
.yt-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;color:var(--fg3);text-transform:uppercase;margin-bottom:10px}
.yt-item{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:rgba(232,121,90,.06);border:1.5px solid rgba(232,121,90,.2);
  border-radius:12px;margin-bottom:8px;text-decoration:none}
.yt-item:hover{background:rgba(232,121,90,.12)}
.yt-play{width:32px;height:32px;background:var(--warm);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yt-play::after{content:'▶';color:#fff;font-size:10px;margin-left:2px}
.yt-info{flex:1}
.yt-prob{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;color:var(--warm);
  font-weight:600;letter-spacing:.5px;margin-bottom:1px}
.yt-empty{font-size:13px;color:var(--fg3);font-style:italic;padding:8px 0;font-weight:300}

/* LEGEND */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--fg2)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* EMPTY */
.empty-msg{text-align:center;padding:32px;color:var(--fg3);font-size:13px;font-weight:300}

/* 범위 선택 */
.range-bar{background:var(--surface);border-radius:14px;padding:12px 14px;
  box-shadow:0 2px 12px var(--shadow);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.range-inp{width:64px;padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;font-family:inherit;color:var(--fg);text-align:center;outline:none}
.range-inp:focus{border-color:var(--p1)}
.range-btn{padding:7px 12px;border:none;border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit}
.range-btn.check{background:rgba(239,68,68,.12);color:#ef4444}
.range-btn.uncheck{background:rgba(120,100,200,.1);color:var(--p1)}
.range-btn.all-uncheck{background:var(--bg);color:var(--fg3)}
/* 섹션 그룹 */
.sec-header{font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:1.5px;color:var(--fg3);text-transform:uppercase;
  padding:6px 0 4px;margin-top:10px}
.sec-header:first-child{margin-top:0}
/* 영상 바텀시트 */
.yt-sheet{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;justify-content:center}
.yt-sheet.open{display:flex}
.yt-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.yt-panel{position:relative;z-index:1;background:#fff;border-radius:24px 24px 0 0;
  width:100%;max-width:480px;padding:20px 18px 36px;
  animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.yt-sheet-handle{width:36px;height:4px;background:var(--border);border-radius:4px;
  margin:0 auto 16px}
.yt-embed{width:100%;aspect-ratio:16/9;border-radius:12px;border:none;margin-top:10px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="lbox">
    <div class="ico">📖</div>
    <h1>교재 질문</h1>
    <div class="sub">학생 비밀번호를 입력하세요</div>
    <input class="inp" type="password" id="pwInp" placeholder="비밀번호 입력" autocomplete="off"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-pri" onclick="doLogin()">확인 →</button>
    <div class="errmsg" id="errLogin"></div>
    <a href="./main.html" class="back-link">← 홈으로</a>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="hdr">
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    <div class="hdr-inner">
      <div class="hdr-label">Textbook Questions</div>
      <div class="hdr-name" id="hdrName">-</div>
      <div class="hdr-sub" id="hdrSub">교재 질문 체크</div>
    </div>
  </div>

  <div class="body">
    <!-- 교재 없을 때 -->
    <div id="noTbMsg" style="display:none">
      <div class="card">
        <div class="empty-msg">배정된 교재가 없습니다<br><br>선생님께 교재 배정을 요청하세요</div>
      </div>
    </div>

    <!-- 교재 선택 (여러 권 배정된 경우) -->
    <div id="tbSelectWrap">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="toggleTbList()">
          <div class="card-title">교재 선택</div>
          <span id="tbListToggleIcon" style="font-size:13px;color:#8B7FD9;font-weight:700">▲</span>
        </div>
        <div id="tbSelectList" style="margin-top:8px"></div>
      </div>
    </div>

    <!-- 기타 질문 (항상 표시) -->
    <div id="freeQCard">
      <div class="card" style="margin-top:0">
        <div class="card-title" style="margin-bottom:12px">기타 질문</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
          <input id="fqBook" type="text" placeholder="책 이름 (선택)" maxlength="40"
            style="padding:9px 12px;border:1.5px solid rgba(120,100,200,.2);border-radius:10px;font-size:13px;font-family:inherit;background:#F8F6FF;color:#3D3860;outline:none">
          <div style="display:flex;gap:8px;width:100%">
            <input id="fqPage" type="number" placeholder="페이지" min="1"
              style="width:0;flex:1;min-width:0;padding:9px 12px;border:1.5px solid rgba(120,100,200,.2);border-radius:10px;font-size:13px;font-family:inherit;background:#F8F6FF;color:#3D3860;outline:none">
            <input id="fqProb" type="text" placeholder="문제번호" maxlength="10"
              style="width:0;flex:1;min-width:0;padding:9px 12px;border:1.5px solid rgba(120,100,200,.2);border-radius:10px;font-size:13px;font-family:inherit;background:#F8F6FF;color:#3D3860;outline:none">
          </div>
          <!-- 이미지 업로드 -->
          <div style="display:flex;align-items:center;gap:8px">
            <label for="fqImg" style="display:flex;align-items:center;gap:6px;padding:9px 14px;border:1.5px dashed rgba(120,100,200,.3);border-radius:10px;font-size:13px;color:#8B7FD9;cursor:pointer;background:#F8F6FF;flex:1;justify-content:center"> 사진 첨부
            </label>
            <input id="fqImg" type="file" accept="image/*" capture="environment" style="display:none" onchange="onFqImgSelect(event)">
            <button id="fqImgClear" onclick="clearFqImg()" style="display:none;border:none;background:rgba(239,68,68,.1);color:#ef4444;border-radius:10px;padding:9px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">✕ 삭제</button>
          </div>
          <div id="fqImgPreview" style="display:none">
            <img id="fqImgThumb" style="width:100%;max-height:160px;object-fit:contain;border-radius:10px;background:#FBFAFF">
          </div>
        </div>
        <button onclick="submitFreeQ()" style="width:100%;padding:10px;background:linear-gradient(135deg,#A89BEB,#8B7FD9);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">등록</button>
        <div id="fqMyList" style="margin-top:12px"></div>
      </div>
    </div>

    <!-- 영상 바텀시트 -->
    <div class="yt-sheet" id="ytSheet" onclick="closeYtSheet(event)">
      <div class="yt-overlay"></div>
      <div class="yt-panel">
        <div class="yt-sheet-handle"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <div id="ytSheetTitle" style="font-size:15px;font-weight:700;color:#1E1B3A"></div>
          <button id="ytSheetToggleBtn" onclick="toggleProbFromSheet()" style="border:none;border-radius:99px;padding:5px 13px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s"></button>
        </div>
        <div id="ytSheetSub" style="font-size:12px;color:#6A6688;margin-bottom:8px"></div>
        <iframe id="ytSheetFrame" class="yt-embed" allowfullscreen></iframe>
      </div>
    </div>

    <!-- 기타질문 상세 바텀시트 -->
    <div class="yt-sheet" id="freeQDetailSheet" onclick="closeFreeQDetailSheet(event)">
      <div class="yt-overlay"></div>
      <div class="yt-panel">
        <div class="yt-sheet-handle"></div>
        <div id="fqDetailTitle" style="font-size:15px;font-weight:700;color:#1E1B3A;margin-bottom:4px"></div>
        <div id="fqDetailInfo" style="font-size:13px;color:#6A6688;margin-bottom:12px"></div>
        <div id="fqDetailImgWrap" style="display:none;margin-bottom:14px">
          <img id="fqDetailImg" style="width:100%;border-radius:12px;object-fit:contain;background:#FBFAFF">
        </div>
        <div id="fqDetailYt" style="display:none;margin-bottom:16px">
          <div style="font-size:12px;font-weight:600;color:#3D3860;margin-bottom:6px">▶ 풀이 영상</div>
          <iframe id="fqDetailFrame" class="yt-embed" allowfullscreen></iframe>
        </div>
        <button onclick="deleteFreeQFromSheet()" style="width:100%;padding:10px;border:none;border-radius:10px;background:rgba(239,68,68,.1);color:#ef4444;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer">삭제</button>
      </div>
    </div>

    <!-- 문제 목록 -->
    <div id="probSection" style="display:none">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
              <div class="card-title">문제 목록</div>
              <div style="display:flex;gap:6px">
                <button onclick="toggleProbBody()" id="probCollapseBtn" style="border:none;background:#FBFAFF;border-radius:8px;padding:4px 10px;font-size:11px;color:#8B7FD9;font-weight:700;cursor:pointer;font-family:inherit">접기</button>
              </div>
            </div>
            <div id="tbNameDisplay" style="font-size:14px;font-weight:600;color:var(--fg)"></div>
          </div>
          <div id="qCntBadge" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;
            font-weight:700;color:var(--p1);background:rgba(157,145,238,.12);padding:4px 10px;
            border-radius:20px">0개 질문</div>
        </div>
        <div id="probBody">

        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:rgba(239,68,68,.15);border:1.5px solid #ef4444"></div> 내 질문
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:rgba(86,160,138,.15);border:1.5px solid #56A08A"></div> 영상 있음 (클릭→시청)
          </div>
        </div>
        <div id="probGrid"></div>
      </div>


      <!-- 유튜브 영상 -->
      <div class="yt-panel" id="ytPanel" style="display:none">
        <div class="yt-title">▶ 풀이 영상</div>
        <div id="ytList"></div>
      </div>
      </div><!-- /probBody -->
    </div>
  </div>
</div>

<script>
var db=null;
var currentStuId=null;
var currentStuName=null;
var assignedTbIds=[];
var activeTbId=null;
var tbData={};
var myQuestions={};
var _freeQDetailId=null;
var _freeQDetailData={};

function getDB(){
  try{
    if(typeof firebase==='undefined') return null;
    if(firebase.apps&&firebase.apps.length>0) return firebase.database();
    if(typeof SM_CONFIG==='undefined'||!SM_CONFIG.apiKey||SM_CONFIG.apiKey.includes('여기에')) return null;
    firebase.initializeApp(SM_CONFIG);
    return firebase.database();
  }catch(e){return null;}
}

async function doLogin(){
  const pw=document.getElementById('pwInp').value;
  if(!pw){document.getElementById('errLogin').textContent='비밀번호를 입력하세요';return;}
  db=getDB();
  if(!db){document.getElementById('errLogin').textContent='서버 연결 실패';return;}
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  const hash=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  db.ref('smStudents').once('value',function(s){
    const all=s.val()||{};
    const entry=Object.entries(all).find(([,v])=>v.studentPwHash===hash);
    if(!entry){
      document.getElementById('errLogin').textContent='비밀번호가 올바르지 않습니다';
      return;
    }
    currentStuId=entry[0];
    currentStuName=entry[1].name;
    loadApp();
  });
}

function doLogout(){
  currentStuId=null; currentStuName=null; activeTbId=null;
  assignedTbIds=[]; tbData={}; myQuestions={};
  document.getElementById('app').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('pwInp').value='';
  document.getElementById('errLogin').textContent='';
}

function loadApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('hdrName').textContent=currentStuName;

  // 배정 교재 로드 (단일 문자열 또는 배열 모두 처리)
  db.ref('smTbAssign/'+currentStuId).once('value',function(s){
    const val=s.val();
    if(!val){showNoTb();return;}
    if(Array.isArray(val)) assignedTbIds=val.filter(Boolean);
    else if(typeof val==='string') assignedTbIds=[val];
    else assignedTbIds=Object.values(val).filter(Boolean);
    if(!assignedTbIds.length){showNoTb();return;}
    loadTextbooks();
  });
}

function showNoTb(){
  document.getElementById('noTbMsg').style.display='block';
  document.getElementById('probSection').style.display='none';
  loadFreeQList();
}

function loadTextbooks(){
  var loaded=0;
  tbData={};
  assignedTbIds.forEach(function(tbId){
    db.ref('smTextbooks/'+tbId).once('value',function(s){
      if(s.val()) tbData[tbId]=s.val();
      loaded++;
      if(loaded===assignedTbIds.length) onTbLoaded();
    });
  });
}

function onTbLoaded(){
  var ids=Object.keys(tbData);
  if(!ids.length){showNoTb();return;}
  loadFreeQList();
  var html='';
  ids.forEach(function(tbId){
    var tb=tbData[tbId];
    var cnt=Object.keys(tb.problems||{}).length;
    html+='<div class="tb-item" onclick="selectTb(\''+tbId+'\')">'+
      '<div><div class="tb-name">'+tb.title+'</div></div>'+
      '<div class="tb-cnt">'+cnt+'문제</div></div>';
  });
  document.getElementById('tbSelectList').innerHTML=html;
}



function toggleTbList(){
  var list=document.getElementById('tbSelectList');
  var icon=document.getElementById('tbListToggleIcon');
  if(!list) return;
  if(list.style.display==='none'){
    list.style.display='';
    icon.textContent='▲';
  }else{
    list.style.display='none';
    icon.textContent='▼';
  }
}
function toggleProbBody(){
  var body=document.getElementById('probBody');
  var btn=document.getElementById('probCollapseBtn');
  if(!body) return;
  if(body.style.display==='none'){
    body.style.display='';
    btn.textContent='접기';
  }else{
    body.style.display='none';
    btn.textContent='펼치기';
  }
}
function selectTb(tbId){
  activeTbId=tbId;
  document.getElementById('noTbMsg').style.display='none';
  document.getElementById('probSection').style.display='block';
  loadFreeQList();

  var tb=tbData[tbId];
  document.getElementById('tbNameDisplay').textContent=tb.title;
  db.ref('smTbQuestions/'+tbId+'/'+currentStuId).once('value',function(s){
    var mine=s.val()||{};
    myQuestions={};
    Object.keys(mine).forEach(function(probNum){ myQuestions[probNum]=true; });
    renderGrid(tb);
  });
}

function renderGrid(tb){
  var problems=tb.problems||{};
  var nums=Object.keys(problems);
  // ord 필드가 있으면(신규 JSON 등록 교재) 작성 순서대로 정렬. 없으면 기존 순서 유지(하위 호환)
  nums.sort(function(a,b){
    var oa=(problems[a]||{}).ord, ob=(problems[b]||{}).ord;
    if(oa!=null&&ob!=null) return oa-ob;
    return 0;
  });
  activeTbNums=nums;
  var html='';

  // JSON 등록 교재 판별: section 필드가 있으면 섹션 모드
  var hasSection=nums.some(function(n){return !!(problems[n]&&problems[n].section);});

  if(hasSection){
    // 섹션별로 그루핑
    var groups={};
    var groupOrder=[];
    nums.forEach(function(n){
      var p=problems[n]||{};
      var sec=p.section||'기타';
      var kind=p.kind||'';
      var label=sec+(kind?(' · '+kind):'');
      if(!groups[label]){groups[label]=[];groupOrder.push(label);}
      groups[label].push(n);
    });
    groupOrder.forEach(function(label){
      var grpNums=groups[label];
      html+='<div class="sec-header" style="font-size:11px">'+label+'</div>';
      html+='<div class="prob-grid">';
      grpNums.forEach(function(n){
        var p=problems[n]||{};
        html+=buildCell(n,p,p.num||n);
      });
      html+='</div>';
    });
  }else{
    // 기존 방식 (숫자 번호)
    nums.sort(function(a,b){
      var na=parseFloat(a),nb=parseFloat(b);
      if(!isNaN(na)&&!isNaN(nb)) return na-nb;
      return a.localeCompare(b,'ko');
    });
    var SECTION=50;
    var numNums=nums.filter(function(n){return !isNaN(parseFloat(n));});
    var strNums=nums.filter(function(n){return isNaN(parseFloat(n));});
    if(nums.length>SECTION){
      var min=parseFloat(numNums[0])||1;
      var max=parseFloat(numNums[numNums.length-1])||1;
      for(var s=Math.floor((min-1)/SECTION)*SECTION+1;s<=max;s+=SECTION){
        var e=s+SECTION-1;
        var secNums=numNums.filter(function(n){var v=parseFloat(n);return v>=s&&v<=e;});
        if(!secNums.length) continue;
        html+='<div class="sec-header">'+s+'~'+Math.min(e,max)+'번</div>';
        html+='<div class="prob-grid">';
        secNums.forEach(function(num){html+=buildCell(num,problems[num]||{});});
        html+='</div>';
      }
      if(strNums.length){
        html+='<div class="sec-header">기타</div><div class="prob-grid">';
        strNums.forEach(function(num){html+=buildCell(num,problems[num]||{});});
        html+='</div>';
      }
    }else{
      html='<div class="prob-grid">';
      nums.forEach(function(num){html+=buildCell(num,problems[num]||{});});
      html+='</div>';
    }
  }
  document.getElementById('probGrid').innerHTML=html||'<div class="empty-msg">문제가 없습니다</div>';
  updateQCnt();
}

function buildCell(num,p,displayNum){
  if(displayNum===undefined) displayNum=num;
  var hasYt=!!(p&&p.youtubeUrl);
  var isChecked=!!myQuestions[num];
  var cls='prob-cell'+(isChecked?' checked':'')+(hasYt?' has-yt':'');
  // 영상 있으면 클릭=영상, 없으면 클릭=체크토글
  var action=hasYt?'openYtSheet(\''+num+'\')':'toggleProb(\''+num+'\')';
  return '<div class="'+cls+'" onclick="'+action+'" data-num="'+num+'">'+
    '<div class="prob-num">'+displayNum+'</div>'+
    '<div class="prob-yt-dot"></div>'+
    (isChecked&&hasYt?'<div style="position:absolute;top:3px;right:3px;font-size:8px;cursor:pointer" onclick="event.stopPropagation();toggleProb(\''+num+'\')" title="체크 해제">✕</div>':'')+
    '</div>';
}

function toggleProb(num){
  if(!activeTbId||!currentStuId) return;
  var isChecked=!!myQuestions[num];
  if(isChecked){
    myQuestions[num]=false;
    db.ref('smTbQuestions/'+activeTbId+'/'+currentStuId+'/'+num).remove();
  }else{
    myQuestions[num]=true;
    db.ref('smTbQuestions/'+activeTbId+'/'+currentStuId+'/'+num).set({
      checkedAt:Date.now()
    });
  }
  // 셀 재빌드
  var cell=document.querySelector('[data-num="'+num+'"]');
  if(cell&&activeTbId){
    var tb=tbData[activeTbId]||{};
    var _p=(tb.problems||{})[num]||{};
    var newCell=buildCell(num,_p,_p.num||num);
    var tmp=document.createElement('div');
    tmp.innerHTML=newCell;
    cell.parentNode.replaceChild(tmp.firstChild,cell);
  }
  updateQCnt();
}

var activeTbNums=[];

var ytSheetNum=null;
function openYtSheet(num){
  var tb=tbData[activeTbId]||{};
  var p=(tb.problems||{})[num]||{};
  if(!p.youtubeUrl) return;
  ytSheetNum=num;
  var url=p.youtubeUrl;
  var embedUrl=url.replace('watch?v=','embed/').replace('youtu.be/','www.youtube.com/embed/');
  if(embedUrl.includes('?')) embedUrl=embedUrl.split('?')[0];
  var _dispNum=((tb.problems||{})[num]||{}).num||num;
  document.getElementById('ytSheetTitle').textContent=(tb.title||'')+' · '+_dispNum+'번 문제';
  document.getElementById('ytSheetSub').textContent=p.title||'풀이 영상';
  document.getElementById('ytSheetFrame').src=embedUrl;
  document.getElementById('ytSheet').classList.add('open');
  updateYtSheetBtn();
}
function updateYtSheetBtn(){
  var btn=document.getElementById('ytSheetToggleBtn');
  if(!btn||ytSheetNum===null) return;
  var isChecked=!!myQuestions[ytSheetNum];
  btn.textContent=isChecked?'✕ 체크 해제':'✓ 체크하기';
  btn.style.background=isChecked?'rgba(239,68,68,.12)':'rgba(86,160,138,.15)';
  btn.style.color=isChecked?'#ef4444':'#56A08A';
}
function toggleProbFromSheet(){
  if(ytSheetNum===null) return;
  toggleProb(ytSheetNum);
  updateYtSheetBtn();
}
function closeYtSheet(e){
  if(e&&e.target===document.querySelector('.yt-overlay')||e===undefined){
    document.getElementById('ytSheet').classList.remove('open');
    document.getElementById('ytSheetFrame').src='';
    ytSheetNum=null;
  }
}


var _fqImgData=null;
function compressFqImage(file,cb){
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var MAX=1000,w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      var cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.7));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function onFqImgSelect(e){
  var file=e.target.files[0];
  if(!file) return;
  compressFqImage(file,function(data){
    _fqImgData=data;
    document.getElementById('fqImgThumb').src=data;
    document.getElementById('fqImgPreview').style.display='';
    document.getElementById('fqImgClear').style.display='';
  });
}
function clearFqImg(){
  _fqImgData=null;
  document.getElementById('fqImg').value='';
  document.getElementById('fqImgPreview').style.display='none';
  document.getElementById('fqImgClear').style.display='none';
}
function submitFreeQ(){
  if(!currentStuId) return;
  var book=(document.getElementById('fqBook').value||'').trim();
  var page=(document.getElementById('fqPage').value||'').trim();
  var prob=(document.getElementById('fqProb').value||'').trim();
  if(!book&&!page&&!prob&&!_fqImgData){alert('내용을 입력하거나 사진을 첨부해 주세요');return;}
  var ref=db.ref('smFreeQuestions/'+currentStuId).push();
  var data={bookName:book,page:page,probNum:prob,stuName:currentStuName,createdAt:Date.now(),hasImage:!!_fqImgData};
  ref.set(data).then(function(){
    if(_fqImgData) db.ref('smFreeQImages/'+currentStuId+'/'+ref.key).set(_fqImgData);
    document.getElementById('fqBook').value='';
    document.getElementById('fqPage').value='';
    document.getElementById('fqProb').value='';
    clearFqImg();
    loadFreeQList();
  });
}
function loadFreeQList(){
  if(!currentStuId) return;
  db.ref('smFreeQuestions/'+currentStuId).orderByChild('createdAt').once('value',function(s){
    _freeQDetailData={};
    var items=s.val()||{};
    var arr=Object.entries(items).sort(function(a,b){return b[1].createdAt-a[1].createdAt;});
    arr.forEach(function(e){_freeQDetailData[e[0]]=e[1];});
    var el=document.getElementById('fqMyList');
    if(!el) return;
    if(!arr.length){el.innerHTML='<div style="font-size:12px;color:#A8A4C0;text-align:center;padding:8px">등록된 질문이 없습니다</div>';return;}
    el.innerHTML=arr.map(function(entry){
      var id=entry[0],q=entry[1];
      var d=new Date(q.createdAt);
      var ds=(d.getMonth()+1)+'/'+(d.getDate())+' '+(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
      var hasImg=!!q.hasImage;
      return '<div onclick="openFreeQDetail(\''+id+'\')" style="cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#F8F6FF;border-radius:10px;margin-bottom:6px">'+
        '<div><div style="font-size:13px;font-weight:600;color:#3D3860">'+(q.bookName||'(사진 질문)')+(hasImg?' ':'')+' </div>'+
        '<div style="font-size:11px;color:#6A6688">'+(q.page?q.page+'p · ':'')+(q.probNum?q.probNum+'번 ':'')+' <span style="color:#B0AACF;margin-left:4px">'+ds+'</span></div></div>'+
        '<span style="color:#C4B9F0;font-size:13px;padding:4px">›</span>'+
      '</div>';
    }).join('');
  });
}
function openFreeQDetail(id){
  _freeQDetailId=id;
  var q=_freeQDetailData[id]||{};
  document.getElementById('fqDetailTitle').textContent=q.bookName||'';
  document.getElementById('fqDetailInfo').textContent=(q.page||'')+'p · '+(q.probNum||'')+'번';
  var ytWrap=document.getElementById('fqDetailYt');
  var ytFrame=document.getElementById('fqDetailFrame');
  if(q.youtubeUrl){
    var url=q.youtubeUrl;
    var embed=url.replace('watch?v=','embed/').replace('youtu.be/','www.youtube.com/embed/');
    if(embed.includes('?')) embed=embed.split('?')[0];
    ytFrame.src=embed;
    ytWrap.style.display='block';
  }else{
    ytFrame.src='';
    ytWrap.style.display='none';
  }
  document.getElementById('freeQDetailSheet').classList.add('open');
}
function closeFreeQDetailSheet(e){
  if(!e||e.target===document.querySelector('#freeQDetailSheet .yt-overlay')){
    document.getElementById('freeQDetailSheet').classList.remove('open');
    document.getElementById('fqDetailFrame').src='';
  }
}
function deleteFreeQFromSheet(){
  if(!_freeQDetailId) return;
  db.ref('smFreeQuestions/'+currentStuId+'/'+_freeQDetailId).remove().then(function(){
    document.getElementById('freeQDetailSheet').classList.remove('open');
    loadFreeQList();
  });
}
function updateQCnt(){
  var cnt=Object.values(myQuestions).filter(Boolean).length;
  document.getElementById('qCntBadge').textContent=cnt+'개 질문';
}

function renderYtPanel(tb){
  var problems=tb.problems||{};
  var ytItems=Object.entries(problems)
    .filter(function([,p]){return !!(p&&p.youtubeUrl)})
    .sort(function([a],[b]){
      var na=parseFloat(a), nb=parseFloat(b);
      if(!isNaN(na)&&!isNaN(nb)) return na-nb;
      return a.localeCompare(b);
    });

  if(!ytItems.length){
    document.getElementById('ytPanel').style.display='none';
    return;
  }
  document.getElementById('ytPanel').style.display='block';
  var html='';
  ytItems.forEach(function([num,p]){
    html+='<a class="yt-item" href="'+p.youtubeUrl+'" target="_blank" rel="noopener">'+
      '<div class="yt-play"></div>'+
      '<div class="yt-info">'+
        '<div class="yt-prob">'+num+'번 문제 풀이</div>'+
        '<div style="font-size:12px;color:var(--fg2);font-weight:300">'+(p.title||'풀이 영상')+'</div>'+
      '</div>'+
      '</a>';
  });
  document.getElementById('ytList').innerHTML=html;
}
</script>

<script>
(function(){
  var url=new URL(location.href);
  var urlVer=url.searchParams.get('_v');
  if(urlVer){localStorage.setItem('smv',urlVer);url.searchParams.delete('_v');history.replaceState(null,'',url.toString());}
  function getDB(){try{if(typeof firebase==='undefined')return null;if(firebase.apps&&firebase.apps.length>0)return firebase.database();if(typeof SM_CONFIG==='undefined'||!SM_CONFIG.apiKey||SM_CONFIG.apiKey.includes('여기에'))return null;firebase.initializeApp(SM_CONFIG);return firebase.database();}catch(e){return null;}}
  var _smvRef=null;
  function doCheck(){var db=getDB();if(!db||_smvRef)return;_smvRef=db.ref('smAppVersion');_smvRef.on('value',function(s){var sv=String(s.val()||'');if(!sv)return;var lv=localStorage.getItem('smv')||'';if(lv===sv)return;if(location.search.indexOf('_v='+sv)!==-1)return;location.replace(location.pathname+'?_v='+sv);});}
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',doCheck);}else{doCheck();}
  document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')doCheck();});
})();
</script>
