<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수업 현황 — 성민T</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gothic+A1:wght@300;400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
:root{--bl:#74B3D8;--bld:#5a9ec7}
#load{min-height:100vh;display:flex;align-items:center;justify-content:center}
.sp{width:38px;height:38px;border:3px solid #e2e8f0;border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{color:#64748b;font-size:14px;text-align:center}
/* Login */
#loginPage{min-height:100vh;display:none;align-items:center;justify-content:center;background:#e4e8f4;background-image:radial-gradient(circle at 20% 20%,rgba(55,100,191,.12) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(90,138,224,.1) 0%,transparent 50%)}
#loginPage::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,210,230,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,210,230,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.lbox{background:#e4e8f4;border-radius:24px;padding:44px 36px 36px;width:320px;box-shadow:8px 8px 20px rgba(145,165,210,.6),-6px -6px 16px rgba(255,255,255,.9);text-align:center;position:relative}
.lbox::before{display:none}
.lico{width:58px;height:58px;background:linear-gradient(135deg,#5a8ae0,#3764bf);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px;box-shadow:3px 3px 10px rgba(55,100,191,.4),-2px -2px 6px rgba(255,255,255,.6)}
.lbox h1{font-family:'Nanum Myeongjo',serif;font-size:24px;font-weight:800;color:#1a2840;margin-bottom:4px}
.lbox .lsub{font-family:'Space Mono',monospace;font-size:10px;color:#94a3b8;letter-spacing:2px;margin-bottom:28px;text-transform:uppercase}
.linp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;transition:.2s;background:#f8faff;letter-spacing:4px;margin-bottom:12px}
.linp:focus{box-shadow:inset 4px 4px 9px rgba(145,165,210,.6),inset -3px -3px 8px rgba(255,255,255,.9)}
.lbtn{width:100%;background:linear-gradient(135deg,#5a8ae0,#3764bf);color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:.2s;box-shadow:3px 3px 10px rgba(55,100,191,.35)}
.lbtn:hover{opacity:.9}.lbtn:disabled{background:#cbd5e1;cursor:not-allowed}
.lerr{color:#ef4444;font-size:12px;margin-top:8px;min-height:16px;font-family:'Space Mono',monospace}
.lback{display:block;margin-top:18px;font-size:12px;color:#94a3b8;text-decoration:none;font-family:'Space Mono',monospace;letter-spacing:1px}
.lback:hover{color:#64748b}
.err{text-align:center;padding:40px 20px}
.err .ei{font-size:52px;margin-bottom:16px}
.err h2{font-size:19px;font-weight:700;margin-bottom:8px}
.err p{font-size:13px;color:#64748b;line-height:1.7}
#wrap{display:none;max-width:640px;margin:0 auto;padding:0 14px 60px}
.hdr{background:linear-gradient(135deg,#1a2840,#2a3f6f,#3764bf);padding:36px 24px 68px;margin:0 -14px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;width:260px;height:260px;background:radial-gradient(circle,rgba(116,179,216,.2),transparent 70%);top:-60px;right:-40px;pointer-events:none}
.hdr-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:99px;padding:5px 14px;font-size:11px;color:rgba(255,255,255,.85);font-weight:500;letter-spacing:.04em;margin-bottom:16px}
.hdr-name{font-size:28px;font-weight:700;color:#fff;margin-bottom:8px}
.hdr-tags{display:flex;gap:8px;flex-wrap:wrap}
.htag{background:rgba(255,255,255,.14);color:rgba(255,255,255,.88);border-radius:6px;padding:4px 11px;font-size:12px;font-weight:500}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:-28px;margin-bottom:20px;position:relative;z-index:1}
.sc{background:#fff;border-radius:12px;padding:14px 10px;box-shadow:0 4px 16px rgba(0,0,0,.08);text-align:center}
.sn{font-size:22px;font-weight:700;color:#3764bf;line-height:1}
.sl{font-size:11px;color:#64748b;margin-top:4px;font-weight:500}
.card{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.card-head{padding:14px 18px 10px;border-bottom:1px solid #f1f5f9;font-size:14px;font-weight:700}
/* Calendar */
.cal-wrap{padding:12px 14px 16px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month{font-size:14px;font-weight:700}
.cal-nav-btn{background:#f1f5f9;border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:#475569;transition:.15s}
.cal-nav-btn:hover{background:#e2e8f0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:10px;font-weight:600;color:#94a3b8;padding:3px 0}
.cal-dow:first-child{color:#ef4444}.cal-dow:last-child{color:#3b82f6}
.cal-day{min-height:80px;border-radius:8px;padding:4px 5px 3px;transition:.12s;border:1.5px solid transparent;display:flex;flex-direction:column;background:#fafbfc}
.cal-day.today{border-color:var(--bl);background:#eff8ff}
.cal-day.other-month{background:transparent}
.cal-day.clickable{cursor:pointer}
.cal-day.clickable:hover{filter:brightness(.96)}
.cal-day-num{font-size:11px;font-weight:600;line-height:1;align-self:flex-start;color:#374151}
.cal-day.today .cal-day-num{color:var(--bld)}
.cal-day.other-month .cal-day-num{color:#dde3ed}
.sun .cal-day-num{color:#ef4444 !important}
.sat .cal-day-num{color:#3b82f6 !important}
.cal-day.other-month .cal-day-num{color:#dde3ed !important}
.cal-cell-body{flex:1;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;gap:2px;margin-top:3px}
.cal-stars{font-size:10px;line-height:1;letter-spacing:-1px;flex-shrink:0}
.cal-prog{font-size:9px;color:#475569;text-align:center;width:100%;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;white-space:normal;word-break:keep-all;word-wrap:break-word}

/* 날짜 클릭 팝업 */
.detail-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.detail-ov.open{display:flex}
.detail-modal{background:#fff;border-radius:18px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.dm-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;border-bottom:1px solid #f1f5f9}
.dm-date{font-size:15px;font-weight:700;color:#1e293b}
.dm-close{background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1;padding:0}
.dm-body{padding:16px 20px 20px}
.dm-grid{display:grid;grid-template-columns:80px 1fr;gap:7px 12px;font-size:13px}
.dm-k{color:#94a3b8;font-weight:500;padding-top:1px}
.dm-v{color:#334155;line-height:1.6}
.dm-stars{font-size:15px;letter-spacing:-1px}
.dm-comment{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 13px;margin-top:10px;font-size:13px;color:#0369a1;line-height:1.6}
.dm-special{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 13px;margin-top:8px;font-size:13px;color:#9a3412;line-height:1.6}
.dm-note{background:#fffbea;border:1px solid #fde68a;border-radius:8px;padding:10px 13px;margin-top:8px;font-size:13px;color:#854d0e;line-height:1.6}
.dm-absent{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:8px 13px;margin-bottom:10px;font-size:13px;color:#b91c1c;font-weight:600}
.s5{color:#f59e0b}.s4{color:#84cc16}.s3{color:#60a5fa}.s2{color:#fb923c}.s1{color:#f87171}.s0{color:#cbd5e1}
/* Record detail */
.rec-detail{display:none;margin:0 14px 14px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0}
.rec-detail.open{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.rd-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.rd-date{font-size:14px;font-weight:700}
.rd-close{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px;padding:0}
.rd-body{padding:0 14px 14px}
.rd-grid{display:grid;grid-template-columns:72px 1fr;gap:5px 10px;font-size:13px}
.rd-k{color:#94a3b8;font-weight:500;padding-top:1px}
.rd-v{color:#334155;line-height:1.6}
.rd-stars{font-size:14px;letter-spacing:-1px}
.note-box{background:#fffbea;border:1px solid #fde68a;border-radius:8px;padding:9px 12px;margin-top:10px;font-size:12px;color:#854d0e;line-height:1.6}
.comment-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;color:#0369a1;line-height:1.6}
.special-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;color:#9a3412;line-height:1.6}
/* Consult */
.csec{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:20px;margin-bottom:16px}
.csec h2{font-size:14px;font-weight:700;margin-bottom:5px}
.csec p{font-size:12px;color:#64748b;margin-bottom:14px;line-height:1.7}
.inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;outline:none;transition:.2s}
.inp:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(116,179,216,.14)}
textarea.inp{resize:vertical;min-height:90px}
.sbtn{background:var(--bl);color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-top:10px;transition:.2s}
.sbtn:hover{background:var(--bld)}
.sbtn:disabled{background:#cbd5e1;cursor:not-allowed}
.succ{background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:11px;font-size:13px;color:#15803d;text-align:center;display:none;margin-top:8px}
.cerr{color:#ef4444;font-size:12px;margin-top:5px;min-height:16px}
.sent-hd{font-size:12px;color:#94a3b8;margin:14px 0 6px}
.sent-i{background:#f8fafc;border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:#475569;border:1px solid #e2e8f0;line-height:1.6}
.sent-t{font-size:11px;color:#94a3b8;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.sent-body{white-space:pre-wrap;margin-bottom:8px}
.sent-reply{background:#f0fdf4;border-left:3px solid #86efac;border-radius:0 8px 8px 0;padding:9px 12px;margin-top:8px;font-size:12px;color:#166534;line-height:1.6;white-space:pre-wrap}
.sent-reply-head{font-size:11px;font-weight:600;color:#15803d;margin-bottom:4px}
.sent-no-reply{font-size:11px;color:#94a3b8;margin-top:6px;font-style:italic}
.btn-del-sent{background:none;border:none;color:#f87171;font-size:11px;cursor:pointer;font-family:inherit;padding:0;transition:.15s}
.btn-del-sent:hover{color:#ef4444}
footer{text-align:center;padding:24px 0 12px;color:#cbd5e1;font-size:12px}
/* Planner calendar in view */
.plan-cal-wrap{padding:12px 14px 16px}
.plan-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.plan-cal-month{font-size:13px;font-weight:700}
.plan-cal-btn{background:#f1f5f9;border:none;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:#475569}
.plan-cal-btn:hover{background:#e2e8f0}
.plan-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.plan-cal-dow{text-align:center;font-size:10px;font-weight:600;color:#94a3b8;padding:2px 0}
.plan-cal-dow:first-child{color:#ef4444}.plan-cal-dow:last-child{color:#3b82f6}
.plan-cal-day{min-height:44px;border-radius:8px;padding:3px 4px;display:flex;flex-direction:column;cursor:default;border:1.5px solid transparent;background:#fafbfc;transition:.12s}
.plan-cal-day.has-plan{cursor:pointer}.plan-cal-day.has-plan:hover{background:#faf5ff;border-color:#e9d5ff}
.plan-cal-day.today{border-color:var(--bl)}
.plan-cal-day.other-month{background:transparent}
.plan-cal-day-num{font-size:11px;font-weight:600;color:#374151}
.plan-cal-day.today .plan-cal-day-num{color:var(--bld)}
.plan-cal-day.other-month .plan-cal-day-num{color:#dde3ed !important}
.vplan-detail-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:14px}
.vplan-detail-ov.open{display:flex}
.vpdm{background:#fff;border-radius:18px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.vpdm-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;border-bottom:1px solid #f1f5f9}
.vpdm-date{font-size:14px;font-weight:700}
.vpdm-close{background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8}
.vpdm-body{padding:14px 18px 20px}
.vpdm-item{background:#f8fafc;border-radius:12px;margin-bottom:10px;overflow:hidden;border:1px solid #e2e8f0}
.vpdm-head2{padding:8px 12px;background:#f1f5f9;display:flex;align-items:center;justify-content:space-between}
.vpdm-img{width:100%;max-height:260px;object-fit:cover;cursor:pointer}
.vpdm-comment{padding:10px 12px;font-size:13px;color:#166534;background:#f0fdf4;line-height:1.6;white-space:pre-wrap}
.vpdm-comment-head{font-size:10px;font-weight:700;color:#15803d;margin-bottom:3px}
.vpdm-no-comment{padding:8px 12px;font-size:12px;color:#94a3b8;font-style:italic}
.plan-dot-row{display:flex;gap:2px;margin-top:2px}
.plan-dot{width:7px;height:7px;border-radius:50%}
.plan-dot-blue{background:#60a5fa}.plan-dot-green{background:#34d399}
/* Planner */
.plan-sec{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px;overflow:hidden}
.plan-sec-head{padding:14px 18px 10px;border-bottom:1px solid #f1f5f9;font-size:14px;font-weight:700}
.plan-item{padding:14px 18px;border-bottom:1px solid #f8fafc}
.plan-item:last-child{border-bottom:none}
.plan-date-row{font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.plan-img{width:100%;max-height:280px;object-fit:cover;border-radius:8px;cursor:pointer;margin-bottom:8px}
.plan-comment{background:#f0fdf4;border-left:3px solid #86efac;border-radius:0 8px 8px 0;padding:10px 12px;font-size:13px;color:#166534;line-height:1.6;white-space:pre-wrap}
.plan-comment-head{font-size:11px;font-weight:700;color:#15803d;margin-bottom:4px}
.plan-no-comment{font-size:12px;color:#94a3b8;font-style:italic;margin-top:4px}
.lightbox-v{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.lightbox-v.open{display:flex}
.lightbox-v img{max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain}
.lbv-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer}
</style>
</head>
<body>
<div id="loginPage">
  <div class="lbox">
    <div class="lico">📋</div>
    <h1>학부모 페이지</h1>
    <p class="lsub">For Parents</p>
    <input class="linp" type="password" id="pwIn" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doParentLogin()">
    <button class="lbtn" id="loginBtn" onclick="doParentLogin()">확인 →</button>
    <div class="lerr" id="lerr"></div>
    <a class="lback" href="./main.html">← 홈으로</a>
  </div>
</div>
<div id="load"><div><div class="sp"></div><p class="ld-txt">불러오는 중...</p></div></div>
<div id="wrap">
  <div class="hdr">
    <div class="hdr-badge">📚 수업 현황</div>
    <div class="hdr-name" id="hName"></div>
    <div class="hdr-tags"><span class="htag" id="hGrade"></span><span class="htag" id="hSubj"></span></div>
  </div>
  <div>
    <div class="stats">
      <div class="sc"><div class="sn" id="sTot">0</div><div class="sl">총 수업 횟수</div></div>
      <div class="sc"><div class="sn" id="sAvg">-</div><div class="sl">평균 등급</div></div>
      <div class="sc"><div class="sn" id="sLast">-</div><div class="sl">최근 등급</div></div>
    </div>
    <div class="card">
      <div class="card-head">📅 수업 달력</div>
      <div class="cal-wrap">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
          <span class="cal-month" id="calMonth"></span>
          <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid">
          <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
          <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
        </div>
      </div>
    </div>
    <!-- Planner calendar -->
    <div class="card">
      <div class="card-head">📸 플래너 제출 달력</div>
      <div class="plan-cal-wrap">
        <div class="plan-cal-nav">
          <button class="plan-cal-btn" onclick="changeVPlanMonth(-1)">‹</button>
          <span class="plan-cal-month" id="vPlanCalMonth"></span>
          <button class="plan-cal-btn" onclick="changeVPlanMonth(1)">›</button>
        </div>
        <div class="plan-cal-grid" id="vPlanCalGrid">
          <div class="plan-cal-dow">일</div><div class="plan-cal-dow">월</div><div class="plan-cal-dow">화</div>
          <div class="plan-cal-dow">수</div><div class="plan-cal-dow">목</div><div class="plan-cal-dow">금</div><div class="plan-cal-dow">토</div>
        </div>
      </div>
    </div>
    <!-- Planner detail modal -->
    <div class="vplan-detail-ov" id="vPlanDetailOv" onclick="if(event.target===this)closeVPlanDetail()">
      <div class="vpdm">
        <div class="vpdm-head"><span class="vpdm-date" id="vpdmDate"></span><button class="vpdm-close" onclick="closeVPlanDetail()">✕</button></div>
        <div class="vpdm-body" id="vpdmBody"></div>
      </div>
    </div>
    <div class="csec">
      <h2>💬 상담 요청</h2>
      <p>선생님께 궁금한 점이나 전달하실 내용을 남겨주세요.<br>확인 후 연락드리겠습니다.</p>
      <input class="inp" id="cName" type="text" placeholder="보내는 분 (예: 홍길동 어머니)" style="margin-bottom:10px">
      <textarea class="inp" id="cContent" placeholder="내용을 입력해주세요"></textarea>
      <div class="cerr" id="cerr"></div>
      <button class="sbtn" id="cBtn" onclick="submitC()">상담 요청 보내기</button>
      <div class="succ" id="cSucc">✅ 요청이 전송되었습니다. 곧 연락드리겠습니다.</div>
      <div id="sentList"></div>
    </div>
    <footer>이 페이지는 학부모 확인용입니다</footer>
  </div>
</div>
<div class="lightbox-v" id="lbV" onclick="if(event.target===this)closeLbV()"><button class="lbv-close" onclick="closeLbV()">✕</button><img id="lbVImg" style="max-width:100%;max-height:90vh;border-radius:10px;object-fit:contain"></div>

<!-- 날짜 클릭 팝업 -->
<div class="detail-ov" id="detailOv" onclick="if(event.target===this)closeDetail()">
  <div class="detail-modal">
    <div class="dm-head">
      <span class="dm-date" id="dmDate"></span>
      <button class="dm-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="dm-body" id="dmBody"></div>
  </div>
</div>
<script>
let db,sid_=null,recData={},sent=[],consultData={},calYear,calMonth,openDetailDate=null;

window.addEventListener('DOMContentLoaded',()=>{
  const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
  if(typeof SM_CONFIG==='undefined'||!SM_CONFIG.apiKey||SM_CONFIG.apiKey.includes('여기에')){
    document.getElementById('load').innerHTML='<div class="err"><div class="ei">⚙️</div><h2>설정 오류</h2><p>config.js 파일에 Firebase 설정이 필요합니다</p></div>';return;
  }
  try{if(!firebase.apps.length)firebase.initializeApp(SM_CONFIG);db=firebase.database();}
  catch(e){showErr('Firebase 오류',''+e.message);return;}
  loadPage();
});

async function doParentLogin(){
  const pw=document.getElementById('pwIn').value;
  const err=document.getElementById('lerr');
  const btn=document.getElementById('loginBtn');
  if(!pw){err.textContent='비밀번호를 입력하세요';return;}
  err.textContent='';btn.disabled=true;btn.textContent='확인 중...';
  try{
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
    const hash=[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    const snap=await db.ref('smStudents').get();
    const all=snap.val()||{};
    const match=Object.values(all).find(s=>s.parentPwHash===hash);
    if(match){
      // Hide login, show loading, load data
      document.getElementById('loginPage').style.display='none';
      document.getElementById('load').style.display='flex';
      const matchEntry=Object.entries(snap.val()||{}).find(([,s])=>s.parentPwHash===hash);loadStudentData(matchEntry[0],matchEntry[1]);
    }else{
      err.textContent='비밀번호가 올바르지 않습니다';
      document.getElementById('pwIn').value='';
      document.getElementById('pwIn').focus();
    }
  }catch(e){err.textContent='오류: '+e.message;}
  btn.disabled=false;btn.textContent='확인 →';
}

async function loadPage(){
  const token=new URLSearchParams(location.search).get('token');
  if(!token){
    // No token → show login page
    document.getElementById('load').style.display='none';
    document.getElementById('loginPage').style.display='flex';
    return;
  }
  try{
    // ✅ client-side 필터링 (인덱스 불필요)
    const snap=await db.ref('smStudents').get();
    const all=snap.val()||{};
    const entry=Object.entries(all).find(([,s])=>s.token===token);
    if(!entry){showErr('학생을 찾을 수 없습니다','링크가 만료되었거나 잘못된 링크입니다.');return;}
    loadStudentData(entry[0], entry[1]);
  }catch(e){showErr('오류 발생',''+e.message);}
}

function loadStudentData(stuId, stu){
  sid_=stuId;
  document.title=stu.name+' — 수업 현황';
  document.getElementById('hName').textContent=stu.name||'';
  document.getElementById('hGrade').textContent=stu.grade||'';
  document.getElementById('hSubj').textContent=stu.subj||'';
  document.getElementById('load').style.display='none';
  document.getElementById('wrap').style.display='block';
  db.ref('smSessions/'+sid_).on('value',function(s){
    try{
      recData=s.val()||{};
      renderStats();
      renderCal();
      // 팝업이 열려있으면 내용도 갱신
      if(openDetailDate){
        var updRec=Object.values(recData).find(function(r){return r.date===openDetailDate;});
        if(updRec) showDetail(openDetailDate,updRec);
      }
    }catch(e){console.error('session render error:',e);}
  });
  db.ref('smPlanners/'+sid_).on('value',function(s){try{renderViewPlanners(s.val()||{});}catch(e){console.error('planner render error:',e);}});
  const stored=localStorage.getItem('smSent_'+sid_);
  if(stored)try{sent=JSON.parse(stored);}catch(e){}
  db.ref('smConsultations/'+sid_).on('value',function(s){try{consultData=s.val()||{};renderSent();}catch(e){console.error('consult render error:',e);}});
}
function showErr(title,msg){document.getElementById('load').innerHTML=`<div class="err"><div class="ei">😔</div><h2>${title}</h2><p>${msg}</p></div>`;}

function starsHtml(n,absent){
  if(absent) return`<span style="color:#ef4444;font-weight:700;font-size:13px">✕</span>`;
  if(n==null||n<0) return'';
  if(n===0) return`<span style="color:#ef4444;font-weight:700;font-size:11px">✕</span>`;
  return`<span class="s${n}">${'★'.repeat(n)}</span>`;
}
function starsLabel(n,absent){
  if(absent) return'결석';
  if(n==null||n<0) return'-';
  const l={5:'A',4:'B',3:'C',2:'D',1:'E',0:'F(안함)'};
  return l[n]!==undefined?l[n]:'-';
}

function renderStats(){
  // 현재 보고 있는 달의 기록만 필터
  const monthStr=calYear+'-'+String(calMonth+1).padStart(2,'0');
  const monthRecs=Object.values(recData).filter(r=>r.date&&r.date.startsWith(monthStr));
  // 총 수업 횟수: 해당 월 기록 중 가장 큰 회차
  const maxNum=monthRecs.length?Math.max(...monthRecs.map(r=>r.num||0)):0;
  document.getElementById('sTot').textContent=maxNum||'-';
  // 평균/최근 등급: 해당 월 중 eval 있는 것
  const arr=monthRecs.filter(r=>r.eval!=null&&r.eval>=0);
  if(arr.length){
    const valid=arr.filter(r=>r.eval>0);
    const avg=valid.length?Math.round(valid.reduce((a,r)=>a+(r.eval||0),0)/valid.length*10)/10:'-';
    document.getElementById('sAvg').textContent=(avg==='-')?'-':avg+'★';
    const sorted=arr.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const ev=sorted[0].eval!=null&&sorted[0].eval>=0?sorted[0].eval:null;
    document.getElementById('sLast').textContent=starsLabel(ev);
  }else{
    document.getElementById('sAvg').textContent='-';
    document.getElementById('sLast').textContent='-';
  }
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  closeDetail();renderCal();renderStats();
}

function renderCal(){
  const recMap={};
  Object.values(recData).forEach(r=>{if(r.date)recMap[r.date]=r;});
  const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonth').textContent=`${calYear}년 ${mn[calMonth]}`;
  const todayStr=new Date().toISOString().split('T')[0];
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const grid=document.getElementById('calGrid');
  grid.innerHTML=`
    <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
    <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
  `;
  for(let i=firstDay-1;i>=0;i--){
    const cell=document.createElement('div');
    cell.className='cal-day other-month';
    cell.innerHTML=`<span class="cal-day-num">${daysInPrev-i}</span>`;
    grid.appendChild(cell);
  }
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec=recMap[ds];
    const dow=(firstDay+d-1)%7;
    const cell=document.createElement('div');
    cell.className='cal-day'+(ds===todayStr?' today':'')+(rec?' clickable':'');
    if(dow===0)cell.classList.add('sun');
    if(dow===6)cell.classList.add('sat');
    if(rec){
      const ev=rec.eval!=null&&rec.eval>=0?rec.eval:null;
      const bg=rec.absent?'#fee2e2':ev===5?'#fefce8':ev===4?'#f0fdf4':ev===3?'#eff8ff':ev===2?'#fff7ed':ev===1||ev===0?'#fff5f5':'#fafbfc';
      cell.style.background=bg;
      const pp=rec.prog||'';
      cell.innerHTML=`<span class="cal-day-num">${d}</span><div class="cal-cell-body"><div class="cal-stars">${starsHtml(ev,rec.absent)}</div>${pp&&!rec.absent?`<div class="cal-prog">${pp}</div>`:''}</div>`;
      cell.addEventListener('click',(function(d){return function(){const r=Object.values(recData).find(function(x){return x.date===d;});if(r)showDetail(d,r);};})(ds));
    }else{
      cell.innerHTML=`<span class="cal-day-num">${d}</span>`;
    }
    grid.appendChild(cell);
  }
  const total=firstDay+daysInMonth;
  const rem=(7-total%7)%7;
  for(let d=1;d<=rem;d++){
    const cell=document.createElement('div');
    cell.className='cal-day other-month';
    cell.innerHTML=`<span class="cal-day-num">${d}</span>`;
    grid.appendChild(cell);
  }
}

function showDetail(ds,rec){
  const[y,m,d]=ds.split('-');
  const ev=rec.eval!=null&&rec.eval>=0?rec.eval:null;
  const absent=!!rec.absent;
  document.getElementById('dmDate').textContent=`${y}년 ${+m}월 ${+d}일 (${rec.num||'-'}회차)`;
  const evHtml=absent
    ?'<span style="color:#ef4444;font-weight:700;font-size:15px">✕</span> <span style="font-size:13px;font-weight:700;color:#b91c1c">결석</span>'
    :`<span class="dm-stars s${ev}">${ev>0?'★'.repeat(ev):'✕'}</span> <span style="font-size:13px;font-weight:700;color:#374151"> ${starsLabel(ev,absent)}</span>`;
  document.getElementById('dmBody').innerHTML=`
    ${absent?'<div class="dm-absent">🚫 결석 처리된 날입니다</div>':''}
    <div class="dm-grid">
      <span class="dm-k">숙제완성도</span><span class="dm-v">${evHtml}</span>
      <span class="dm-k">진도</span><span class="dm-v">${rec.prog||'<span style="color:#cbd5e1;font-size:12px">없음</span>'}</span>
      <span class="dm-k">지난 숙제</span><span class="dm-v">${rec.prevHw||'<span style="color:#cbd5e1;font-size:12px">없음</span>'}</span>
      <span class="dm-k">오늘 숙제</span><span class="dm-v">${rec.hwC||'<span style="color:#cbd5e1;font-size:12px">없음</span>'}</span>
      <span class="dm-k">클리닉</span><span class="dm-v">${rec.cli?rec.cli.replace(/\n/g,'<br>'):'<span style="color:#cbd5e1;font-size:12px">없음</span>'}</span>
    </div>
    ${rec.comment?`<div class="dm-comment">📝 숙제 코멘트: ${rec.comment.replace(/\n/g,'<br>')}</div>`:''}
    ${rec.special?`<div class="dm-special">⚠️ 특이사항: ${rec.special.replace(/\n/g,'<br>')}</div>`:''}
    ${rec.note?`<div class="dm-note">📌 ${rec.note.replace(/\n/g,'<br>')}</div>`:''}`;
  openDetailDate=ds;
  document.getElementById('detailOv').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDetail(){
  openDetailDate=null;
  document.getElementById('detailOv').classList.remove('open');
  document.body.style.overflow='';
}

var _vPlanYear, _vPlanMonth, _vPlannerData={};
function renderViewPlanners(data){
  _vPlannerData=data;
  if(!_vPlanYear){var now=new Date();_vPlanYear=now.getFullYear();_vPlanMonth=now.getMonth();}
  renderVPlanCal();
}
function changeVPlanMonth(dir){
  _vPlanMonth+=dir;
  if(_vPlanMonth>11){_vPlanMonth=0;_vPlanYear++;}
  if(_vPlanMonth<0){_vPlanMonth=11;_vPlanYear--;}
  renderVPlanCal();
}
function renderVPlanCal(){
  var mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('vPlanCalMonth').textContent=_vPlanYear+'년 '+mn[_vPlanMonth];
  var todayStr=new Date().toISOString().split('T')[0];
  var firstDay=new Date(_vPlanYear,_vPlanMonth,1).getDay();
  var daysInMonth=new Date(_vPlanYear,_vPlanMonth+1,0).getDate();
  var daysInPrev=new Date(_vPlanYear,_vPlanMonth,0).getDate();
  var dateMap={};
  Object.values(_vPlannerData).forEach(function(p){if(!p.date)return;if(!dateMap[p.date])dateMap[p.date]=[];dateMap[p.date].push(p);});
  var grid=document.getElementById('vPlanCalGrid');
  grid.innerHTML='<div class="plan-cal-dow">일</div><div class="plan-cal-dow">월</div><div class="plan-cal-dow">화</div><div class="plan-cal-dow">수</div><div class="plan-cal-dow">목</div><div class="plan-cal-dow">금</div><div class="plan-cal-dow">토</div>';
  for(var i=firstDay-1;i>=0;i--){var cell=document.createElement('div');cell.className='plan-cal-day other-month';cell.innerHTML='<span class="plan-cal-day-num">'+(daysInPrev-i)+'</span>';grid.appendChild(cell);}
  for(var d=1;d<=daysInMonth;d++){
    var ds=_vPlanYear+'-'+String(_vPlanMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dow=(firstDay+d-1)%7;
    var plans=dateMap[ds]||[];
    var cell=document.createElement('div');
    var cls='plan-cal-day'+(ds===todayStr?' today':'');
    if(dow===0)cls+=' sun';if(dow===6)cls+=' sat';
    if(plans.length)cls+=' has-plan';
    cell.className=cls;
    var dots='';
    if(plans.length){
      if(plans.some(function(p){return p.type!=='done';}))dots+='<div class="plan-dot plan-dot-blue"></div>';
      if(plans.some(function(p){return p.type==='done';}))dots+='<div class="plan-dot plan-dot-green"></div>';
    }
    cell.innerHTML='<span class="plan-cal-day-num">'+d+'</span>'+(dots?'<div class="plan-dot-row">'+dots+'</div>':'');
    if(plans.length)(function(date,ps){cell.addEventListener('click',function(){openVPlanDetail(date,ps);});})(ds,plans);
    grid.appendChild(cell);
  }
  var rem=(7-(firstDay+daysInMonth)%7)%7;
  for(var d=1;d<=rem;d++){var cell=document.createElement('div');cell.className='plan-cal-day other-month';cell.innerHTML='<span class="plan-cal-day-num">'+d+'</span>';grid.appendChild(cell);}
}
function openVPlanDetail(ds,plans){
  var p2=ds.split('-');
  document.getElementById('vpdmDate').textContent=p2[0]+'년 '+(+p2[1])+'월 '+(+p2[2])+'일';
  var html='';
  plans.sort(function(a,b){return(a.ts||0)-(b.ts||0);}).forEach(function(p){
    var badge=p.type==='done'?'<span class="plan-type-badge badge-done">✅ 완료</span>':'<span class="plan-type-badge badge-plan">📋 계획</span>';
    var cmt=p.comment?'<div class="vpdm-comment"><div class="vpdm-comment-head">✏️ 선생님 코멘트</div>'+p.comment.split('\n').join('<br>')+'</div>':'<div class="vpdm-no-comment">⏳ 코멘트 대기 중</div>';
    html+='<div class="vpdm-item"><div class="vpdm-head2">'+badge+'</div><img class="vpdm-img" src="'+(p.imageData||p.imageUrl||'')+'" onclick="openLbV(this.src)" loading="lazy">'+cmt+'</div>';
  });
  document.getElementById('vpdmBody').innerHTML=html||'<p style="text-align:center;color:#94a3b8;padding:20px">없음</p>';
  document.getElementById('vPlanDetailOv').classList.add('open');
  document.body.style.overflow='hidden';
}
// Firebase 재연결 시 자동 갱신
window.addEventListener('focus', function(){
  if(sid_ && db){
    db.ref('smSessions/'+sid_).once('value', function(s){
      try{recData=s.val()||{};renderStats();renderCal();}catch(e){}
    });
  }
});

function closeVPlanDetail(){document.getElementById('vPlanDetailOv').classList.remove('open');document.body.style.overflow='';}
function openLbV(src){document.getElementById('lbVImg').src=src;document.getElementById('lbV').classList.add('open');document.body.style.overflow='hidden';}
function closeLbV(){document.getElementById('lbV').classList.remove('open');document.body.style.overflow='';}

async function submitC(){
  const name=document.getElementById('cName').value.trim();
  const content=document.getElementById('cContent').value.trim();
  const err=document.getElementById('cerr');
  if(!name){err.textContent='보내는 분을 입력해주세요';return;}
  if(!content){err.textContent='내용을 입력해주세요';return;}
  err.textContent='';
  const btn=document.getElementById('cBtn');
  btn.disabled=true;btn.textContent='전송 중...';
  try{
    await db.ref(`smConsultations/${sid_}`).push({name,content,ts:Date.now(),isRead:false});
    document.getElementById('cName').value='';
    document.getElementById('cContent').value='';
    const s=document.getElementById('cSucc');s.style.display='block';setTimeout(()=>s.style.display='none',4000);
  }catch(e){err.textContent='전송 실패: '+e.message;}
  btn.disabled=false;btn.textContent='상담 요청 보내기';
}

async function delConsult(cid){
  if(!confirm('이 상담 요청을 삭제하시겠습니까?'))return;
  await db.ref(`smConsultations/${sid_}/${cid}`).remove();
}

function renderSent(){
  const el=document.getElementById('sentList');
  const arr=Object.entries(consultData).sort(([,a],[,b])=>(b.ts||0)-(a.ts||0));
  if(!arr.length){el.innerHTML='';return;}
  el.innerHTML='<p class="sent-hd">상담 내역</p>'+arr.map(([cid,c])=>`
    <div class="sent-i">
      <div class="sent-t">
        <span>${new Date(c.ts||0).toLocaleString('ko-KR')} · ${c.name||''}</span>
        <button class="btn-del-sent" onclick="delConsult('${cid}')">삭제</button>
      </div>
      <div class="sent-body">${c.content||''}</div>
      ${c.reply
        ?`<div class="sent-reply"><div class="sent-reply-head">✏️ 선생님 답변 · ${c.replyAt?new Date(c.replyAt).toLocaleString('ko-KR'):''}</div>${c.reply.replace(/\n/g,'<br>')}</div>`
        :`<div class="sent-no-reply">⏳ 아직 답변이 없습니다</div>`
      }
    </div>`).join('');
}
</script>

<script>
// ── 자동 업데이트 감지 ──
(function(){
  if(typeof firebase === 'undefined') return;
  var VERSION_KEY = 'sungmint_version';
  var localVer = localStorage.getItem(VERSION_KEY);
  function checkVersion(){
    if(!firebase.apps.length) return;
    var dbRef = firebase.database().ref('smAppVersion');
    dbRef.once('value', function(s){
      var serverVer = s.val();
      if(!serverVer) return;
      if(!localVer){
        localStorage.setItem(VERSION_KEY, serverVer);
        localVer = serverVer;
        return;
      }
      if(serverVer !== localVer){
        localStorage.setItem(VERSION_KEY, serverVer);
        // 부드럽게 알림 후 새로고침
        var banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#3764bf,#5a8ae0);color:#fff;text-align:center;padding:12px;font-family:Noto Sans KR,sans-serif;font-size:14px;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,.2)';
        banner.textContent = '🔄 새로운 업데이트가 있습니다. 잠시 후 자동으로 새로고침됩니다...';
        document.body.appendChild(banner);
        setTimeout(function(){ location.reload(); }, 500);
      }
    });
  }
  // 최초 + 5분마다 확인
  setTimeout(checkVersion, 2000);
  setInterval(checkVersion, 30 * 1000);
})();
</script>
