<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클리닉 채점 — 성민T</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gothic+A1:wght@300;400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#e4e8f4;--sh1:rgba(145,165,210,.6);--sh2:rgba(255,255,255,.9);--acc:#3764bf;--acc2:#5a8ae0;--txt:#1a2840;--txt2:#5a6e96}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;
  background-image:radial-gradient(circle at 15% 15%,rgba(55,100,191,.1) 0%,transparent 50%),
    radial-gradient(circle at 85% 85%,rgba(90,138,224,.08) 0%,transparent 50%)}
.wrap{max-width:560px;margin:0 auto;padding:28px 16px 60px}

/* Header */
.page-head{text-align:center;margin-bottom:28px}
.page-badge{display:inline-flex;align-items:center;gap:7px;background:#d2dcf0;border-radius:99px;padding:6px 16px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:3px;color:var(--acc);box-shadow:3px 3px 8px var(--sh1),-2px -2px 6px var(--sh2);margin-bottom:14px;text-transform:uppercase}
.page-title{font-family:'Nanum Myeongjo',serif;font-size:28px;font-weight:800;color:var(--txt)}
.page-sub{font-size:12px;color:var(--txt2);margin-top:6px}

/* Card */
.card{background:var(--bg);border-radius:18px;padding:20px;box-shadow:5px 5px 14px var(--sh1),-4px -4px 12px var(--sh2);margin-bottom:16px}
.card-title{font-family:'Gothic A1',sans-serif;font-weight:700;font-size:14px;color:var(--txt);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* Clinic select */
.clinic-item{background:var(--bg);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;
  box-shadow:3px 3px 8px var(--sh1),-2px -2px 6px var(--sh2);border:2px solid transparent;transition:.15s}
.clinic-item:hover{border-color:rgba(55,100,191,.3)}
.clinic-item.sel{border-color:var(--acc);background:#eff4ff}
.clinic-name{font-family:'Gothic A1',sans-serif;font-weight:700;font-size:13px;color:var(--txt)}
.clinic-meta{font-size:11px;color:var(--txt2);margin-top:3px}

/* Name input */
.nm-inp{width:100%;border:none;border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;transition:.2s;background:var(--bg);margin-bottom:10px;box-shadow:inset 3px 3px 7px var(--sh1),inset -3px -3px 7px var(--sh2);color:var(--txt)}
.nm-inp:focus{box-shadow:inset 4px 4px 9px var(--sh1),inset -3px -3px 8px var(--sh2)}
.nm-btn{width:100%;background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:3px 3px 10px rgba(55,100,191,.35);transition:.2s}
.nm-btn:hover{opacity:.92}.nm-btn:disabled{opacity:.5;cursor:not-allowed}
.err{color:#ef4444;font-size:12px;margin-top:6px;font-family:'Space Mono',monospace;min-height:16px}
.sugg{font-size:11px;color:var(--txt2);margin-top:4px}

/* Answer grid */
.ans-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.ans-item{display:flex;flex-direction:column;gap:4px}
.ans-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--txt2);text-align:center;font-weight:700}
.ans-inp{border:none;border-radius:10px;padding:9px 6px;font-size:13px;text-align:center;font-family:inherit;outline:none;width:100%;background:var(--bg);box-shadow:inset 2px 2px 5px var(--sh1),inset -2px -2px 5px var(--sh2);color:var(--txt);transition:.15s}
.ans-inp:focus{box-shadow:inset 3px 3px 7px var(--sh1),inset -2px -2px 5px var(--sh2)}
.ans-inp.correct{background:#dcfce7;box-shadow:none;border:2px solid #86efac;color:#166534}
.ans-inp.wrong{background:#fee2e2;box-shadow:none;border:2px solid #fca5a5;color:#b91c1c}

/* Result card */
.result-box{background:var(--bg);border-radius:18px;padding:24px 20px;box-shadow:5px 5px 14px var(--sh1),-4px -4px 12px var(--sh2);text-align:center}
.result-score{font-family:'Nanum Myeongjo',serif;font-size:48px;font-weight:800;color:var(--acc);line-height:1}
.result-total{font-size:14px;color:var(--txt2);margin-top:4px}
.result-wrong{font-size:13px;color:#ef4444;margin-top:12px;line-height:1.8}
.result-ok{font-size:13px;color:#166534;margin-top:12px}
.result-saved{font-size:12px;color:var(--txt2);margin-top:8px;font-family:'Space Mono',monospace}

/* Step nav */
.step-indicator{display:flex;align-items:center;gap:6px;margin-bottom:20px;font-family:'Space Mono',monospace;font-size:10px;color:#94a3b8}
.step-dot{width:8px;height:8px;border-radius:50%;background:#d2dcf0}
.step-dot.active{background:var(--acc)}
.step-line{flex:1;height:1px;background:#d2dcf0}

.math-toolbar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;padding:10px 12px;background:var(--bg);border-radius:10px;box-shadow:inset 2px 2px 5px var(--sh1),inset -2px -2px 5px var(--sh2)}
.math-btn{background:var(--bg);border:none;border-radius:7px;padding:6px 10px;font-size:13px;cursor:pointer;color:var(--acc);font-weight:700;box-shadow:2px 2px 5px var(--sh1),-1px -1px 4px var(--sh2);transition:.15s;min-width:36px}
.math-btn:hover{box-shadow:3px 3px 7px var(--sh1),-2px -2px 5px var(--sh2)}
.math-btn:active{box-shadow:inset 2px 2px 4px var(--sh1),inset -1px -1px 3px var(--sh2)}
.math-hint{font-size:10px;color:#8a96b4;width:100%;font-family:'Space Mono',monospace}
.edit-result-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f1f5f9}
.edit-ans-inp{width:52px;border:none;border-radius:8px;padding:6px 4px;font-size:12px;text-align:center;font-family:inherit;outline:none;background:var(--bg);box-shadow:inset 2px 2px 4px var(--sh1),inset -1px -1px 3px var(--sh2);color:var(--txt)}
.edit-ans-inp.correct{background:#dcfce7;border:1.5px solid #86efac;box-shadow:none;color:#166534}
.edit-ans-inp.wrong{background:#fee2e2;border:1.5px solid #fca5a5;box-shadow:none;color:#b91c1c}
.regrade-btn{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:3px 3px 8px rgba(55,100,191,.35);margin-top:12px;width:100%}
.back-link{display:block;text-align:center;margin-top:20px;font-size:11px;color:#8a96b4;text-decoration:none;font-family:'Space Mono',monospace;letter-spacing:1px}
.back-link:hover{color:var(--txt2)}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-head">
    <div class="page-badge"><span style="width:5px;height:5px;border-radius:50%;background:#3764bf;display:inline-block"></span>CLINIC GRADING</div>
    <div class="page-title">클리닉 채점</div>
    <div class="page-sub">조교용 채점 시스템</div>
  </div>

  <!-- Step indicator -->
  <div class="step-indicator">
    <div class="step-dot active" id="sd1"></div>
    <div class="step-line"></div>
    <div class="step-dot" id="sd2"></div>
    <div class="step-line"></div>
    <div class="step-dot" id="sd3"></div>
  </div>

  <!-- Step 1: 클리닉 선택 -->
  <div id="step1">
    <div class="card">
      <div class="card-title">📋 클리닉 선택</div>
      <div id="clinicItems"><div style="text-align:center;padding:24px;color:#94a3b8;font-size:13px">로딩 중...</div></div>
    </div>
    <button class="nm-btn" onclick="goStep2()" style="margin-top:4px">다음 →</button>
    <div class="err" id="err1"></div>
  </div>

  <!-- Step 2: 학생 이름 입력 -->
  <div id="step2" style="display:none">
    <div class="card">
      <div class="card-title">✏️ 학생 이름 입력</div>
      <input class="nm-inp" type="text" id="stuNameInp" placeholder="이름을 입력하세요 (예: 홍길동)" onkeydown="if(event.key==='Enter')goStep3()">
      <div class="err" id="err2"></div>
      <div class="sugg" id="sugg2"></div>
    </div>
    <button class="nm-btn" onclick="goStep3()">다음 →</button>
    <a href="#" onclick="goBack(2)" class="back-link">← 이전</a>
  </div>

  <!-- Step 3: 답안 입력 -->
  <div id="step3" style="display:none">
    <div class="card">
      <div class="card-title" id="step3Title">📝 답안 입력</div>
      <div class="math-toolbar" id="mathToolbar">
        <span class="math-hint">기호 클릭 → 현재 입력칸에 삽입</span>
        <button class="math-btn" onclick="insertMath('√')">√</button>
        <button class="math-btn" onclick="insertMath('²')">²</button>
        <button class="math-btn" onclick="insertMath('³')">³</button>
        <button class="math-btn" onclick="insertMath('π')">π</button>
        <button class="math-btn" onclick="insertMath('∞')">∞</button>
        <button class="math-btn" onclick="insertMath('±')">±</button>
        <button class="math-btn" onclick="insertMath('/')">  /  </button>
        <button class="math-btn" onclick="insertMath('(')"> ( </button>
        <button class="math-btn" onclick="insertMath(')')"> ) </button>
        <button class="math-btn" onclick="insertMath('-')"> - </button>
      </div>
      <div class="ans-grid" id="ansGrid"></div>
    </div>
    <button class="nm-btn" onclick="submitGrade()">채점하기 →</button>
    <div class="err" id="err3"></div>
    <a href="#" onclick="goBack(3)" class="back-link">← 이전</a>
  </div>

  <!-- Step 4: 결과 + 수정 -->
  <div id="step4" style="display:none">
    <div class="result-box">
      <div style="font-size:14px;color:#5a6e96;margin-bottom:8px;font-family:'Gothic A1',sans-serif" id="resultName"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-total" id="resultTotal"></div>
      <div id="resultWrong"></div>
      <div class="result-saved" id="resultSaved"></div>
    </div>
    <div class="card" style="margin-top:14px">
      <div class="card-title">✏️ 답안 수정</div>
      <div class="math-toolbar">
        <span class="math-hint">기호 클릭 → 현재 입력칸에 삽입</span>
        <button class="math-btn" onclick="insertMath('√')">√</button>
        <button class="math-btn" onclick="insertMath('²')">²</button>
        <button class="math-btn" onclick="insertMath('³')">³</button>
        <button class="math-btn" onclick="insertMath('π')">π</button>
        <button class="math-btn" onclick="insertMath('±')">±</button>
        <button class="math-btn" onclick="insertMath('/')">  /  </button>
      </div>
      <div id="editGrid"></div>
      <button class="regrade-btn" onclick="regrade()">다시 채점하기</button>
    </div>
    <button class="nm-btn" onclick="resetAll()" style="margin-top:12px;background:#f1f5f9;color:#5a6e96;box-shadow:3px 3px 8px var(--sh1),-2px -2px 6px var(--sh2)">새 학생 채점</button>
  </div>

  <a class="back-link" href="./main.html">← 홈으로</a>
</div>

<script>
let db, allStudents={}, clinicData={}, selectedClinicId=null, selectedClinic=null;
let currentStuId=null, currentStuName='', lastResult=null, focusedInput=null;

window.addEventListener('DOMContentLoaded', ()=>{
  if(typeof SM_CONFIG==='undefined'||!SM_CONFIG.apiKey||SM_CONFIG.apiKey.includes('여기에')){
    document.body.innerHTML='<div style="text-align:center;padding:60px;color:#ef4444">설정 오류</div>';return;
  }
  if(!firebase.apps.length) firebase.initializeApp(SM_CONFIG);
  db=firebase.database();
  loadData();
});

async function loadData(){
  const [stuSnap, clinicSnap] = await Promise.all([
    db.ref('smStudents').get(),
    db.ref('smClinicSets').get()
  ]);
  allStudents=stuSnap.val()||{};
  clinicData=clinicSnap.val()||{};
  renderClinicList();
}

function renderClinicList(){
  const el=document.getElementById('clinicItems');
  const active=Object.entries(clinicData).filter(([,c])=>c.active);
  if(!active.length){el.innerHTML='<div style="text-align:center;padding:24px;color:#94a3b8;font-size:13px">활성화된 클리닉이 없습니다</div>';return;}
  el.innerHTML=active.map(([cid,cs])=>{
    const cnt=Object.keys(cs.answers||{}).length;
    const target=cs.targetType==='all'?'전체':cs.targetType==='class'?'반: '+(cs.targetCls||''):'학생별';
    return`<div class="clinic-item ${cid===selectedClinicId?'sel':''}" onclick="selectClinic('${cid}')">
      <div class="clinic-name">${cs.title}</div>
      <div class="clinic-meta">${cnt}문제 · 대상: ${target}</div>
    </div>`;
  }).join('');
}

function selectClinic(cid){
  selectedClinicId=cid;
  selectedClinic=clinicData[cid];
  renderClinicList();
}

function goStep2(){
  if(!selectedClinicId){document.getElementById('err1').textContent='클리닉을 선택하세요';return;}
  document.getElementById('err1').textContent='';
  setStep(2);
  document.getElementById('stuNameInp').value='';
  document.getElementById('err2').textContent='';
  document.getElementById('sugg2').textContent='';
  setTimeout(()=>document.getElementById('stuNameInp').focus(),100);
}

function goStep3(){
  const name=document.getElementById('stuNameInp').value.trim();
  const err=document.getElementById('err2');
  const sugg=document.getElementById('sugg2');
  if(!name){err.textContent='이름을 입력하세요';return;}
  // Find student
  const entry=Object.entries(allStudents).find(([,s])=>s.name===name);
  if(!entry){
    err.textContent='등록된 학생이 아닙니다';
    // Suggest similar names
    const similar=Object.values(allStudents).map(s=>s.name||'').filter(n=>n&&n.includes(name.slice(0,1)));
    if(similar.length) sugg.textContent='혹시 이 학생인가요? '+similar.slice(0,3).join(', ');
    return;
  }
  err.textContent=''; sugg.textContent='';
  currentStuId=entry[0];
  currentStuName=entry[1].name;
  buildAnsGrid();
  document.getElementById('step3Title').textContent='📝 '+currentStuName+' 답안 입력';
  setStep(3);
}

function insertMath(ch){
  if(!focusedInput) return;
  const el=document.getElementById(focusedInput);
  if(!el) return;
  const s=el.selectionStart, e=el.selectionEnd;
  el.value=el.value.slice(0,s)+ch+el.value.slice(e);
  el.selectionStart=el.selectionEnd=s+ch.length;
  el.focus();
}

function buildAnsGrid(){
  const answers=selectedClinic.answers||{};
  const nums=Object.keys(answers).map(Number).sort((a,b)=>a-b);
  const maxNum=nums[nums.length-1]||0;
  const grid=document.getElementById('ansGrid');
  grid.innerHTML='';
  for(let i=1;i<=maxNum;i++){
    const item=document.createElement('div');
    item.className='ans-item';
    item.innerHTML=`<span class="ans-num">${i}번</span><input class="ans-inp" id="ga${i}" type="text" placeholder="-" maxlength="6">`;
    grid.appendChild(item);
    if(i===1) setTimeout(()=>document.getElementById('ga1').focus(),100);
  }
  // Track focused input for math toolbar
  for(let j=1;j<=maxNum;j++){
    const inp=document.getElementById('ga'+j);
    if(inp) inp.addEventListener('focus',()=>{focusedInput='ga'+j;});
  }
  // Tab through inputs
  for(let i=1;i<maxNum;i++){
    const inp=document.getElementById('ga'+i);
    if(inp) inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key==='Tab'){
        e.preventDefault();
        const next=document.getElementById('ga'+(i+1));
        if(next) next.focus();
        else submitGrade();
      }
    });
  }
}

async function submitGrade(){
  const answers=selectedClinic.answers||{};
  const nums=Object.keys(answers).map(Number).sort((a,b)=>a-b);
  const maxNum=nums[nums.length-1]||0;
  let score=0, wrong=[], stuAnswers={};
  for(let i=1;i<=maxNum;i++){
    const inp=document.getElementById('ga'+i);
    const val=(inp?inp.value.trim():'');
    stuAnswers[i]=val;
    const correct=answers[String(i)]||'';
    if(val&&correct){
      if(val===correct){score++;if(inp)inp.className='ans-inp correct';}
      else{wrong.push(i);if(inp)inp.className='ans-inp wrong';}
    }
  }
  const total=nums.length;
  lastResult={stuAnswers,score,total,wrong,nums,maxNum};
  // Save result
  const result={name:currentStuName,answers:stuAnswers,score,total,wrong,gradedAt:Date.now()};
  await db.ref('smClinicResults/'+selectedClinicId+'/'+currentStuId).set(result);
  // Auto-save to student session
  const sessionData={
    date:new Date().toISOString().split('T')[0],
    num:Object.keys((await db.ref('smSessions/'+currentStuId).get()).val()||{}).length+1,
    cli:selectedClinic.title,
    note:'[클리닉 채점] '+score+'/'+total+'점'+(wrong.length?'\n오답: '+wrong.join(', ')+'번':''),
    eval:null, at:Date.now(), upd:Date.now()
  };
  await db.ref('smSessions/'+currentStuId).push(sessionData);
  // Show result
  document.getElementById('resultName').textContent=currentStuName;
  document.getElementById('resultScore').textContent=score;
  document.getElementById('resultTotal').textContent='/ '+total+' 점';
  if(wrong.length){
    document.getElementById('resultWrong').innerHTML='<div class="result-wrong">❌ 오답: '+wrong.join('번, ')+'번</div>';
  }else{
    document.getElementById('resultWrong').innerHTML='<div class="result-ok">🎉 모두 정답!</div>';
  }
  document.getElementById('resultSaved').textContent='✓ 학생 기록에 자동 저장됨';
  buildEditGrid(stuAnswers);
  setStep(4);
}

function buildEditGrid(stuAnswers){
  const answers=selectedClinic.answers||{};
  const nums=Object.keys(answers).map(Number).sort((a,b)=>a-b);
  const maxNum=nums[nums.length-1]||0;
  const grid=document.getElementById('editGrid');
  grid.innerHTML='';
  const g=document.createElement('div');
  g.style.cssText='display:grid;grid-template-columns:repeat(5,1fr);gap:8px';
  for(let i=1;i<=maxNum;i++){
    const correct=answers[String(i)]||'';
    const val=stuAnswers[String(i)]||stuAnswers[i]||'';
    const isCorrect=val&&correct&&val===correct;
    const item=document.createElement('div');
    item.className='ans-item';
    item.innerHTML=`<span class="ans-num">${i}번</span><input class="edit-ans-inp ${isCorrect?'correct':val?'wrong':''}" id="ed${i}" type="text" value="${val}" maxlength="6">`;
    g.appendChild(item);
  }
  grid.appendChild(g);
  // Track focus for math toolbar
  for(let i=1;i<=maxNum;i++){
    const inp=document.getElementById('ed'+i);
    if(inp) inp.addEventListener('focus',()=>{focusedInput='ed'+i;});
  }
}

async function regrade(){
  const answers=selectedClinic.answers||{};
  const nums=Object.keys(answers).map(Number).sort((a,b)=>a-b);
  const maxNum=nums[nums.length-1]||0;
  let score=0,wrong=[],stuAnswers={};
  for(let i=1;i<=maxNum;i++){
    const inp=document.getElementById('ed'+i);
    const val=inp?inp.value.trim():'';
    stuAnswers[i]=val;
    const correct=answers[String(i)]||'';
    if(inp) inp.className='edit-ans-inp';
    if(val&&correct){
      if(val===correct){score++;if(inp)inp.className='edit-ans-inp correct';}
      else{wrong.push(i);if(inp)inp.className='edit-ans-inp wrong';}
    }
  }
  const total=nums.length;
  // Update Firebase
  const result={name:currentStuName,answers:stuAnswers,score,total,wrong,gradedAt:Date.now()};
  await db.ref('smClinicResults/'+selectedClinicId+'/'+currentStuId).set(result);
  // Update session note
  const sesSnap=await db.ref('smSessions/'+currentStuId).get();
  const sessions=sesSnap.val()||{};
  // find the session we created
  const sesEntry=Object.entries(sessions).find(([,s])=>s.cli===selectedClinic.title);
  if(sesEntry){
    await db.ref('smSessions/'+currentStuId+'/'+sesEntry[0]+'/note').set('[클리닉 채점] '+score+'/'+total+'점'+(wrong.length?'
오답: '+wrong.join(', ')+'번':''));
  }
  // Update display
  document.getElementById('resultScore').textContent=score;
  document.getElementById('resultTotal').textContent='/ '+total+' 점';
  if(wrong.length){
    document.getElementById('resultWrong').innerHTML='<div class="result-wrong">❌ 오답: '+wrong.join('번, ')+'번</div>';
  }else{
    document.getElementById('resultWrong').innerHTML='<div class="result-ok">🎉 모두 정답!</div>';
  }
  document.getElementById('resultSaved').textContent='✓ 수정 저장됨';
}

function goBack(step){
  if(step===2) setStep(1);
  else if(step===3) setStep(2);
}

function setStep(n){
  [1,2,3,4].forEach(i=>{
    document.getElementById('step'+i).style.display=i===n?'':'none';
  });
  [1,2,3].forEach(i=>{
    document.getElementById('sd'+i).className='step-dot'+(i<=n?' active':'');
  });
}

function resetAll(){
  selectedClinicId=null; selectedClinic=null; currentStuId=null; currentStuName='';
  renderClinicList();
  setStep(1);
}
</script>
</body>
