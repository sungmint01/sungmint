<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sungmint</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="config.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Noto Sans KR',sans-serif;
      background:#f8faff;color:#1a202c;
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:32px 20px;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(200,210,230,0.5) 1px,transparent 1px),
        linear-gradient(90deg,rgba(200,210,230,0.5) 1px,transparent 1px);
      background-size:60px 60px;pointer-events:none;
    }
    .admin-btn{
      position:fixed;top:14px;right:16px;z-index:10;
      font-family:'Space Mono',monospace;font-size:10px;
      color:#94a3b8;text-decoration:none;letter-spacing:1px;
      background:#fff;border:1px solid #e2e8f0;border-radius:8px;
      padding:5px 10px;transition:.2s;
    }
    .admin-btn:hover{color:#475569;border-color:#cbd5e1}
    .wrap{position:relative;z-index:1;width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center;gap:40px}
    .logo{text-align:center}
    .logo-text{font-family:'Space Mono',monospace;font-size:46px;font-weight:700;letter-spacing:-2px;line-height:1;margin-bottom:10px}
    .logo-ab{background:linear-gradient(90deg,#7dd3fc,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo-c{background:linear-gradient(135deg,#f87171,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline-block;padding-bottom:6px;margin-bottom:-6px;margin-left:4px}
    .tagline{font-family:'Space Mono',monospace;font-size:10px;color:#4a5a72;letter-spacing:3px;text-transform:uppercase}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
    .card{
      display:block;text-decoration:none;
      background:#ffffff;border:1px solid #e2e8f0;border-radius:20px;
      padding:28px 22px 52px;position:relative;overflow:hidden;
      transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;
    }
    .card:hover{transform:translateY(-4px)}
    .card-qna:hover{border-color:rgba(0,198,255,0.45);box-shadow:0 8px 40px rgba(0,198,255,0.1)}
    .card-od4p:hover{border-color:rgba(167,139,250,0.45);box-shadow:0 8px 40px rgba(167,139,250,0.1)}
    .icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
    .icon-qna{background:rgba(0,198,255,0.1);border:1px solid rgba(0,198,255,0.2)}
    .icon-od4p{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2)}
    .name{font-family:'Black Han Sans',sans-serif;font-size:20px;margin-bottom:4px}
    .name-qna{background:linear-gradient(135deg,#00c6ff,#4f8fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .name-od4p{background:linear-gradient(135deg,#a78bfa,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{font-family:'Space Mono',monospace;font-size:9px;color:#4a5a72;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
    .desc{font-size:12px;color:#718096;line-height:1.8}
    .arrow{position:absolute;bottom:18px;right:18px;font-size:16px;color:#2a3a52}

    /* 학부모 */
    /* Parent modal */
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-ov.open{display:flex}
    .modal-box{background:#fff;border-radius:20px;width:100%;max-width:340px;box-shadow:0 24px 60px rgba(0,0,0,.28);overflow:hidden;animation:popIn .2s ease}
    @keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    .modal-top{height:4px;background:linear-gradient(90deg,#f87171,#fb923c)}
    .modal-body{padding:24px 22px 20px}
    .modal-title{font-family:'Black Han Sans',sans-serif;font-size:18px;margin-bottom:4px;background:linear-gradient(135deg,#f87171,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .modal-sub{font-family:'Space Mono',monospace;font-size:9px;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
    .modal-inp{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:.2s;background:#f8faff;letter-spacing:4px;margin-bottom:10px}
    .modal-inp:focus{border-color:#f87171;box-shadow:0 0 0 3px rgba(248,113,113,.12);background:#fff}
    .modal-btn{width:100%;background:linear-gradient(135deg,#f87171,#fb923c);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:.2s}
    .modal-btn:hover{opacity:.88}.modal-btn:disabled{opacity:.45;cursor:not-allowed}
    .modal-err{color:#f87171;font-size:12px;margin-top:7px;min-height:15px;font-family:'Space Mono',monospace}
    .modal-close-row{display:flex;justify-content:flex-end;padding:10px 14px 0}
    .modal-close{background:none;border:none;font-size:20px;color:#94a3b8;cursor:pointer;line-height:1}

    .footer{font-family:'Space Mono',monospace;font-size:10px;color:#cbd5e1;letter-spacing:2px}
    @media(max-width:400px){.cards{grid-template-columns:1fr}.logo-text{font-size:36px}}
      .card-parent{border-top-color:transparent}.icon-parent{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2)}.name-parent{background:linear-gradient(135deg,#f87171,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:"Black Han Sans",sans-serif}
  </style>
</head>
<body>

  <a class="admin-btn" href="./admin.html">🔒 admin</a>

  <div class="wrap">
    <div class="logo">
      <div class="logo-text">
        <span class="logo-ab">sungmin</span><span class="logo-c">T</span>
      </div>
      <div class="tagline">Math Learning Tools</div>
    </div>

    <div class="cards">
      <a class="card card-qna" href="./qna.html">
        <div class="icon icon-qna">💬</div>
        <div class="name name-qna">익명 질문함</div>
        <div class="sub">QnA</div>
        <div class="desc">모르는 문제를<br/>익명으로 질문해요</div>
        <div class="arrow">→</div>
      </a>
      <a class="card card-od4p" href="./od4p.html">
        <div class="icon icon-od4p">📚</div>
        <div class="name name-od4p">오늘의 문제</div>
        <div class="sub">OD4P</div>
        <div class="desc">매일 4문제 풀고<br/>즉시 채점 확인</div>
        <div class="arrow">→</div>
      </a>
    </div>
    <!-- Student button -->
    <a class="card card-stu" href="./student.html" style="padding:16px 20px 16px;display:flex;align-items:center;gap:14px;width:100%">
      <div class="icon icon-stu" style="margin-bottom:0;flex-shrink:0">✏️</div>
      <div>
        <div class="name name-stu" style="font-size:17px;margin-bottom:2px">학생 페이지</div>
        <div class="desc" style="font-size:12px">숙제 확인 · 플래너 제출</div>
      </div>
      <div class="arrow" style="position:static;margin-left:auto">→</div>
    </a>

    <!-- 학부모 카드 -->
    <div class="card card-parent" onclick="openParentModal()" style="padding:16px 20px;display:flex;align-items:center;gap:14px;width:100%">
      <div class="icon icon-parent" style="width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">👨‍👩‍👧</div>
      <div>
        <div class="name name-parent" style="font-size:17px;margin-bottom:2px">학부모 확인</div>
        <div class="desc" style="font-size:12px">수업 현황 · 숙제 · 플래너 확인</div>
      </div>
      <div class="arrow" style="position:static;margin-left:auto">→</div>
    </div>

    <!-- 학부모 비밀번호 모달 -->
    <div class="modal-ov" id="parentModal" onclick="if(event.target===this)closeParentModal()">
      <div class="modal-box">
        <div class="modal-top"></div>
        <div class="modal-close-row"><button class="modal-close" onclick="closeParentModal()">✕</button></div>
        <div class="modal-body">
          <div class="modal-title">학부모 확인</div>
          <div class="modal-sub">For Parents</div>
          <input class="modal-inp" type="password" id="parentPw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')parentLogin()">
          <button class="modal-btn" id="parentBtn" onclick="parentLogin()">확인 →</button>
          <div class="modal-err" id="parentErr"></div>
        </div>
      </div>
    </div>

    <div class="footer">SUNGMINT · MATH TOOLS</div>
  </div>

<script>
let db;
window.addEventListener('DOMContentLoaded', () => {
  if (typeof SM_CONFIG === 'undefined' || !SM_CONFIG.apiKey || SM_CONFIG.apiKey.includes('여기에')) return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(SM_CONFIG);
    db = firebase.database();
  } catch(e) { console.error(e); }
});

function openParentModal() {
  document.getElementById('parentModal').classList.add('open');
  setTimeout(function(){ document.getElementById('parentPw').focus(); }, 100);
}
function closeParentModal() {
  document.getElementById('parentModal').classList.remove('open');
  document.getElementById('parentPw').value = '';
  document.getElementById('parentErr').textContent = '';
  document.getElementById('parentBtn').disabled = false;
  document.getElementById('parentBtn').textContent = '확인 →';
}
async function parentLogin() {
  const pw = document.getElementById('parentPw').value;
  const err = document.getElementById('parentErr');
  const btn = document.getElementById('parentBtn');
  if (!pw) { err.textContent = '비밀번호를 입력하세요'; return; }
  if (!db) { err.textContent = 'Firebase 연결 오류'; return; }
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '확인 중...';
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    const hash = [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
    const snap = await db.ref('smStudents').get();
    const students = snap.val() || {};
    const match = Object.values(students).find(s => s.parentPwHash === hash);
    if (match) {
      location.href = `./view.html?token=${match.token}`;
    } else {
      err.textContent = '비밀번호가 올바르지 않습니다';
      document.getElementById('parentPw').value = '';
      document.getElementById('parentPw').focus();
    }
  } catch(e) { err.textContent = '오류: ' + e.message; }
  btn.disabled = false;
  btn.textContent = '확인 →';
}
</script>
</body>
</html>
