<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성민T 수학</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;min-height:100vh;background:#f0f4f8;color:#1e293b}
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 60%,#2d5286 100%);padding:72px 24px 100px;text-align:center;position:relative;overflow:hidden}
.hero::before,.hero::after{content:'';position:absolute;border-radius:50%;pointer-events:none}
.hero::before{width:360px;height:360px;background:radial-gradient(circle,rgba(116,179,216,.18) 0%,transparent 70%);top:-100px;right:-80px}
.hero::after{width:220px;height:220px;background:radial-gradient(circle,rgba(237,148,153,.12) 0%,transparent 70%);bottom:-60px;left:8%}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:99px;padding:6px 18px;font-size:12px;color:rgba(255,255,255,.8);font-weight:500;letter-spacing:.05em;margin-bottom:22px}
.hero h1{font-size:clamp(30px,7vw,50px);font-weight:800;color:#fff;line-height:1.15;margin-bottom:12px}
.hero p{font-size:15px;color:rgba(255,255,255,.55);line-height:1.8}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;max-width:900px;margin:-44px auto 0;padding:0 20px 48px;position:relative;z-index:1}
.card{background:#fff;border-radius:20px;padding:28px 24px 56px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-decoration:none;display:block;border-top:4px solid transparent;position:relative;overflow:hidden;transition:transform .22s,box-shadow .22s}
.card:hover{transform:translateY(-5px);box-shadow:0 14px 40px rgba(0,0,0,.13)}
.card.c1{border-top-color:#74B3D8}.card.c2{border-top-color:#ED9499}.card.c3{border-top-color:#F5C842}.card.c4{border-top-color:#94a3b8}
.ci{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px}
.card.c1 .ci{background:#eff8ff}.card.c2 .ci{background:#fff0f0}.card.c3 .ci{background:#fffbeb}.card.c4 .ci{background:#f1f5f9}
.card h2{font-size:18px;font-weight:700;color:#1e293b;margin-bottom:7px}
.card p{font-size:13px;color:#64748b;line-height:1.7}
.ca{position:absolute;bottom:20px;right:20px;width:34px;height:34px;border-radius:9px;background:#f8fafc;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:18px;transition:.18s}
.card:hover .ca{background:#e2e8f0;color:#475569}
.notice{max-width:900px;margin:0 auto 48px;padding:0 20px}
.notice-box{background:#fff;border-radius:14px;padding:18px 22px;border:1px solid #e2e8f0;font-size:13px;color:#64748b;line-height:1.8}
.notice-box strong{color:#1e293b}
footer{text-align:center;padding:24px 16px;color:#cbd5e1;font-size:12px}
</style>
</head>
<body>
<div class="hero">
  <div class="badge">📚 수학 전문</div>
  <h1>성민T 수학</h1>
  <p>학습 현황을 언제 어디서나 확인하세요</p>
</div>
<div class="cards">
  <a class="card c1" href="od4p.html">
    <div class="ci">✏️</div>
    <h2>오늘의 4문제</h2>
    <p>매일 출제되는 4문제를 풀고 결과를 제출하세요. 꾸준한 연습이 실력이 됩니다.</p>
    <div class="ca">›</div>
  </a>
  <a class="card c2" href="qna.html">
    <div class="ci">💬</div>
    <h2>QnA 게시판</h2>
    <p>수업 관련 질문을 남겨주세요. 선생님이 확인 후 답변해 드립니다.</p>
    <div class="ca">›</div>
  </a>
  <a class="card c4" href="admin.html">
    <div class="ci">🔒</div>
    <h2>관리자</h2>
    <p>학생 수업 기록, 진도 및 성취도 관리 페이지입니다. (선생님 전용)</p>
    <div class="ca">›</div>
  </a>
</div>
<div class="notice">
  <div class="notice-box">
    👪 <strong>학부모님</strong> — 전달받으신 개인 링크로 자녀의 수업 현황을 확인하실 수 있습니다. 링크를 분실하셨다면 선생님께 문의해 주세요.
  </div>
</div>
<footer>© 성민T 수학</footer>
</body>
</html>
