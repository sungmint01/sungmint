<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sungmint</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
  :root{
    --lav:#8B7FD9;--lav2:#A89BEB;--lav-deep:#6B5FB8;
    --rose:#F0A6C4;--peach:#FBC4B0;--mint:#9DD9C4;
    --ink:#3D3860;--ink2:#7B76A8;--ink3:#AAA5C8;
    --cream:#FBFAFF;--surface:#FFFFFF;
    --lav-tint:#F2EFFC;--rose-tint:#FDF0F6;
    --sh-sm:0 2px 8px rgba(120,105,205,.08);
    --sh-md:0 8px 24px rgba(120,105,205,.12),0 2px 6px rgba(120,105,205,.06);
    --sh-lg:0 16px 40px rgba(120,105,205,.16),0 4px 10px rgba(120,105,205,.08);
    --spring:cubic-bezier(.34,1.56,.64,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--cream);color:var(--ink);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 22px;-webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(circle at 12% 8%,rgba(240,166,196,.14) 0%,transparent 42%),
      radial-gradient(circle at 88% 92%,rgba(139,127,217,.14) 0%,transparent 45%),
      radial-gradient(circle at 78% 12%,rgba(157,217,196,.08) 0%,transparent 38%);
  }
  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;align-items:center;gap:38px;animation:rise .7s var(--spring) both}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .hero{text-align:center}
  .logo-badge{
    display:inline-flex;align-items:center;gap:7px;
    background:rgba(255,255,255,.7);backdrop-filter:blur(10px);
    border:1px solid rgba(139,127,217,.14);
    border-radius:99px;padding:7px 17px;
    font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--lav);
    box-shadow:var(--sh-sm);margin-bottom:22px;text-transform:uppercase;
  }
  .logo-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--lav);
    box-shadow:0 0 0 3px rgba(139,127,217,.16);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .logo-text{font-size:56px;font-weight:800;color:var(--ink);line-height:1.02;letter-spacing:-2px}
  .logo-text-em{background:linear-gradient(135deg,var(--rose),var(--lav));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .logo-divider{width:40px;height:3px;background:linear-gradient(90deg,var(--rose),var(--lav));border-radius:2px;margin:16px auto 14px}
  .logo-sub{font-size:14px;font-weight:400;color:var(--ink2);letter-spacing:-.2px}

  .wide-wrap{display:flex;flex-direction:column;gap:12px;width:100%}
  .card-wide{
    display:flex;align-items:center;gap:15px;text-decoration:none;
    background:var(--surface);border-radius:22px;padding:17px 18px;width:100%;
    box-shadow:var(--sh-md);border:1px solid rgba(255,255,255,.8);
    transition:transform .35s var(--spring),box-shadow .35s ease;
    position:relative;overflow:hidden;
  }
  .card-wide::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 40%,rgba(240,166,196,.06));opacity:0;transition:opacity .3s}
  .card-wide:hover{transform:translateY(-4px) scale(1.01);box-shadow:var(--sh-lg)}
  .card-wide:hover::before{opacity:1}
  .card-wide:active{transform:translateY(-1px) scale(.995)}
  .wide-icon{
    width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;
    font-size:22px;flex-shrink:0;transition:transform .35s var(--spring);
  }
  .card-wide:nth-child(1) .wide-icon{background:linear-gradient(135deg,#EDE9FC,#DDD4F7)}
  .card-wide:nth-child(2) .wide-icon{background:linear-gradient(135deg,#FDE4EF,#FBD0E2)}
  .card-wide:nth-child(3) .wide-icon{background:linear-gradient(135deg,#E4F5EE,#D0EDE0)}
  .card-wide:hover .wide-icon{transform:scale(1.08) rotate(-3deg)}
  .wide-title{font-weight:700;font-size:15.5px;color:var(--ink);margin-bottom:3px;letter-spacing:-.3px}
  .wide-desc{font-size:12px;font-weight:400;color:var(--ink3);letter-spacing:-.2px}
  .wide-pill{
    margin-left:auto;background:var(--lav-tint);border-radius:99px;
    width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    color:var(--lav);font-size:16px;flex-shrink:0;font-weight:600;
    transition:transform .35s var(--spring),background .3s;
  }
  .card-wide:hover .wide-pill{background:var(--lav);color:#fff;transform:translateX(3px)}

  .footer{font-size:10px;color:var(--ink3);letter-spacing:2.5px;font-weight:600}

  .admin-link,.clinic-link{
    position:fixed;top:16px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);
    border:1px solid rgba(139,127,217,.12);border-radius:12px;padding:7px 13px;
    font-size:11px;color:var(--lav);text-decoration:none;font-weight:600;
    box-shadow:var(--sh-sm);letter-spacing:.3px;transition:all .25s var(--spring);
  }
  .admin-link{right:16px}
  .clinic-link{right:104px}
  .admin-link:hover,.clinic-link:hover{transform:translateY(-2px);box-shadow:var(--sh-md);color:var(--lav-deep)}

  @media(max-width:400px){.logo-text{font-size:46px}}
  </style>
</head>
<body>
  <a class="admin-link" href="./admin.html">🔒 admin</a>
  <a class="clinic-link" href="./clinic_grade.html">✏️ 조교</a>
  <div class="wrap">
    <div class="hero">
      <div class="logo-badge"><span class="logo-badge-dot"></span>MATH LEARNING SYSTEM</div>
      <div class="logo-text">sungmin<span class="logo-text-em">T</span></div>
      <div class="logo-divider"></div>
      <div class="logo-sub">학습 현황을 언제 어디서나 확인하세요</div>
    </div>
    <div class="wide-wrap">
      <a class="card-wide" href="./student.html">
        <div class="wide-icon">✏️</div>
        <div><div class="wide-title">학생 페이지</div><div class="wide-desc">숙제 확인 · 플래너 제출</div></div>
        <div class="wide-pill">›</div>
      </a>
      <a class="card-wide" href="./view.html">
        <div class="wide-icon">📋</div>
        <div><div class="wide-title">학부모 페이지</div><div class="wide-desc">수업 현황 · 숙제 · 플래너 확인</div></div>
        <div class="wide-pill">›</div>
      </a>
      <a class="card-wide" href="./textbook_q.html">
        <div class="wide-icon">📖</div>
        <div><div class="wide-title">교재 질문</div><div class="wide-desc">교재 문제에 질문 체크 · 풀이 영상 확인</div></div>
        <div class="wide-pill">›</div>
      </a>
    </div>
    <div class="footer">SUNGMINT · MATH TOOLS</div>
  </div>
</body>
</html>
